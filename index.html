<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cruz Azul — Antonio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏗️</text></svg>">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
      apiKey: "AIzaSyBXxj2MnF5AGFs46FTe7FN3Gl3iiXjT8gk",
      authDomain: "cemento-antonio.firebaseapp.com",
      projectId: "cemento-antonio",
      storageBucket: "cemento-antonio.firebasestorage.app",
      messagingSenderId: "448400060698",
      appId: "1:448400060698:web:b6569f11fbc56e7b5fbca3"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.__db=db; window.__col=collection; window.__onSnapshot=onSnapshot;
    window.__doc=doc; window.__setDoc=setDoc; window.__deleteDoc=deleteDoc;
    window.__dbReady=true; window.dispatchEvent(new Event("dbReady"));
  </script>
  <style>* { box-sizing:border-box; margin:0; padding:0; } body { font-family:'Segoe UI',sans-serif; background:#f8fafc; color:#1e293b; } input,select,button { font-family:inherit; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

const fmt  = (n) => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n||0);
const fmtT = (n) => (parseFloat(n)||0).toFixed(2);
const todayISO   = () => new Date().toISOString().slice(0,10);
const addDays    = (iso,n) => { const d=new Date((iso||todayISO())+"T12:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const tomorrowISO= () => addDays(todayISO(),1);
const diaLabel   = (iso) => iso ? new Date(iso+"T12:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"short"}) : "—";
const mesLabel   = (ym)  => { const [y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("es-MX",{month:"long",year:"numeric"}); };
const currentYM  = () => todayISO().slice(0,7);

/* planta por serie */
const PLANTAS = {PU:"Puebla",AG:"Aguascalientes"};
const plantaDeSerie = (serie) => {
  if(!serie) return "Sin planta";
  const prefix = serie.toUpperCase();
  for (const key of Object.keys(PLANTAS)) { if(prefix.startsWith(key)) return PLANTAS[key]; }
  return "Otra";
};
const plantaColor = {Puebla:"#7c3aed",Aguascalientes:"#0891b2","Sin planta":"#94a3b8",Otra:"#64748b"};
const plantaBg    = {Puebla:"#f5f3ff",Aguascalientes:"#ecfeff","Sin planta":"#f8fafc",Otra:"#f1f5f9"};

const STATUSES = [
  {key:"ov_asignada",    label:"OV asignada",       color:"#7c3aed",bg:"#f5f3ff",hint:"Permiso de carga de corporativo"},
  {key:"fletera_planta", label:"Fletera en planta",  color:"#d97706",bg:"#fffbeb",hint:"Tráiler formándose para cargar"},
  {key:"remisionada",    label:"Remisionada",        color:"#0891b2",bg:"#ecfeff",hint:"Cargó y se pesó: folio y tonelaje disponibles"},
  {key:"en_camino",      label:"En camino",          color:"#2563eb",bg:"#eff6ff",hint:"En ruta al cliente"},
  {key:"entregado",      label:"Entregado",          color:"#16a34a",bg:"#f0fdf4",hint:"Recibido por el cliente"},
];
const NEXT = {ov_asignada:"fletera_planta",fletera_planta:"remisionada",remisionada:"en_camino",en_camino:"entregado"};
const NEXT_LABEL = {ov_asignada:"→ Mandar fletera a planta",fletera_planta:"→ Registrar remisión (cargó)",remisionada:"→ Marcar en camino",en_camino:"→ Confirmar entrega"};
const getS = (k) => STATUSES.find(s=>s.key===k)||STATUSES[0];
const CONFIRM = {
  por_confirmar:{label:"Por confirmar",color:"#d97706",bg:"#fffbeb"},
  confirmado:   {label:"Confirmado",   color:"#16a34a",bg:"#f0fdf4"},
  reprogramado: {label:"Reprogramado", color:"#dc2626",bg:"#fef2f2"},
};
const MOTIVOS = ["Sin dotación en planta","Contratiempo del cliente","Contratiempo de la fletera","Otro"];

function Badge({status}) { const s=getS(status); return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>; }
function ConfirmBadge({c}) { const s=CONFIRM[c]||CONFIRM.por_confirmar; return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>; }
function PlantaBadge({serie}) { const p=plantaDeSerie(serie); return <span style={{background:plantaBg[p]||"#f1f5f9",color:plantaColor[p]||"#64748b",border:`1px solid ${plantaColor[p]||"#64748b"}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>🏭 {p}</span>; }
function EmptyState({icon,msg,btn,onClick}) { return <div style={{textAlign:"center",padding:"48px 20px",color:"#94a3b8"}}><div style={{fontSize:40,marginBottom:12}}>{icon}</div><div style={{fontSize:14,marginBottom:20}}>{msg}</div>{btn&&<button onClick={onClick} style={{background:"#1e3a5f",color:"white",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,cursor:"pointer",fontSize:14}}>{btn}</button>}</div>; }

const emptyOV = {id:"",num_ov:"",clienteId:"",serie:"",folio:"",toneladas:0,fecha_carga:todayISO(),fecha_entrega:"",status:"ov_asignada",confirm:"por_confirmar",motivo:"",remision_firmada:false,notas:""};
const emptyCliente = {id:"",nombre:"",precio_ton:"",anticipo:0,telefono:""};

function getWeekRange(offset=0) {
  const d=new Date(); d.setDate(d.getDate()+offset*7);
  const day=d.getDay(); const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon.toISOString().slice(0,10),end:sun.toISOString().slice(0,10)};
}

function App() {
  const [dbReady,setDbReady]         = useState(!!window.__dbReady);
  const [clientes,setClientes]       = useState([]);
  const [ovs,setOVs]                 = useState([]);
  const [loading,setLoading]         = useState(true);
  const [tab,setTab]                 = useState("ordenes");
  const [selected,setSelected]       = useState(null);
  const [showForm,setShowForm]       = useState(false);
  const [showCliForm,setShowCliForm] = useState(false);
  const [form,setForm]               = useState(emptyOV);
  const [cliForm,setCliForm]         = useState(emptyCliente);
  const [weekOffset,setWeekOffset]   = useState(1);
  const [filtroCliente,setFiltroCliente]       = useState("");
  const [reporteCliente,setReporteCliente]     = useState("");
  const [reporteMes,setReporteMes]             = useState(currentYM());
  const [plantaExpandida,setPlantaExpandida]   = useState({});
  const [editingAnticipo,setEditingAnticipo]   = useState(null); // {cliId,realIdx,fecha,monto}

  useEffect(()=>{
    if(!dbReady){window.addEventListener("dbReady",()=>setDbReady(true)); return;}
    const db=window.__db;
    const u1=window.__onSnapshot(window.__col(db,"clientes"),snap=>{setClientes(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);});
    const u2=window.__onSnapshot(window.__col(db,"ovs"),snap=>{setOVs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.fecha_carga||"").localeCompare(a.fecha_carga||"")));});
    return ()=>{u1();u2();};
  },[dbReady]);

  const saveToDb    = async (col,id,data)=>{ const {id:_,...rest}=data; await window.__setDoc(window.__doc(window.__db,col,id),rest); };
  const deleteFromDb= async (col,id)    =>{ await window.__deleteDoc(window.__doc(window.__db,col,id)); };

  const cliById = (id) => clientes.find(c=>c.id===id)||null;
  const valorOV = (p)  => { const c=cliById(p.clienteId); return c?(parseFloat(p.toneladas)||0)*(parseFloat(c.precio_ton)||0):0; };

  const estadoCuenta = useMemo(()=>clientes.map(c=>{
    const ent=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado");
    const ton=ent.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
    const val=ton*(parseFloat(c.precio_ton)||0);
    return {...c,ton_entregadas:ton,valor_entregado:val,saldo:(parseFloat(c.anticipo)||0)-val,num_entregas:ent.length};
  }),[clientes,ovs]);

  const totales = useMemo(()=>{
    const ton      =ovs.filter(p=>p.status==="entregado").reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
    const entVal   =estadoCuenta.reduce((s,c)=>s+c.valor_entregado,0);
    const antVal   =clientes.reduce((s,c)=>s+(parseFloat(c.anticipo)||0),0);
    const sinCli      =ovs.filter(p=>p.status==="remisionada"&&!p.clienteId).length;
    const porConf     =ovs.filter(p=>p.fecha_carga===tomorrowISO()&&p.confirm==="por_confirmar").length;
    const sinRemision =ovs.filter(p=>p.clienteId&&!p.folio&&p.status!=="entregado").length;
    const anticipoBajo=estadoCuenta.filter(c=>c.saldo<200000&&c.saldo>=0&&c.anticipo>0);
    const adeudos     =estadoCuenta.filter(c=>c.saldo<0);
    return {ton,entVal,antVal,saldo:antVal-entVal,sinCli,porConf,sinRemision,anticipoBajo,adeudos};
  },[ovs,clientes,estadoCuenta]);

  /* reporte mensual por planta */
  const reportePlanta = useMemo(()=>{
    const ovsMes = ovs.filter(p=>{
      const fecha = p.fecha_carga||"";
      return fecha.startsWith(reporteMes) && p.status!=="ov_asignada" && p.status!=="fletera_planta";
    });
    const grupos = {};
    ovsMes.forEach(p=>{
      const planta=plantaDeSerie(p.serie);
      if(!grupos[planta]) grupos[planta]=[];
      grupos[planta].push(p);
    });
    return Object.entries(grupos).map(([planta,remisiones])=>({
      planta,
      remisiones: remisiones.sort((a,b)=>(a.fecha_carga||"").localeCompare(b.fecha_carga||"")),
      total_ton: remisiones.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0),
      total_valor: remisiones.reduce((s,p)=>s+valorOV(p),0),
    }));
  },[ovs,reporteMes,clientes]);

  /* meses disponibles para selector */
  const mesesDisponibles = useMemo(()=>{
    const set=new Set(ovs.map(p=>(p.fecha_carga||"").slice(0,7)).filter(Boolean));
    const cur=currentYM(); set.add(cur);
    return [...set].sort().reverse();
  },[ovs]);

  const upd = async (id,patch)=>{
    const p=ovs.find(x=>x.id===id); if(!p) return;
    const updated={...p,...patch};
    setOVs(prev=>prev.map(x=>x.id===id?updated:x));
    setSelected(s=>s&&s.id===id?updated:s);
    await saveToDb("ovs",id,updated);
  };

  const advance     = (id)=>{ const p=ovs.find(x=>x.id===id); if(p&&NEXT[p.status]) upd(id,{status:NEXT[p.status]}); };
  const confirmar   = (id)=>upd(id,{confirm:"confirmado",motivo:""});
  const reprogramar = (id)=>{
    const m0=prompt(`Motivo:\n${MOTIVOS.map((m,i)=>`${i+1}. ${m}`).join("\n")}\n\nEscribe número o texto:`);
    if(m0===null) return;
    let m=m0.trim(); if(["1","2","3","4"].includes(m)) m=MOTIVOS[+m-1];
    if(m==="Otro"||m===""){const l=prompt("Describe el motivo:"); m=l||"Otro";}
    const f=prompt("Nueva fecha de carga (AAAA-MM-DD):",addDays(todayISO(),2));
    if(!f) return;
    upd(id,{confirm:"reprogramado",motivo:m,fecha_carga:f});
  };
  const saveOV = async ()=>{
    const id=form.id||`OV-${Date.now()}`;
    const otros=ovs.filter(p=>p.id!==id);
    if(otros.some(p=>p.num_ov&&p.num_ov===form.num_ov)){alert(`Ya existe otra OV con el número "${form.num_ov}".`);return;}
    if(form.folio&&otros.some(p=>p.folio&&p.folio===form.folio)){alert(`Ya existe otra OV con el folio de remisión "${form.folio}".`);return;}
    const n={...form,id,toneladas:parseFloat(form.toneladas)||0};
    setOVs(prev=>prev.find(p=>p.id===id)?prev.map(p=>p.id===id?n:p):[n,...prev]);
    await saveToDb("ovs",id,n);
    setShowForm(false); setForm(emptyOV); setSelected(null);
  };
  const deleteOV = async (id)=>{
    if(!confirm("¿Eliminar esta OV?")) return;
    setOVs(prev=>prev.filter(p=>p.id!==id)); setSelected(null);
    await deleteFromDb("ovs",id);
  };
  const saveCliente = async ()=>{
    const id=cliForm.id||`CLI-${Date.now()}`;
    const nc={...cliForm,id,precio_ton:parseFloat(cliForm.precio_ton)||0,anticipo:parseFloat(cliForm.anticipo)||0};
    setClientes(prev=>prev.find(c=>c.id===id)?prev.map(c=>c.id===id?nc:c):[...prev,nc]);
    await saveToDb("clientes",id,nc);
    setShowCliForm(false); setCliForm(emptyCliente);
  };
  const addAnticipo = async (id,monto,fecha)=>{
    const c=clientes.find(x=>x.id===id); if(!c) return;
    const historial=[...(c.historial_anticipos||[]),{fecha,monto}];
    const updated={...c,anticipo:(parseFloat(c.anticipo)||0)+monto,historial_anticipos:historial};
    setClientes(prev=>prev.map(x=>x.id===id?updated:x));
    await saveToDb("clientes",id,updated);
  };
  const deleteAnticipo = async (cliId,realIdx)=>{
    const c=clientes.find(x=>x.id===cliId); if(!c) return;
    const historial=(c.historial_anticipos||[]).filter((_,i)=>i!==realIdx);
    const anticipo=historial.reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
    const updated={...c,anticipo,historial_anticipos:historial};
    setClientes(prev=>prev.map(x=>x.id===cliId?updated:x));
    await saveToDb("clientes",cliId,updated);
  };
  const editAnticipo = async (cliId,realIdx,newFecha,newMonto)=>{
    const c=clientes.find(x=>x.id===cliId); if(!c) return;
    const historial=(c.historial_anticipos||[]).map((a,i)=>i===realIdx?{fecha:newFecha,monto:parseFloat(newMonto)||0}:a);
    const anticipo=historial.reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
    const updated={...c,anticipo,historial_anticipos:historial};
    setClientes(prev=>prev.map(x=>x.id===cliId?updated:x));
    await saveToDb("clientes",cliId,updated);
    setEditingAnticipo(null);
  };

  const ovsFiltrados = filtroCliente
    ? ovs.filter(p=>p.clienteId===filtroCliente).slice().sort((a,b)=>(parseInt(b.folio)||0)-(parseInt(a.folio)||0))
    : ovs;
  const semana       = getWeekRange(weekOffset);
  const ovsSemana    = ovs.filter(p=>p.fecha_carga>=semana.start&&p.fecha_carga<=semana.end).sort((a,b)=>(a.fecha_carga||"").localeCompare(b.fecha_carga||""));
  const porConfirmar = ovs.filter(p=>p.fecha_carga===tomorrowISO()).sort((a,b)=>a.confirm==="por_confirmar"?-1:1);
  const sinCliente   = ovs.filter(p=>!p.clienteId&&p.status!=="entregado");

  const exportExcel = (clienteId)=>{
    if(clienteId){ const c=estadoCuenta.find(ec=>ec.id===clienteId); if(c) exportExcelCliente(c); return; }
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.json_to_sheet(ovs.map(p=>({
      "No. OV":p.num_ov, Cliente:cliById(p.clienteId)?.nombre||"(sin asignar)",
      Planta:plantaDeSerie(p.serie), Serie:p.serie, Folio:p.folio,
      Toneladas:p.toneladas, "Precio/ton":cliById(p.clienteId)?.precio_ton||"", Valor:valorOV(p),
      "Fecha carga":p.fecha_carga, "Fecha entrega":p.fecha_entrega,
      Estatus:getS(p.status).label, "Remisión firmada":p.remision_firmada?"Sí":"No", Notas:p.notas,
    })));
    XLSX.utils.book_append_sheet(wb,ws,"Órdenes de venta");
    const wc=XLSX.utils.json_to_sheet(estadoCuenta.map(c=>({
      Cliente:c.nombre,"Precio/ton":c.precio_ton,"Ton entregadas":c.ton_entregadas,
      "Valor entregado":c.valor_entregado,Anticipo:c.anticipo,
      "Saldo a favor":c.saldo>0?c.saldo:0,Adeudo:c.saldo<0?-c.saldo:0,
    })));
    XLSX.utils.book_append_sheet(wb,wc,"Estado de cuenta");
    XLSX.writeFile(wb,`Reporte_Todos_${todayISO()}.xlsx`);
  };

  const exportExcelCliente = async (cuenta)=>{
    const clienteData=cliById(cuenta.id);
    const remisiones=ovs.filter(p=>p.clienteId===cuenta.id&&p.status==="entregado").sort((a,b)=>(a.fecha_entrega||"").localeCompare(b.fecha_entrega||""));
    const historial=clienteData?.historial_anticipos||[];

    const wb=new ExcelJS.Workbook();
    wb.creator="Cruz Azul — Antonio";
    const ws=wb.addWorksheet(cuenta.nombre.slice(0,31));
    ws.columns=[{width:22},{width:14},{width:14},{width:12},{width:14},{width:15}];

    const N=6;
    const mergeRow=(rn)=>ws.mergeCells(rn,1,rn,N);
    const fill=(hex)=>({type:"pattern",pattern:"solid",fgColor:{argb:"FF"+hex}});
    const fw=(hex,sz=10,bold=false)=>({bold,color:{argb:"FF"+hex},size:sz});
    const mid={horizontal:"center",vertical:"middle"};
    const NAVY="1E3A5F",BLUE="1D4ED8",LGRAY="E2E8F0",ALTGRAY="F1F5F9",
          GBG="DCFCE7",GFG="166534",RBG="FEE2E2",RFG="991B1B";

    // Título
    let r=ws.addRow([`REPORTE — ${cuenta.nombre.toUpperCase()}`]);
    mergeRow(r.number); r.height=30;
    Object.assign(r.getCell(1),{value:`REPORTE — ${cuenta.nombre.toUpperCase()}`,font:fw("FFFFFF",14,true),fill:fill(NAVY),alignment:mid});

    r=ws.addRow([`Distribuidora Cruz Azul — ${todayISO()}`]);
    mergeRow(r.number); r.height=18;
    Object.assign(r.getCell(1),{font:fw("475569",10),fill:fill(LGRAY),alignment:mid});

    ws.addRow([]);

    // Sección remisiones
    r=ws.addRow(["REMISIONES ENTREGADAS"]);
    mergeRow(r.number); r.height=20;
    Object.assign(r.getCell(1),{font:fw("FFFFFF",11,true),fill:fill(BLUE),alignment:mid});

    r=ws.addRow(["Serie-Folio","Fecha carga","Fecha entrega","Toneladas","Precio/ton","Monto"]);
    r.height=18;
    for(let c=1;c<=N;c++) Object.assign(r.getCell(c),{font:fw("FFFFFF",10,true),fill:fill(NAVY),alignment:mid});

    if(remisiones.length===0){
      r=ws.addRow(["Sin remisiones entregadas"]); mergeRow(r.number);
      Object.assign(r.getCell(1),{font:{...fw("94A3B8",10),italic:true},alignment:mid});
    } else {
      let totalTon=0;
      remisiones.forEach((p,i)=>{
        const ton=parseFloat(p.toneladas)||0, precio=parseFloat(cuenta.precio_ton)||0, monto=ton*precio;
        totalTon+=ton;
        r=ws.addRow([`${p.serie||"—"}-${p.folio||"s/f"}`,p.fecha_carga||"—",p.fecha_entrega||"—",ton,precio,monto]);
        const bg=i%2===1?ALTGRAY:"FFFFFF";
        for(let c=1;c<=N;c++){
          r.getCell(c).fill=fill(bg);
          if(c===4){r.getCell(c).numFmt="0.00"; r.getCell(c).alignment={horizontal:"right"};}
          if(c===5||c===6){r.getCell(c).numFmt='"$"#,##0'; r.getCell(c).alignment={horizontal:"right"};}
        }
      });
      r=ws.addRow(["","","TOTAL",totalTon,"",cuenta.valor_entregado]); r.height=18;
      for(let c=1;c<=N;c++){
        r.getCell(c).font=fw("1E293B",10,true); r.getCell(c).fill=fill(LGRAY);
        if(c===4){r.getCell(c).numFmt="0.00"; r.getCell(c).alignment={horizontal:"right"};}
        if(c===6){r.getCell(c).numFmt='"$"#,##0'; r.getCell(c).alignment={horizontal:"right"};}
      }
    }

    ws.addRow([]);

    // Sección anticipos
    r=ws.addRow(["ANTICIPOS / PAGOS"]);
    mergeRow(r.number); r.height=20;
    Object.assign(r.getCell(1),{font:fw("FFFFFF",11,true),fill:fill(BLUE),alignment:mid});

    r=ws.addRow(["Fecha","Monto"]); r.height=18;
    for(let c=1;c<=2;c++) Object.assign(r.getCell(c),{font:fw("FFFFFF",10,true),fill:fill(NAVY),alignment:mid});

    if(historial.length===0){
      r=ws.addRow(["Sin anticipos registrados"]); mergeRow(r.number);
      Object.assign(r.getCell(1),{font:{...fw("94A3B8",10),italic:true},alignment:mid});
    } else {
      historial.forEach((a,i)=>{
        const bg=i%2===1?ALTGRAY:"FFFFFF";
        r=ws.addRow([a.fecha||"—",parseFloat(a.monto)||0]);
        r.getCell(1).fill=fill(bg);
        r.getCell(2).fill=fill(bg); r.getCell(2).numFmt='"$"#,##0'; r.getCell(2).alignment={horizontal:"right"};
      });
    }

    ws.addRow([]); ws.addRow([]);

    // Resumen
    r=ws.addRow(["RESUMEN"]);
    mergeRow(r.number); r.height=20;
    Object.assign(r.getCell(1),{font:fw("FFFFFF",11,true),fill:fill(BLUE),alignment:mid});

    const addR=(label,val,fmt)=>{
      const row=ws.addRow([label,val]); row.height=18;
      row.getCell(1).font=fw("1E293B",10,true); row.getCell(1).fill=fill(LGRAY);
      row.getCell(2).fill=fill(LGRAY); if(fmt) row.getCell(2).numFmt=fmt;
      row.getCell(2).alignment={horizontal:"right"};
    };
    addR("Total entregado (ton):",parseFloat(cuenta.ton_entregadas)||0,"0.00");
    addR("Total entregado ($):",cuenta.valor_entregado,'"$"#,##0');
    addR("Total pagado (anticipos):",parseFloat(cuenta.anticipo)||0,'"$"#,##0');

    const pos=cuenta.saldo>=0;
    r=ws.addRow([pos?"✓ Saldo a favor":"⚠ Adeudo",Math.abs(cuenta.saldo)]); r.height=24;
    const sc=pos?[GFG,GBG]:[RFG,RBG];
    r.getCell(1).font=fw(sc[0],12,true); r.getCell(1).fill=fill(sc[1]);
    r.getCell(2).font=fw(sc[0],12,true); r.getCell(2).fill=fill(sc[1]); r.getCell(2).numFmt='"$"#,##0'; r.getCell(2).alignment={horizontal:"right"};

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`Reporte_${cuenta.nombre.replace(/ /g,"_")}_${todayISO()}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  };

  const exportExcelPlanta = ()=>{
    const wb=XLSX.utils.book_new();
    reportePlanta.forEach(({planta,remisiones,total_ton})=>{
      const rows=remisiones.map(p=>({
        "Fecha carga":p.fecha_carga,
        Serie:p.serie||"", Folio:p.folio||"",
        Toneladas:parseFloat(p.toneladas)||0,
      }));
      rows.push({"Fecha carga":"TOTAL","Serie":"","Folio":"","Toneladas":total_ton});
      const ws=XLSX.utils.json_to_sheet(rows);
      XLSX.utils.book_append_sheet(wb,ws,planta.slice(0,31));
    });
    XLSX.writeFile(wb,`Reporte_Plantas_${reporteMes}.xlsx`);
  };

  const reporteWA = (clienteId)=>{
    const cuentas=clienteId?estadoCuenta.filter(c=>c.id===clienteId):estadoCuenta;
    let t=`*REPORTE SEMANAL — ${todayISO()}*\n_Distribuidora Cruz Azul_\n\n`;
    cuentas.forEach(c=>{
      t+=`*${c.nombre}*\nEntregado: ${fmtT(c.ton_entregadas)} ton (${fmt(c.valor_entregado)})\n`;
      if(clienteId){
        const entregas=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado").sort((a,b)=>(a.fecha_entrega||"").localeCompare(b.fecha_entrega||""));
        entregas.forEach(p=>{ t+=`  • ${p.serie||"—"}-${p.folio||"s/f"} | ${p.fecha_entrega||"—"} | ${fmtT(p.toneladas)} ton | ${fmt(valorOV(p))}\n`; });
      }
      t+=`Anticipo: ${fmt(c.anticipo)}\n`;
      t+=c.saldo>=0?`Saldo a favor: ${fmt(c.saldo)}\n\n`:`*Adeudo: ${fmt(-c.saldo)}*\n\n`;
    });
    t+=`_Total entregado: ${fmt(cuentas.reduce((s,c)=>s+c.valor_entregado,0))}_`;
    if(navigator.clipboard) navigator.clipboard.writeText(t);
    window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,"_blank");
  };

  const reporteWAPlanta = ()=>{
    let t=`*REPORTE MENSUAL POR PLANTA — ${mesLabel(reporteMes)}*\n_Distribuidora Cruz Azul_\n\n`;
    reportePlanta.forEach(({planta,remisiones,total_ton})=>{
      t+=`*🏭 ${planta}*\n`;
      remisiones.forEach(p=>{
        t+=`• ${p.fecha_carga} | ${p.serie||"—"}-${p.folio||"s/f"} | ${fmtT(p.toneladas)} ton\n`;
      });
      t+=`*Total: ${fmtT(total_ton)} ton*\n\n`;
    });
    if(navigator.clipboard) navigator.clipboard.writeText(t);
    window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,"_blank");
  };

  const inS={width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:14,boxSizing:"border-box",outline:"none"};
  const ClienteSelect=({p})=>(
    <select value={p.clienteId||""} onChange={e=>{e.stopPropagation();upd(p.id,{clienteId:e.target.value});}} onClick={e=>e.stopPropagation()} style={{...inS,padding:"5px 8px",fontSize:12,marginTop:6}}>
      <option value="">— Asignar cliente —</option>
      {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(c.precio_ton)}/ton)</option>)}
    </select>
  );

  if(!dbReady||loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>🔄</div>

    </div>

  return (

      {/* HEADER */}
      <div style={{background:"#1e3a5f",color:"white",padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,boxShadow:"0 2px 12px #00000030"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:"#e63946",borderRadius:8,padding:"6px 10px",fontWeight:900,fontSize:13}}>CA</div>
          <div><div style={{fontWeight:700,fontSize:16}}>Distribuidora Cruz Azul</div><div style={{fontSize:11,opacity:0.7}}>Panel de Operaciones — Antonio</div></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>exportExcel("")} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>⬇ Excel</button>
          <button onClick={()=>{setForm({...emptyOV,fecha_carga:todayISO()});setShowForm(true);}} style={{background:"#e63946",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ OV</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{background:"white",borderBottom:"2px solid #e2e8f0",padding:"0 16px",display:"flex",overflowX:"auto"}}>

          <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",borderBottom:tab===k?"3px solid #1e3a5f":"3px solid transparent",padding:"12px 14px",cursor:"pointer",fontWeight:tab===k?700:500,color:tab===k?"#1e3a5f":"#64748b",fontSize:13,whiteSpace:"nowrap"}}>{l}</button>

      </div>

      <div style={{padding:18,maxWidth:980,margin:"0 auto"}}>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:18}}>
          {[
            {l:"Por confirmar mañana",v:totales.porConf,           a:totales.porConf>0?"#d97706":"#16a34a"},
            {l:"Sin cliente asignado",v:totales.sinCli,            a:totales.sinCli>0?"#0891b2":"#16a34a"},
            {l:"Sin remisión",        v:totales.sinRemision,        a:totales.sinRemision>0?"#d97706":"#16a34a"},

              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{c.l}</div>

                              <div style={{fontSize:12,color:"#64748b"}}>{p.serie?`${p.serie}-${p.folio||"s/f"} · `:""}{p.toneladas>0?`${p.toneladas} ton`:"ton pendiente"}{c&&p.toneladas>0?` · ${fmt(valorOV(p))}`:""}</div>
                              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>🏭 {p.fecha_carga}{p.fecha_entrega?` · 🚚 ${p.fecha_entrega}`:""}</div>
                              {!c&&["remisionada","en_camino"].includes(p.status)&&<ClienteSelect p={p}/>}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>

                              {p.status==="entregado"&&<span style={{fontSize:11,color:p.remision_firmada?"#16a34a":"#d97706",fontWeight:700}}>{p.remision_firmada?"✓ Firmada":"⚠ Falta firma"}</span>}
                            </div>
                          </div>
                        </div>

        {/* ---- CONFIRMAR MAÑANA ---- */}

            {porConfirmar.length===0

        {tab==="clientes"&&(

            {clientes.length===0

                {/* ALERTAS DE ANTICIPO */}

                  </div>

                {totales.anticipoBajo.length>0&&(
                  <div style={{background:"#fff7ed",borderRadius:10,padding:"12px 16px",borderLeft:"4px solid #f97316",fontSize:13}}>
                    <div style={{fontWeight:700,color:"#c2410c",marginBottom:6}}>🟠 Anticipo bajo (menos de $200,000)</div>
                    {totales.anticipoBajo.map(c=><div key={c.id} style={{color:"#92400e",marginBottom:2}}>{c.nombre} — saldo restante: <b>{fmt(c.saldo)}</b></div>)}
                  </div>

                {estadoCuenta.map(c=>(
                  <div key={c.id} style={{background:"white",borderRadius:10,padding:"16px",boxShadow:"0 1px 4px #00000010",borderLeft:`4px solid ${c.saldo>=0?"#16a34a":"#ef4444"}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                      <div><div style={{fontWeight:700,fontSize:16}}>{c.nombre}</div><div style={{fontSize:12,color:"#64748b"}}>Precio: {fmt(c.precio_ton)}/ton · {c.num_entregas} entregas{c.telefono?` · 📞 ${c.telefono}`:""}</div></div>
                      <button onClick={()=>{setCliForm(c);setShowCliForm(true);}} style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer",color:"#1e3a5f"}}>✏️</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginTop:12}}>
                      <div style={{background:"#f8fafc",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#94a3b8"}}>Entregado</div><div style={{fontWeight:700}}>{fmtT(c.ton_entregadas)} ton</div><div style={{fontSize:11,color:"#64748b"}}>{fmt(c.valor_entregado)}</div></div>
                      <div style={{background:"#f0fdf4",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#94a3b8"}}>Anticipo</div><div style={{fontWeight:700,color:"#16a34a"}}>{fmt(c.anticipo)}</div></div>
                      <div style={{background:c.saldo>=0?"#eff6ff":"#fef2f2",borderRadius:8,padding:"8px 10px"}}><div style={{fontSize:10,color:"#94a3b8"}}>{c.saldo>=0?"Saldo a favor":"Adeudo"}</div><div style={{fontWeight:800,color:c.saldo>=0?"#2563eb":"#ef4444"}}>{fmt(Math.abs(c.saldo))}</div></div>
                    </div>
                    <button onClick={()=>{
                      const m=parseFloat(prompt(`Monto del depósito para ${c.nombre} ($):`));

                              <input type="date" value={editingAnticipo.fecha} onChange={e=>setEditingAnticipo(p=>({...p,fecha:e.target.value}))} style={{...inS,fontSize:11,padding:"3px 6px",flex:"1 1 90px"}}/>
                              <input type="number" value={editingAnticipo.monto} onChange={e=>setEditingAnticipo(p=>({...p,monto:e.target.value}))} style={{...inS,fontSize:11,padding:"3px 6px",flex:"1 1 80px"}} placeholder="Monto"/>

                            </div>
                          );
                        })}

                  </div>
                ))}
              </div>
            }
          </>

        {/* ---- PROGRAMACIÓN ---- */}
        {tab==="programacion"&&(
          <>
            <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
              <button onClick={()=>setWeekOffset(w=>w-1)} style={{background:"white",border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 12px",cursor:"pointer"}}>←</button>

            </div>
            {ovsSemana.length===0
              ?<EmptyState icon="📅" msg="Sin cargas programadas para esta semana." btn="+ Nueva OV" onClick={()=>{setForm({...emptyOV,fecha_carga:semana.start});setShowForm(true);}}/>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {ovsSemana.map(p=>{
                  const c=cliById(p.clienteId);
                  return(
                    <div key={p.id} onClick={()=>setSelected(p)} style={{background:"white",borderRadius:10,padding:"12px 14px",boxShadow:"0 1px 4px #00000010",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                      <div>
                        <div style={{fontSize:12,color:"#7c3aed",fontWeight:700,textTransform:"capitalize"}}>{diaLabel(p.fecha_carga)} · {p.num_ov}</div>
                        <div style={{fontWeight:700}}>{c?c.nombre:"Sin cliente"}</div>
                        <div style={{fontSize:12,color:"#64748b"}}>{p.toneladas>0?`${p.toneladas} ton`:"ton pendiente"}{p.serie?` · ${plantaDeSerie(p.serie)}`:""}</div>
                      </div>
                      <ConfirmBadge c={p.confirm}/>
                    </div>
                  );
                })}
              </div>
            }
          </>
        )}

        {/* ---- REPORTE CLIENTES ---- */}
        {tab==="reporte"&&(
          <>
            <div style={{background:"#f0fdf4",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#15803d"}}>📊 <b>Reporte semanal por cliente</b> — selecciona uno o deja "Todos".</div>
            <div style={{marginBottom:14}}>
              <select value={reporteCliente} onChange={e=>setReporteCliente(e.target.value)} style={{...inS,background:"white"}}>
                <option value="">— Todos los clientes —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              <button onClick={()=>exportExcel(reporteCliente)} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>⬇ {reporteCliente?`Excel — ${cliById(reporteCliente)?.nombre}`:"Excel — Todos"}</button>
              <button onClick={()=>reporteWA(reporteCliente)} style={{background:"#25D366",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>💬 {reporteCliente?`WhatsApp — ${cliById(reporteCliente)?.nombre}`:"WhatsApp — Todos"}</button>
            </div>
            {clientes.length===0
              ?<EmptyState icon="📊" msg="Agrega clientes para ver el reporte."/>
              :<div style={{background:"white",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px #00000010"}}>
                <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",background:"#1e3a5f",color:"white",padding:"10px 14px",fontSize:11,fontWeight:700}}>
                  <div>Cliente</div><div style={{textAlign:"right"}}>Entregado</div><div style={{textAlign:"right"}}>Anticipo</div><div style={{textAlign:"right"}}>Saldo</div>
                </div>
                {(reporteCliente?estadoCuenta.filter(c=>c.id===reporteCliente):estadoCuenta).map((c,i)=>(
                  <div key={c.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 1fr",padding:"11px 14px",fontSize:12,borderTop:"1px solid #f1f5f9",background:i%2?"#fafafa":"white"}}>
                    <div style={{fontWeight:600}}>{c.nombre}<div style={{fontSize:10,color:"#94a3b8"}}>{fmtT(c.ton_entregadas)} ton</div></div>
                    <div style={{textAlign:"right"}}>{fmt(c.valor_entregado)}</div>
                    <div style={{textAlign:"right",color:"#16a34a"}}>{fmt(c.anticipo)}</div>
                    <div style={{textAlign:"right",fontWeight:700,color:c.saldo>=0?"#2563eb":"#ef4444"}}>{c.saldo>=0?fmt(c.saldo):`-${fmt(-c.saldo)}`}</div>
                  </div>
                ))}
              </div>
            }
          </>
        )}

        {/* ---- REPORTE PLANTAS ---- */}
        {tab==="plantas"&&(
          <>
            <div style={{background:"#f5f3ff",borderRadius:10,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#5b21b6"}}>🏭 <b>Reporte mensual por planta</b> — cemento retirado a pagar a Cruz Azul. La planta se detecta automáticamente por la serie (PU = Puebla, AG = Aguascalientes).</div>

            {/* SELECTOR MES */}
            <div style={{marginBottom:14}}>
              <select value={reporteMes} onChange={e=>setReporteMes(e.target.value)} style={{...inS,background:"white"}}>
                {mesesDisponibles.map(ym=><option key={ym} value={ym}>{mesLabel(ym)}</option>)}
              </select>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
              <button onClick={exportExcelPlanta} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>⬇ Excel por planta</button>
              <button onClick={reporteWAPlanta} style={{background:"#25D366",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>💬 WhatsApp</button>
            </div>

            {reportePlanta.length===0
              ?<EmptyState icon="🏭" msg={`Sin remisiones registradas para ${mesLabel(reporteMes)}.`}/>
              :<div style={{display:"flex",flexDirection:"column",gap:14}}>
                {reportePlanta.map(({planta,remisiones,total_ton,total_valor})=>(
                  <div key={planta} style={{background:"white",borderRadius:10,overflow:"hidden",boxShadow:"0 1px 4px #00000010"}}>
                    {/* HEADER PLANTA */}
                    <div onClick={()=>setPlantaExpandida(p=>({...p,[planta]:!p[planta]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",background:plantaBg[planta]||"#f1f5f9",cursor:"pointer"}}>
                      <div>
                        <div style={{fontWeight:800,fontSize:15,color:plantaColor[planta]||"#1e293b"}}>🏭 {planta}</div>
                        <div style={{fontSize:12,color:"#64748b",marginTop:2}}>{remisiones.length} remisiones</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontWeight:800,fontSize:22,color:plantaColor[planta]||"#1e293b"}}>{fmtT(total_ton)}</div>
                        <div style={{fontSize:11,color:"#64748b"}}>toneladas</div>
                      </div>
                    </div>
                    {/* DETALLE */}
                    {plantaExpandida[planta]&&(
                      <div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr 1fr",padding:"8px 16px",background:"#f8fafc",fontSize:11,fontWeight:700,color:"#64748b"}}>
                          <div>Serie-Folio</div><div style={{textAlign:"right"}}>Ton</div><div style={{paddingLeft:8}}>Cliente</div><div style={{textAlign:"right"}}>Fecha</div>
                        </div>
                        {remisiones.map((p,i)=>{
                          const c=cliById(p.clienteId);
                          return(
                            <div key={p.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr 1fr",padding:"9px 16px",fontSize:12,borderTop:"1px solid #f1f5f9",background:i%2?"#fafafa":"white"}}>
                              <div style={{fontWeight:600,color:"#7c3aed"}}>{p.serie||"—"}-{p.folio||"s/f"}</div>
                              <div style={{textAlign:"right",fontWeight:700}}>{fmtT(p.toneladas)}</div>
                              <div style={{paddingLeft:8,color:"#64748b"}}>{c?c.nombre:"sin cliente"}</div>
                              <div style={{textAlign:"right",color:"#94a3b8"}}>{p.fecha_carga}</div>
                            </div>
                          );
                        })}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 2fr 1fr",padding:"10px 16px",borderTop:"2px solid #e2e8f0",background:plantaBg[planta]||"#f1f5f9"}}>
                          <div style={{fontWeight:800,color:plantaColor[planta]}}>TOTAL</div>
                          <div style={{textAlign:"right",fontWeight:800,color:plantaColor[planta]}}>{fmtT(total_ton)} ton</div>
                          <div></div>
                          <div></div>
                        </div>
                      </div>
                    )}
                    {!plantaExpandida[planta]&&(
                      <div onClick={()=>setPlantaExpandida(p=>({...p,[planta]:true}))} style={{padding:"8px 16px",fontSize:12,color:"#94a3b8",cursor:"pointer",textAlign:"center"}}>
                        Ver {remisiones.length} remisiones ▼
                      </div>
                    )}
                  </div>
                ))}
              </div>
            }
          </>
        )}
      </div>

      {/* DETAIL PANEL */}
      {selected&&!showForm&&(()=>{
        const c=cliById(selected.clienteId);
        return(
          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"white",borderTop:"2px solid #e2e8f0",padding:"18px 20px",boxShadow:"0 -4px 20px #00000015",maxHeight:"62vh",overflowY:"auto",zIndex:100}}>
            <div style={{maxWidth:700,margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:14,color:"#7c3aed"}}>{selected.num_ov}</div>
                  <div style={{fontWeight:800,fontSize:16}}>{c?c.nombre:"Sin cliente asignado"}</div>
                  <div style={{fontSize:12,color:"#64748b"}}>{selected.serie?`${selected.serie}-${selected.folio||"s/f"} · `:""}{selected.toneladas>0?`${selected.toneladas} ton`:"ton pendiente"}{c&&selected.toneladas>0?` · ${fmt(valorOV(selected))}`:""}</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>🏭 {diaLabel(selected.fecha_carga)}{selected.fecha_entrega?` · 🚚 ${diaLabel(selected.fecha_entrega)}`:""}</div>
                  {selected.serie&&<div style={{marginTop:4}}><PlantaBadge serie={selected.serie}/></div>}
                  <div style={{fontSize:11,color:"#64748b",marginTop:4,fontStyle:"italic"}}>{getS(selected.status).hint}</div>
                  {selected.motivo&&<div style={{fontSize:12,color:"#dc2626",marginTop:3}}>↻ {selected.motivo}</div>}
                </div>
                <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}}>✕</button>
              </div>
              {!c&&<div style={{marginBottom:10}}><ClienteSelect p={selected}/></div>}
              {selected.notas&&<div style={{background:"#fffbeb",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#92400e",margin:"10px 0"}}>📝 {selected.notas}</div>}
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {selected.confirm!=="confirmado"&&["ov_asignada","fletera_planta"].includes(selected.status)&&<button onClick={()=>confirmar(selected.id)} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>✓ Confirmar</button>}
                {NEXT[selected.status]&&<button onClick={()=>advance(selected.id)} style={{background:"#1e3a5f",color:"white",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>{NEXT_LABEL[selected.status]}</button>}
                <button onClick={()=>reprogramar(selected.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>↻ Reprogramar</button>
                {selected.status==="entregado"&&<button onClick={()=>upd(selected.id,{remision_firmada:!selected.remision_firmada})} style={{background:selected.remision_firmada?"#f1f5f9":"#7c3aed",color:selected.remision_firmada?"#64748b":"white",border:"none",borderRadius:8,padding:"9px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>{selected.remision_firmada?"↩ Quitar firma":"✓ Remisión firmada"}</button>}
                <button onClick={()=>{setForm(selected);setShowForm(true);setSelected(null);}} style={{background:"#f1f5f9",color:"#1e3a5f",border:"1px solid #e2e8f0",borderRadius:8,padding:"9px 16px",fontWeight:600,cursor:"pointer",fontSize:13}}>✏️ Editar</button>
                <button onClick={()=>deleteOV(selected.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,padding:"9px 16px",fontWeight:600,cursor:"pointer",fontSize:13}}>🗑 Eliminar</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* OV FORM */}
      {showForm&&(
        <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,padding:"22px 20px",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>{form.id?"Editar OV":"Nueva Orden de Venta"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>No. de OV</label><input value={form.num_ov} onChange={e=>setForm(f=>({...f,num_ov:e.target.value}))} style={inS} placeholder="OV-XXXXX"/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Fecha de carga</label><input type="date" value={form.fecha_carga} onChange={e=>setForm(f=>({...f,fecha_carga:e.target.value}))} style={inS}/></div>
            </div>
            <div style={{marginTop:10}}>
              <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Cliente (opcional)</label>
              <select value={form.clienteId} onChange={e=>setForm(f=>({...f,clienteId:e.target.value}))} style={inS}>
                <option value="">— Sin asignar —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(c.precio_ton)}/ton)</option>)}
              </select>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginTop:10}}>
              <div>
                <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Serie (PU/AG…)</label>
                <input value={form.serie} onChange={e=>setForm(f=>({...f,serie:e.target.value}))} style={inS} placeholder="PU, AG…"/>
                {form.serie&&<div style={{fontSize:11,color:plantaColor[plantaDeSerie(form.serie)]||"#64748b",marginTop:4}}>🏭 {plantaDeSerie(form.serie)}</div>}
              </div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Folio remisión</label><input value={form.folio} onChange={e=>setForm(f=>({...f,folio:e.target.value}))} style={inS}/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Ton pesadas</label><input type="number" step="0.01" value={form.toneladas} onChange={e=>setForm(f=>({...f,toneladas:e.target.value}))} style={inS}/></div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:10}}>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Fecha de entrega</label><input type="date" value={form.fecha_entrega} onChange={e=>setForm(f=>({...f,fecha_entrega:e.target.value}))} style={inS}/></div>
              <div><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Estatus</label>
                <select value={form.status} onChange={e=>setForm(f=>({...f,status:e.target.value}))} style={inS}>
                  {STATUSES.map(s=><option key={s.key} value={s.key}>{s.label}</option>)}
                </select>
              </div>
            </div>
            <div style={{marginTop:10,marginBottom:16}}><label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Notas</label><input value={form.notas} onChange={e=>setForm(f=>({...f,notas:e.target.value}))} style={inS}/></div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveOV} disabled={!form.num_ov} style={{flex:1,background:form.num_ov?"#1e3a5f":"#cbd5e1",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:form.num_ov?"pointer":"default",fontSize:14}}>Guardar</button>
              <button onClick={()=>setShowForm(false)} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* CLIENTE FORM */}
      {showCliForm&&(
        <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"white",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:500,padding:"22px 20px"}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>{cliForm.id?"Editar cliente":"Nuevo cliente"}</div>
            {[["nombre","Nombre del cliente","text"],["telefono","Teléfono (opcional)","tel"],["precio_ton","Precio por tonelada ($)","number"],["anticipo","Anticipo inicial ($)","number"]].map(([k,l,t])=>(
              <div key={k} style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>{l}</label>
                <input type={t} value={cliForm[k]} onChange={e=>setCliForm(f=>({...f,[k]:e.target.value}))} style={inS}/>
              </div>
            ))}
            <div style={{display:"flex",gap:10,marginTop:6}}>
              <button onClick={saveCliente} disabled={!cliForm.nombre} style={{flex:1,background:cliForm.nombre?"#1e3a5f":"#cbd5e1",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:cliForm.nombre?"pointer":"default",fontSize:14}}>Guardar</button>
              <button onClick={()=>setShowCliForm(false)} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
