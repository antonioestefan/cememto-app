            {gdStep==="auth"&&(!window.__GOOGLE_CLIENT_ID?(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:36,marginBottom:10}}>⚙️</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Configuración requerida</div>
                <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.8,textAlign:"left",background:"#243447",borderRadius:10,padding:"14px 16px"}}>
                  <b>Pasos para conectar Google Drive:</b><br/>
                  1. Ve a <b>console.cloud.google.com</b> → crea/selecciona un proyecto → habilita la <b>Google Drive API</b><br/>
                  2. Ve a Credenciales → Crear credenciales → <b>ID de cliente de OAuth</b> → Tipo: <i>Aplicación web</i><br/>
                  3. En "Orígenes autorizados de JavaScript" agrega <code style={{background:"#0F172A",padding:"1px 6px",borderRadius:4}}>{window.location.origin}</code><br/>
                  4. Copia el <b>Client ID</b> (y opcionalmente crea una API Key restringida a la Drive API)<br/>
                  5. En <code style={{background:"#0F172A",padding:"1px 6px",borderRadius:4}}>index.html</code> busca <code style={{background:"#0F172A",padding:"1px 6px",borderRadius:4}}>window.__GOOGLE_CLIENT_ID = ""</code> y pega el Client ID (y la API Key en <code style={{background:"#0F172A",padding:"1px 6px",borderRadius:4}}>window.__GOOGLE_API_KEY</code>)
                </div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"28px 0"}}>
                <div style={{fontSize:40,marginBottom:12}}>🗂️</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Conectar con Google Drive</div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:20}}>Inicia sesión con tu cuenta Google</div>
                <button onClick={gdLogin} disabled={gdLoading} style={{background:"#4285F4",color:"white",border:"none",borderRadius:8,padding:"12px 28px",fontWeight:700,cursor:gdLoading?"default":"pointer",fontSize:14}}>
                  {gdLoading?"⏳ Conectando...":"🔑 Iniciar sesión con Google"}
                </button>
              </div>
            ))}

            {gdStep==="folders"&&(
              <div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:12}}>Selecciona la carpeta del cliente:</div>
                {gdFolders.length===0&&<div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"24px 0"}}>No se encontraron subcarpetas en "{GD_ROOT_FOLDER_NAME}"</div>}
                {gdFolders.map(f=>{
                  const match=clientes.find(c=>(c.nombre||"").trim().toLowerCase()===f.name.trim().toLowerCase());
                  const pend=gdPendingCounts[f.id];
                  return(
                    <button key={f.id} onClick={()=>gdSelectFolder(f)} disabled={gdLoading} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"#243447",border:"1px solid #334155",borderRadius:8,padding:"12px 14px",cursor:"pointer",marginBottom:8,color:"#f1f5f9",textAlign:"left",opacity:gdLoading?0.6:1}}>
                      <span style={{fontSize:20}}>📁</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14}}>{f.name}</div>
                        <div style={{fontSize:11,marginTop:2,color:match?"#10B981":"#d97706"}}>{match?`✓ Cliente: ${match.nombre}`:"⚠ Sin coincidencia en catálogo"}</div>
                      </div>
                      {pend?.loading&&<span style={{fontSize:11,color:"#64748b",flexShrink:0}}>⏳</span>}
                      {!pend?.loading&&pend?.count>0&&<span style={{fontSize:11,fontWeight:700,color:"white",background:"#10B981",borderRadius:12,padding:"3px 9px",flexShrink:0}}>{pend.count} nueva{pend.count!==1?"s":""}</span>}
                      {!pend?.loading&&pend?.count===0&&<span style={{fontSize:14,flexShrink:0}}>✅</span>}
                      <span style={{color:"#64748b",fontSize:18}}>›</span>
                    </button>
                  );
                })}
                {gdLoading&&<div style={{textAlign:"center",color:"#64748b",padding:"12px 0",fontSize:13}}>Cargando...</div>}
              </div>
            )}

            {gdStep==="files"&&(()=>{
              const groupsConEstado=gdGroups.map(g=>({g,info:gdProcesadoInfo(g)}));
              const pendientesCount=groupsConEstado.filter(x=>!x.info).length;
              const visibles=gdFiltro==="todas"?groupsConEstado:groupsConEstado.filter(x=>!x.info);
              return (
              <div>
                <button onClick={()=>setGdStep("folders")} style={{background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",marginBottom:12,padding:0}}>← Carpetas</button>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,color:"#94a3b8"}}>
                    {gdGroups.length} remisión{gdGroups.length!==1?"es":""} · <span style={{color:"#f59e0b"}}>{pendientesCount} pendiente{pendientesCount!==1?"s":""}</span>
                  </div>
                  {pendientesCount>0&&<button onClick={gdSelectAll} style={{background:"none",border:"1px solid #334155",color:"#94a3b8",fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer"}}>Sel. todos pendientes</button>}
                </div>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  <button onClick={()=>setGdFiltro("pendientes")} style={{flex:1,background:gdFiltro==="pendientes"?"#10B981":"#243447",color:gdFiltro==="pendientes"?"white":"#94a3b8",border:`1px solid ${gdFiltro==="pendientes"?"#10B981":"#334155"}`,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🆕 Solo nuevas</button>
                  <button onClick={()=>setGdFiltro("todas")} style={{flex:1,background:gdFiltro==="todas"?"#10B981":"#243447",color:gdFiltro==="todas"?"white":"#94a3b8",border:`1px solid ${gdFiltro==="todas"?"#10B981":"#334155"}`,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Todas</button>
                </div>
                {gdGroups.length===0&&<div style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"24px 0"}}>No hay archivos JPG/PNG/PDF en la carpeta Remisiones</div>}
                {gdGroups.length>0&&visibles.length===0&&(
                  <div style={{color:"#10B981",fontSize:13,textAlign:"center",padding:"24px 0"}}>✅ Todo al día — no hay remisiones nuevas para este cliente</div>
                )}
                {visibles.map(({g,info})=>{
                  const done=!!info;
                  const sel=gdSelected.has(g.key);
                  const paginas=g.page2?2:1;
                  const size=(parseInt(g.page1?.size)||0)+(parseInt(g.page2?.size)||0);
                  return(
                    <div key={g.key} onClick={()=>!done&&gdToggle(g.key)} style={{display:"flex",alignItems:"center",gap:10,background:sel?"#10B98118":"#243447",border:`1px solid ${sel?"#10B981":"#334155"}`,borderRadius:8,padding:"10px 12px",marginBottom:6,cursor:done?"default":"pointer"}}>
                      <div style={{fontSize:16,flexShrink:0}}>{done?"✅":"🆕"}</div>
                      {!done&&<div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?"#10B981":"#475569"}`,background:sel?"#10B981":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11}}>{sel?"✓":""}</div>}
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.folioBase} <span style={{color:"#64748b",fontWeight:400}}>({paginas} página{paginas!==1?"s":""})</span></div>
                        {done?<div style={{fontSize:10,color:"#10B981",marginTop:1}}>OV: {info.ovId||"—"} · {info.fecha||""}</div>
                             :<div style={{fontSize:10,color:"#475569",marginTop:1}}>{size?Math.round(size/1024)+"KB":"—"}</div>}
                      </div>
                    </div>
                  );
                })}
                {gdSelected.size>0&&(
                  <button onClick={gdProcess} style={{width:"100%",background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14,marginTop:8}}>
                    🤖 Procesar {gdSelected.size} remisión{gdSelected.size!==1?"es":""} con IA
                  </button>
                )}
              </div>
              );
            })()}

            {gdStep==="processing"&&(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:40,marginBottom:12}}>⏳</div>
                <div style={{fontWeight:700,fontSize:16,color:"#10B981",marginBottom:6}}>Procesando con IA...</div>
                <div style={{fontSize:14,color:"#94a3b8",marginBottom:20}}>Remisión {gdProgress.cur} de {gdProgress.tot}</div>
                <div style={{background:"#243447",borderRadius:8,height:10,overflow:"hidden",margin:"0 20px"}}>
                  <div style={{background:"#10B981",height:"100%",width:`${gdProgress.tot?Math.round(gdProgress.cur/gdProgress.tot*100):0}%`,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:12,color:"#475569",marginTop:10}}>{gdProgress.tot?Math.round(gdProgress.cur/gdProgress.tot*100):0}%</div>
              </div>
            )}

            {gdStep==="confirm"&&(()=>{
              const pendientesConfirmar=gdResults.filter(res=>res.ok&&res.data&&!gdProcesadoInfo(res.group));
              return (
              <div>
                <div style={{fontSize:13,color:"#94a3b8",marginBottom:14}}>Revisa y confirma para crear las OVs:</div>
                {gdResults.map((res)=>{
                  const info=gdProcesadoInfo(res.group);
                  return(
                  <div key={res.group.key} style={{background:"#243447",borderRadius:10,padding:"14px",marginBottom:10,border:`1px solid ${info?"#10B98166":"#334155"}`}}>
                    <div style={{fontWeight:600,fontSize:11,color:"#64748b",marginBottom:8,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>📄 {res.group.folioBase} {res.group.page2?"(2 páginas)":""}</div>
                    {res.ok&&res.data?(
                      <>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                          <div><div style={{fontSize:10,color:"#64748b"}}>No. OV</div><div style={{fontWeight:700,color:"#7c3aed",fontSize:13}}>{res.data.numeroOV||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"#64748b"}}>Remisión</div><div style={{fontWeight:700,color:"#0891b2",fontSize:13}}>{res.group.folioBase||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"#64748b"}}>Fecha</div><div style={{fontWeight:600,fontSize:13}}>{res.data.fecha||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"#64748b"}}>Toneladas</div><div style={{fontWeight:700,color:"#16a34a",fontSize:13}}>{res.data.pesoNeto||"—"} ton</div></div>
                          <div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:"#64748b"}}>Cliente</div><div style={{fontWeight:600,fontSize:13,color:gdSelectedFolder?.clienteNombre?"#10B981":"#d97706"}}>{gdSelectedFolder?.clienteNombre||"⚠ Sin cliente — asigna en la OV después"}</div></div>
                        </div>
                        {res.renameInfo?.ok&&<div style={{fontSize:11,color:"#0891b2",marginBottom:8}}>📝 Archivo renombrado: {res.renameInfo.names.join(", ")}</div>}
                        {res.renameInfo&&!res.renameInfo.ok&&<div style={{fontSize:11,color:"#d97706",marginBottom:8}}>⚠ No se pudo renombrar el archivo en Drive: {res.renameInfo.error}</div>}
                        {!info&&(
                          <div style={{marginBottom:10}}>
                            <label style={{fontSize:10,color:"#64748b",display:"block",marginBottom:3}}>Fecha de entrega *</label>
                            <input type="date" value={gdFechaEntrega[res.group.key]||""} onChange={e=>setGdFechaEntrega(prev=>({...prev,[res.group.key]:e.target.value}))} style={inS}/>
                          </div>
                        )}
                        {info
                          ?<div style={{fontSize:12,color:"#10B981",textAlign:"center",padding:"6px 0",fontWeight:700}}>{info.actualizada?`✅ OV existente actualizada: ${info.ovId}`:`✅ OV creada: ${info.ovId}`}</div>
                          :<button onClick={()=>gdConfirmar(res)} disabled={!gdFechaEntrega[res.group.key]} style={{width:"100%",background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"9px",fontWeight:700,cursor:gdFechaEntrega[res.group.key]?"pointer":"not-allowed",fontSize:13,opacity:gdFechaEntrega[res.group.key]?1:0.5}}>✓ Confirmar y crear OV</button>
                        }
                      </>
                    ):(
                      <div style={{color:"#dc2626",fontSize:12}}>⚠ {res.error||"No se pudo extraer"}</div>
                    )}
                  </div>
                  );
                })}
                <button onClick={()=>setGdStep("files")} style={{width:"100%",background:"#243447",color:"#64748b",border:"none",borderRadius:8,padding:"10px",fontWeight:600,cursor:"pointer",fontSize:13,marginTop:4}}>← Volver a archivos</button>
                {pendientesConfirmar.length>0&&(
                  <div style={{position:"sticky",bottom:0,margin:"14px -20px -22px -20px",padding:"12px 20px 22px",background:"#1e293b",borderTop:"1px solid #334155"}}>
                    <button onClick={gdConfirmarTodos} disabled={gdConfirmandoTodos} style={{width:"100%",background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"13px",fontWeight:800,cursor:gdConfirmandoTodos?"default":"pointer",fontSize:14,opacity:gdConfirmandoTodos?0.7:1}}>
                      {gdConfirmandoTodos?"⏳ Confirmando...":pendientesConfirmar.length===1?"✅ Confirmar y crear OV":`✅ Confirmar todos (${pendientesConfirmar.length})`}
                    </button>
                  </div>
                )}
              </div>
              );
            })()}

          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
