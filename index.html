<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;

const fmt  = (n) => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n||0);
const fmtT = (n) => (parseFloat(n)||0).toFixed(2);
const todayISO   = () => new Date().toISOString().slice(0,10);
const addDays    = (iso,n) => { const d=new Date((iso||todayISO())+"T12:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const tomorrowISO   = () => addDays(todayISO(),1);
const nextWorkdayISO= () => new Date().getDay()===6 ? addDays(todayISO(),2) : addDays(todayISO(),1);
const diaLabel   = (iso) => iso ? new Date(iso+"T12:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"short"}) : "—";
const mesLabel   = (ym)  => { const [y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("es-MX",{month:"long",year:"numeric"}); };
const currentYM  = () => todayISO().slice(0,7);

/* planta por serie */
const PLANTAS = {PU:"Puebla",AG:"Aguascalientes",BQ:"Bodega Querétaro"};
const plantaDeSerie = (serie) => {
  if(!serie) return "Sin planta";
  const prefix = serie.toUpperCase();
  for (const key of Object.keys(PLANTAS)) { if(prefix.startsWith(key)) return PLANTAS[key]; }
  return "Otra";
};
const plantaColor = {Puebla:"#7c3aed",Aguascalientes:"#0891b2","Bodega Querétaro":"#15803d","Sin planta":"#94a3b8",Otra:"#64748b"};
const plantaBg    = {Puebla:"#f5f3ff",Aguascalientes:"#ecfeff","Bodega Querétaro":"#f0fdf4","Sin planta":"#f8fafc",Otra:"#f1f5f9"};
const GRANEL_CONFIG = [{label:"Puebla",color:"#7c3aed"},{label:"Aguascalientes",color:"#0891b2"}];
const SACO_CONFIG   = [{label:"Bodega Querétaro",color:"#15803d"}];

const STATUSES = [
  {key:"ov_asignada",      label:"OV asignada",          color:"#7c3aed",bg:"#f5f3ff",hint:"Permiso de carga de corporativo"},
  {key:"fletera_planta",   label:"Fletera en planta",    color:"#d97706",bg:"#fffbeb",hint:"Tráiler formándose para cargar"},
  {key:"remisionada",      label:"Remisionada",          color:"#0891b2",bg:"#ecfeff",hint:"Cargó y se pesó: folio y tonelaje disponibles"},
  {key:"listo_para_envio", label:"Listo para envío",     color:"#b45309",bg:"#fefce8",hint:"Cemento cargado en espera en base de fletera"},
  {key:"en_camino",        label:"En camino",            color:"#2563eb",bg:"#eff6ff",hint:"En ruta al cliente"},
  {key:"entregado",        label:"Entregado",            color:"#16a34a",bg:"#f0fdf4",hint:"Recibido por el cliente"},
];
const NEXT = {ov_asignada:"fletera_planta",fletera_planta:"remisionada",remisionada:"listo_para_envio",listo_para_envio:"en_camino",en_camino:"entregado"};
const NEXT_LABEL = {ov_asignada:"→ Mandar fletera a planta",fletera_planta:"→ Registrar remisión (cargó)",remisionada:"→ Listo para envío",listo_para_envio:"→ Marcar en camino",en_camino:"→ Confirmar entrega"};
const getS = (k) => STATUSES.find(s=>s.key===k)||STATUSES[0];
const CONFIRM = {
  por_confirmar:{label:"Por confirmar",color:"#d97706",bg:"#fffbeb"},
  confirmado:   {label:"Confirmado",   color:"#16a34a",bg:"#f0fdf4"},
  reprogramado: {label:"Reprogramado", color:"#dc2626",bg:"#fef2f2"},
};
const MOTIVOS = ["Sin dotación en planta","Contratiempo del cliente","Contratiempo de la fletera","Otro"];
const PRIORIDAD = {
  alta: {label:"Alta",  color:"#dc2626",bg:"#fef2f2"},
  media:{label:"Media", color:"#d97706",bg:"#fffbeb"},
  baja: {label:"Baja",  color:"#64748b",bg:"#f8fafc"},
};
const ETAPAS = [
  {key:"contacto",   label:"Contacto inicial",  color:"#7c3aed",bg:"#f5f3ff"},
  {key:"cotizacion", label:"Cotización enviada", color:"#0891b2",bg:"#ecfeff"},
  {key:"negociacion",label:"Negociación",        color:"#d97706",bg:"#fffbeb"},
  {key:"cerrado",    label:"Cerrado",            color:"#16a34a",bg:"#f0fdf4"},
  {key:"perdido",    label:"Perdido",            color:"#dc2626",bg:"#fef2f2"},
];
const ETAPA_NEXT       = {contacto:"cotizacion",cotizacion:"negociacion",negociacion:"cerrado"};
const ETAPA_NEXT_LABEL = {contacto:"→ Enviar cotización",cotizacion:"→ Pasar a negociación",negociacion:"→ Marcar como cerrado"};
const ETAPAS_ACTIVAS   = ["contacto","cotizacion","negociacion"];
const getEtapa = (k)=>ETAPAS.find(e=>e.key===k)||ETAPAS[0];

function Badge({status}) { const s=getS(status); return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>; }
function ConfirmBadge({c}) { const s=CONFIRM[c]||CONFIRM.por_confirmar; return <span style={{background:s.bg,color:s.color,border:`1px solid ${s.color}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{s.label}</span>; }
function PlantaBadge({serie}) { const p=plantaDeSerie(serie); return <span style={{background:plantaBg[p]||"#f1f5f9",color:plantaColor[p]||"#64748b",border:`1px solid ${plantaColor[p]||"#64748b"}30`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>🏭 {p}</span>; }
function EmptyState({icon,msg,btn,onClick}) { return <div style={{textAlign:"center",padding:"48px 20px",color:"#94a3b8"}}><div style={{fontSize:40,marginBottom:12}}>{icon}</div><div style={{fontSize:14,marginBottom:20}}>{msg}</div>{btn&&<button onClick={onClick} style={{background:"#1e3a5f",color:"white",border:"none",borderRadius:8,padding:"10px 20px",fontWeight:700,cursor:"pointer",fontSize:14}}>{btn}</button>}</div>; }

function GraficaPlantas({meses,data,plantasConfig}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current||!window.Chart) return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:meses.map(ym=>{const[y,m]=ym.split("-");return new Date(+y,+m-1,1).toLocaleDateString("es-MX",{month:"short",year:"2-digit"});}),
        datasets:plantasConfig.map(({label,color})=>({label,data:data[label]||[],backgroundColor:color,borderRadius:6,borderSkipped:false})),
      },
      options:{
        responsive:true,
        plugins:{
          legend:{position:"top",labels:{font:{size:12},usePointStyle:true}},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${(ctx.parsed.y||0).toFixed(2)} ton`}},
        },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11}}},
          y:{beginAtZero:true,ticks:{callback:(v)=>`${v} ton`,font:{size:11}},grid:{color:"#f1f5f9"}},
        },
      },
    });
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[meses,data]);
  return <canvas ref={canvasRef} style={{maxHeight:260}}/>;
}

const emptyOV = {id:"",num_ov:"",clienteId:"",serie:"",folio:"",toneladas:0,fecha_carga:todayISO(),fecha_entrega:"",status:"ov_asignada",confirm:"por_confirmar",motivo:"",remision_firmada:false,notas:"",tipo:"granel"};
const emptyCliente = {id:"",nombre:"",nombre_fiscal:"",rfc:"",precio_ton:"",anticipo:0,telefono:""};
const emptyNota    = {id:"",texto:"",fecha_vencimiento:todayISO(),prioridad:"media",clienteId:"",num_ov:"",completada:false};
const emptyProsp   = {id:"",nombre:"",telefono:"",contacto:"",vol_mensual:0,etapa:"contacto",notas:"",fecha_seguimiento:todayISO()};
const emptyFactura = {id:"",clienteId:"",folio_fiscal:"",fecha:todayISO(),monto_total:"",tipo:"Normal",estatus:"Emitida",pagos_ligados:[],notas:""};

function getWeekRange(offset=0) {
  const d=new Date(); d.setDate(d.getDate()+offset*7);
  const day=d.getDay(); const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon.toISOString().slice(0,10),end:sun.toISOString().slice(0,10)};
}

function App() {
  const [dbReady,setDbReady]         = useState(!!window.__dbReady);
  const [clientes,setClientes]       = useState([]);
  const [ovs,setOVs]                 = useState([]);
  const [loading,setLoading]         = useState(true);
  const [tab,setTab]                 = useState("confirmar");
  const [selected,setSelected]       = useState(null);
  const [showForm,setShowForm]       = useState(false);
  const [showCliForm,setShowCliForm] = useState(false);
  const [form,setForm]               = useState(emptyOV);
  const [cliForm,setCliForm]         = useState(emptyCliente);
  const [weekOffset,setWeekOffset]   = useState(1);
  const [busqueda,setBusqueda]                   = useState("");
  const [filtroCliente,setFiltroCliente]         = useState("");
  const [filtroSinRemision,setFiltroSinRemision] = useState(false);
  const [filtroSinCliente,setFiltroSinCliente]   = useState(false);
  const [filtroSinFirma,setFiltroSinFirma]       = useState(false);
  const [reporteCliente,setReporteCliente]     = useState("");
  const [reporteMes,setReporteMes]             = useState(currentYM());
  const [plantaExpandida,setPlantaExpandida]   = useState({});
  const [clienteExpandido,setClienteExpandido] = useState({});
  const [compForm,setCompForm]                 = useState(null);
  const compRef = useRef(null);
  const compPendRef = useRef(null);
  const [editingAnticipo,setEditingAnticipo]   = useState(null); // {cliId,realIdx,fecha,monto}
  const [notas,setNotas]                       = useState([]);
  const [showNotaForm,setShowNotaForm]         = useState(false);
  const [notaForm,setNotaForm]                 = useState(emptyNota);
  const [verCompletadas,setVerCompletadas]     = useState(false);
  const [calView,setCalView]                   = useState("mes");
  const [calOffset,setCalOffset]               = useState(0);
  const [calTipo,setCalTipo]                   = useState("ambas");
  const [prospectos,setProspectos]             = useState([]);
  const [showProspForm,setShowProspForm]       = useState(false);
  const [prospForm,setProspForm]               = useState(emptyProsp);
  const [selectedProsp,setSelectedProsp]       = useState(null);
  const [verCerrados,setVerCerrados]           = useState(false);
  const [facturas,setFacturas]                 = useState([]);
  const [showFacturaForm,setShowFacturaForm]   = useState(false);
  const [facturaForm,setFacturaForm]           = useState(emptyFactura);
  const [filtroFacturaCliente,setFiltroFacturaCliente] = useState("");
  const [verFacturasClienteId,setVerFacturasClienteId] = useState(null);
  const [compPendForm,setCompPendForm]         = useState(null);

  useEffect(()=>{
    if(!dbReady){window.addEventListener("dbReady",()=>setDbReady(true)); return;}
    const db=window.__db;
    const u1=window.__onSnapshot(window.__col(db,"clientes"),snap=>{setClientes(snap.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false);});
    const u2=window.__onSnapshot(window.__col(db,"ovs"),snap=>{setOVs(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.fecha_carga||"").localeCompare(a.fecha_carga||"")));});
    const u3=window.__onSnapshot(window.__col(db,"notas"),snap=>{setNotas(snap.docs.map(d=>({id:d.id,...d.data()})));});
    const u4=window.__onSnapshot(window.__col(db,"prospectos"),snap=>{setProspectos(snap.docs.map(d=>({id:d.id,...d.data()})));});
    const u5=window.__onSnapshot(window.__col(db,"facturas"),snap=>{setFacturas(snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||"")));});
    return ()=>{u1();u2();u3();u4();u5();};
  },[dbReady]);

  const saveToDb    = async (col,id,data)=>{ const {id:_,...rest}=data; await window.__setDoc(window.__doc(window.__db,col,id),rest); };
  const deleteFromDb= async (col,id)    =>{ await window.__deleteDoc(window.__doc(window.__db,col,id)); };

  const cliById = (id) => clientes.find(c=>c.id===id)||null;
  const valorOV = (p)  => { const c=cliById(p.clienteId); return c?(parseFloat(p.toneladas)||0)*(parseFloat(c.precio_ton)||0):0; };

  const estadoCuenta = useMemo(()=>clientes.map(c=>{
    const ent=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado");
    const ton=ent.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
    const val=ton*(parseFloat(c.precio_ton)||0);
    return {...c,ton_entregadas:ton,valor_entregado:val,saldo:(parseFloat(c.anticipo)||0)-val,num_entregas:ent.length};
  }),[clientes,ovs]);

  const facturacionPorCliente = useMemo(()=>{
    const r={};
    clientes.forEach(c=>{
      const totalPagado=parseFloat(c.anticipo)||0;
      const totalFacturado=facturas.filter(f=>f.clienteId===c.id&&f.estatus==="Emitida").reduce((s,f)=>s+(parseFloat(f.total_con_iva)||0),0);
      r[c.id]={totalPagado,totalFacturado,pendiente:totalPagado-totalFacturado};
    });
    return r;
  },[clientes,facturas]);

  const totales = useMemo(()=>{
    const ton      =ovs.filter(p=>p.status==="entregado").reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
    const entVal   =estadoCuenta.reduce((s,c)=>s+c.valor_entregado,0);
    const antVal   =clientes.reduce((s,c)=>s+(parseFloat(c.anticipo)||0),0);
    const sinCli      =ovs.filter(p=>["remisionada","listo_para_envio"].includes(p.status)&&!p.clienteId).length;
    const porConf     =ovs.filter(p=>p.fecha_carga===nextWorkdayISO()&&p.confirm==="por_confirmar").length;
    const sinRemision =ovs.filter(p=>p.clienteId&&!p.folio&&p.status!=="entregado").length;
    const anticipoBajo=estadoCuenta.filter(c=>c.saldo<200000&&c.saldo>=0&&c.anticipo>0);
    const adeudos     =estadoCuenta.filter(c=>c.saldo<0);
    return {ton,entVal,antVal,saldo:antVal-entVal,sinCli,porConf,sinRemision,anticipoBajo,adeudos};
  },[ovs,clientes,estadoCuenta]);

  /* reporte mensual por planta */
  const reportePlanta = useMemo(()=>{
    const ovsMes = ovs.filter(p=>{
      const fecha = p.fecha_carga||"";
      return fecha.startsWith(reporteMes) && p.status!=="ov_asignada" && p.status!=="fletera_planta";
    });
    const grupos = {};
    ovsMes.forEach(p=>{
      const planta=plantaDeSerie(p.serie);
      if(!grupos[planta]) grupos[planta]=[];
      grupos[planta].push(p);
    });
    return Object.entries(grupos).map(([planta,remisiones])=>({
      planta,
      remisiones: remisiones.sort((a,b)=>(a.fecha_carga||"").localeCompare(b.fecha_carga||"")),
      total_ton: remisiones.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0),
      total_valor: remisiones.reduce((s,p)=>s+valorOV(p),0),
    }));
  },[ovs,reporteMes,clientes]);

  /* meses disponibles para selector */
  const mesesDisponibles = useMemo(()=>{
    const set=new Set(ovs.map(p=>(p.fecha_carga||"").slice(0,7)).filter(Boolean));
    const cur=currentYM(); set.add(cur);
    return [...set].sort().reverse();
  },[ovs]);

  /* detalle mensual por cliente */
  const detalleClienteMes = useMemo(()=>{
    const ovsMes=ovs.filter(p=>(p.fecha_entrega||"").startsWith(reporteMes)&&p.status==="entregado");
    const grupos={};
    ovsMes.forEach(p=>{
      const cid=p.clienteId||"__sin__";
      if(!grupos[cid]) grupos[cid]=[];
      grupos[cid].push(p);
    });
    return Object.entries(grupos)
      .map(([cid,rems])=>({
        cid,
        nombre:cliById(cid)?.nombre||"(sin cliente)",
        remisiones:rems.sort((a,b)=>(a.fecha_entrega||"").localeCompare(b.fecha_entrega||"")),
        total_ton:rems.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0),
        total_valor:rems.reduce((s,p)=>s+valorOV(p),0),
      }))
      .sort((a,b)=>a.nombre.localeCompare(b.nombre,"es"));
  },[ovs,reporteMes,clientes]);

  /* gráfica últimos 6 meses por planta */
  const graficaPlantas = useMemo(()=>{
    const today=new Date();
    const meses=Array.from({length:6},(_,i)=>{const d=new Date(today.getFullYear(),today.getMonth()-5+i,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;});
    const data={};
    ["Puebla","Aguascalientes","Bodega Querétaro"].forEach(planta=>{
      data[planta]=meses.map(ym=>ovs.filter(p=>(p.fecha_carga||"").startsWith(ym)&&plantaDeSerie(p.serie)===planta&&p.status!=="ov_asignada"&&p.status!=="fletera_planta").reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0));
    });
    return {meses,data};
  },[ovs]);

  /* acumulado anual por planta */
  const acumuladoAnual = useMemo(()=>{
    const yr=new Date().getFullYear().toString();
    const calc=planta=>ovs.filter(p=>(p.fecha_carga||"").startsWith(yr)&&plantaDeSerie(p.serie)===planta&&p.status!=="ov_asignada"&&p.status!=="fletera_planta").reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
    const pu=calc("Puebla"), ag=calc("Aguascalientes"), bq=calc("Bodega Querétaro");
    return {Puebla:pu,Aguascalientes:ag,"Bodega Querétaro":bq,totalGranel:pu+ag,totalSaco:bq,total:pu+ag+bq};
  },[ovs]);

  const upd = async (id,patch)=>{
    const p=ovs.find(x=>x.id===id); if(!p) return;
    const updated={...p,...patch};
    setOVs(prev=>prev.map(x=>x.id===id?updated:x));
    setSelected(s=>s&&s.id===id?updated:s);
    await saveToDb("ovs",id,updated);
  };

  const advance     = (id)=>{ const p=ovs.find(x=>x.id===id); if(p&&NEXT[p.status]) upd(id,{status:NEXT[p.status]}); };
  const confirmar   = (id)=>upd(id,{confirm:"confirmado",motivo:""});
  const reprogramar = (id)=>{
    const m0=prompt(`Motivo:\n${MOTIVOS.map((m,i)=>`${i+1}. ${m}`).join("\n")}\n\nEscribe número o texto:`);
    if(m0===null) return;
    let m=m0.trim(); if(["1","2","3","4"].includes(m)) m=MOTIVOS[+m-1];
    if(m==="Otro"||m===""){const l=prompt("Describe el motivo:"); m=l||"Otro";}
    const f=prompt("Nueva fecha de carga (AAAA-MM-DD):",addDays(todayISO(),2));
    if(!f) return;
    upd(id,{confirm:"reprogramado",motivo:m,fecha_carga:f});
  };
  const saveOV = async ()=>{
    const id=form.id||`OV-${Date.now()}`;
    const otros=ovs.filter(p=>p.id!==id);
    if(otros.some(p=>p.num_ov&&p.num_ov===form.num_ov)){alert(`Ya existe otra OV con el número "${form.num_ov}".`);return;}
    if(form.folio&&otros.some(p=>p.folio&&p.folio===form.folio)){alert(`Ya existe otra OV con el folio de remisión "${form.folio}".`);return;}
    const n={...form,id,toneladas:parseFloat(form.toneladas)||0};
    setOVs(prev=>prev.find(p=>p.id===id)?prev.map(p=>p.id===id?n:p):[n,...prev]);
    await saveToDb("ovs",id,n);
    setShowForm(false); setForm(emptyOV); setSelected(null);
  };
  const deleteOV = async (id)=>{
    if(!confirm("¿Eliminar esta OV?")) return;

    if(navigator.clipboard) navigator.clipboard.writeText(t);
    window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,"_blank");
  };

  const inS={width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:14,boxSizing:"border-box",outline:"none"};
  const ClienteSelect=({p})=>(
    <select value={p.clienteId||""} onChange={e=>{e.stopPropagation();upd(p.id,{clienteId:e.target.value});}} onClick={e=>e.stopPropagation()} style={{...inS,padding:"5px 8px",fontSize:12,marginTop:6}}>
      <option value="">— Asignar cliente —</option>
      {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(c.precio_ton)}/ton)</option>)}
    </select>
  );

  if(!dbReady||loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>🔄</div>
      <div style={{fontWeight:700,color:"#1e3a5f"}}>Conectando con la base de datos...</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Segoe UI',sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#1e293b",paddingBottom:(selected||selectedProsp)?380:40}}>

        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{background:"#e63946",borderRadius:8,padding:"6px 10px",fontWeight:900,fontSize:13}}>CA</div>
          <div><div style={{fontWeight:700,fontSize:16}}>Distribuidora Cruz Azul</div><div style={{fontSize:11,opacity:0.7}}>Panel de Operaciones — Antonio</div></div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>exportExcel("")} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>⬇ Excel</button>
          <button onClick={()=>{setForm({...emptyOV,fecha_carga:todayISO()});setShowForm(true);}} style={{background:"#e63946",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ OV</button>
        </div>
      </div>

      {/* TABS */}
      <div style={{background:"white",borderBottom:"2px solid #e2e8f0",padding:"0 16px",display:"flex",overflowX:"auto"}}>
        {[["confirmar",`📌 Hoy${(totales.porConf+notasBadge+prospBadge)>0?` (${totales.porConf+notasBadge+prospBadge})`:""}`],["ordenes","📋 Órdenes"],["clientes","👥 Clientes"],["reporte","📊 Reporte"],["plantas","🏭 Plantas"],["notas",`📝 Notas${notasBadge?` (${notasBadge})`:""}`],["calendario","📅 Calendario"],["prospectos",`🎯 Prospectos${prospBadge?` (${prospBadge})`:""}`],["facturas","🧾 Facturas"]].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{background:"none",border:"none",borderBottom:tab===k?"3px solid #1e3a5f":"3px solid transparent",padding:"12px 14px",cursor:"pointer",fontWeight:tab===k?700:500,color:tab===k?"#1e3a5f":"#64748b",fontSize:13,whiteSpace:"nowrap"}}>{l}</button>
        ))}
      </div>

      <div style={{padding:18,maxWidth:980,margin:"0 auto"}}>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:18}}>
          {[
            {l:"Por confirmar mañana",v:totales.porConf,           a:totales.porConf>0?"#d97706":"#16a34a"},
            {l:"Sin cliente asignado",v:totales.sinCli,            a:totales.sinCli>0?"#0891b2":"#16a34a"},
            {l:"Sin remisión",        v:totales.sinRemision,        a:totales.sinRemision>0?"#d97706":"#16a34a"},
            {l:"Ton entregadas",      v:fmtT(totales.ton),      a:"#1e3a5f"},
            {l:"Valor entregado",     v:fmt(totales.entVal),    a:"#2563eb"},
            {l:"Saldo neto clientes", v:fmt(totales.saldo),     a:totales.saldo>=0?"#16a34a":"#ef4444"},
          ].map(c=>(
            <div key={c.l} style={{background:"white",borderRadius:10,padding:"13px 15px",boxShadow:"0 1px 4px #00000010",borderLeft:`4px solid ${c.a}`}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>{c.l}</div>
              <div style={{fontWeight:800,fontSize:18,color:c.a}}>{c.v}</div>
            </div>
          ))}
          {/* ALERTA ANTICIPO BAJO */}
          {(totales.anticipoBajo.length>0||totales.adeudos.length>0)&&(
            <div onClick={()=>setTab("clientes")} style={{background:"#fef2f2",borderRadius:10,padding:"13px 15px",boxShadow:"0 1px 4px #00000010",borderLeft:"4px solid #ef4444",cursor:"pointer",gridColumn:"1/-1"}}>
              <div style={{fontSize:11,color:"#ef4444",marginBottom:4,fontWeight:700}}>⚠️ Anticipo bajo — toca para ver</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                {totales.adeudos.map(c=><span key={c.id} style={{background:"#fecaca",color:"#991b1b",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}}>🔴 {c.nombre}: adeuda {fmt(-c.saldo)}</span>)}
                {totales.anticipoBajo.map(c=><span key={c.id} style={{background:"#fed7aa",color:"#92400e",borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:700}}>🟠 {c.nombre}: {fmt(c.saldo)} restante</span>)}
              </div>
            </div>
          )}
        </div>

        {/* ---- ÓRDENES ---- */}
        {tab==="ordenes"&&(
          <>
            {ovs.length===0
              ?<EmptyState icon="📋" msg="Aún no tienes órdenes de venta." btn="+ Capturar primera OV" onClick={()=>{setForm({...emptyOV,fecha_carga:todayISO()});setShowForm(true);}}/>
              :<>
                <div style={{marginBottom:12}}>
                  <div style={{position:"relative",marginBottom:8}}>
                    <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:15,pointerEvents:"none",color:"#94a3b8"}}>🔍</span>
                    <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} placeholder="Buscar OV, folio o cliente..." style={{...inS,paddingLeft:34,background:"white"}}/>
                  </div>
                  <select value={filtroCliente} onChange={e=>{setFiltroCliente(e.target.value);if(e.target.value)setFiltroSinCliente(false);}} style={{...inS,background:"white",marginBottom:8}}>

                    {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                  </select>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>setFiltroSinRemision(v=>!v)} style={{background:filtroSinRemision?"#d97706":"#f1f5f9",color:filtroSinRemision?"white":"#475569",border:`1.5px solid ${filtroSinRemision?"#d97706":"#e2e8f0"}`,borderRadius:20,padding:"5px 14px",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
                      📋 Sin remisión{totales.sinRemision>0?` (${totales.sinRemision})`:""}
                    </button>
                    <button onClick={()=>{setFiltroSinCliente(v=>!v);setFiltroCliente("");}} style={{background:filtroSinCliente?"#0891b2":"#f1f5f9",color:filtroSinCliente?"white":"#475569",border:`1.5px solid ${filtroSinCliente?"#0891b2":"#e2e8f0"}`,borderRadius:20,padding:"5px 14px",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
                      👤 Sin cliente{sinCliente.length>0?` (${sinCliente.length})`:""}
                    </button>
                    <button onClick={()=>setFiltroSinFirma(v=>!v)} style={{background:filtroSinFirma?"#7c3aed":"#f1f5f9",color:filtroSinFirma?"white":"#475569",border:`1.5px solid ${filtroSinFirma?"#7c3aed":"#e2e8f0"}`,borderRadius:20,padding:"5px 14px",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
                      ✍️ Sin firma{ovsSinFirma.length>0?` (${ovsSinFirma.length})`:""}
                    </button>
                    {(busqueda||filtroCliente||filtroSinRemision||filtroSinCliente||filtroSinFirma)&&(
                      <button onClick={()=>{setBusqueda("");setFiltroCliente("");setFiltroSinRemision(false);setFiltroSinCliente(false);setFiltroSinFirma(false);}} style={{background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fecaca",borderRadius:20,padding:"5px 14px",fontWeight:700,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
                        ✕ Limpiar filtros
                      </button>
                    )}
                  </div>
                </div>
                {ovsFiltrados.length===0
                  ?<EmptyState icon="🔍" msg="Sin OVs para este cliente."/>
                  :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {ovsFiltrados.map(p=>{
                      const c=cliById(p.clienteId);
                      return(
                        <div key={p.id} onClick={()=>setSelected(p)} style={{background:"white",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px #00000010",cursor:"pointer",border:selected?.id===p.id?"2px solid #1e3a5f":"2px solid transparent"}}>
                          <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                            <div style={{flex:1,minWidth:200}}>
                              <div style={{fontWeight:800,fontSize:14,color:"#7c3aed"}}>{p.num_ov}</div>
                              <div style={{fontWeight:700,fontSize:15,color:c?"#1e293b":"#94a3b8"}}>{c?c.nombre:"Sin cliente asignado"}</div>
                              <div style={{fontSize:12,color:"#64748b"}}>{p.serie?`${p.serie}-${p.folio||"s/f"} · `:""}{p.toneladas>0?`${p.toneladas} ton`:"ton pendiente"}{c&&p.toneladas>0?` · ${fmt(valorOV(p))}`:""}</div>
                              <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>🏭 {p.fecha_carga}{p.fecha_entrega?` · 🚚 ${p.fecha_entrega}`:""}</div>
                              {!c&&["remisionada","listo_para_envio","en_camino"].includes(p.status)&&<ClienteSelect p={p}/>}
                            </div>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                              <Badge status={p.status}/>
                              {p.tipo==="saco"&&<span style={{background:"#f0fdf4",color:"#15803d",border:"1px solid #15803d30",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>Saco</span>}
                              {p.serie&&<PlantaBadge serie={p.serie}/>}
                              {["ov_asignada","fletera_planta"].includes(p.status)&&<ConfirmBadge c={p.confirm}/>}
                              {p.status==="entregado"&&<span style={{fontSize:11,color:p.remision_firmada?"#16a34a":"#d97706",fontWeight:700}}>{p.remision_firmada?"✓ Firmada":"⚠ Falta firma"}</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                }
              </>
            }
          </>
        )}

        {/* ---- HOY ---- */}
        {tab==="confirmar"&&(
          <>
            {/* SECCIÓN 1 — CONFIRMAR MAÑANA */}
            <div style={{marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:8,borderBottom:"2px solid #fde68a"}}>
                <div style={{background:"#d97706",borderRadius:4,width:4,height:20,flexShrink:0}}/>
                <div style={{fontWeight:800,fontSize:14,color:"#92400e"}}>{new Date().getDay()===6?"Confirmar cargas del lunes":"Confirmar cargas de mañana"}</div>
                <div style={{fontSize:12,color:"#b45309",marginLeft:2}}>— {diaLabel(nextWorkdayISO())}</div>
                {porConfirmar.length>0&&<span style={{marginLeft:"auto",background:"#fffbeb",color:"#d97706",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{porConfirmar.length}</span>}
              </div>
              {porConfirmar.length===0
                ?<div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#15803d",fontWeight:600}}>✓ Todo en orden</div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {porConfirmar.map(p=>{
                    const c=cliById(p.clienteId);
                    return(
                      <div key={p.id} style={{background:"white",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px #00000010",borderLeft:`4px solid ${(CONFIRM[p.confirm]||{}).color}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                          <div>
                            <div style={{fontWeight:800,fontSize:13,color:"#7c3aed"}}>{p.num_ov}</div>
                            <div style={{fontWeight:700}}>{c?c.nombre:"Sin cliente aún"}</div>
                            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>🏭 {diaLabel(p.fecha_carga)}</div>
                            {p.motivo&&<div style={{fontSize:11,color:"#dc2626",marginTop:3}}>↻ {p.motivo}</div>}
                          </div>
                          <ConfirmBadge c={p.confirm}/>
                        </div>
                        {p.confirm!=="confirmado"&&(
                          <div style={{display:"flex",gap:8,marginTop:10}}>
                            <button onClick={()=>confirmar(p.id)} style={{background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>✓ Confirmar</button>
                            <button onClick={()=>reprogramar(p.id)} style={{background:"#fef2f2",color:"#dc2626",border:"1px solid #fecaca",borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>↻ Reprogramar</button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              }
            </div>

            {/* SECCIÓN 2 — ENTREGAS DE HOY */}
            <div style={{marginBottom:22}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:8,borderBottom:"2px solid #bfdbfe"}}>
                <div style={{background:"#2563eb",borderRadius:4,width:4,height:20,flexShrink:0}}/>
                <div style={{fontWeight:800,fontSize:14,color:"#1d4ed8"}}>Entregas de hoy</div>
                <div style={{fontSize:12,color:"#3b82f6",marginLeft:2}}>— {diaLabel(todayISO())}</div>
                {entregasHoy.length>0&&<span style={{marginLeft:"auto",background:"#eff6ff",color:"#2563eb",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{entregasHoy.length}</span>}
              </div>
              {entregasHoy.length===0
                ?<div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#15803d",fontWeight:600}}>✓ Todo en orden</div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {entregasHoy.map(p=>{
                    const c=cliById(p.clienteId);
                    return(
                      <div key={p.id} style={{background:"white",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px #00000010",borderLeft:`4px solid ${getS(p.status).color}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                          <div>
                            <div style={{fontWeight:800,fontSize:13,color:"#7c3aed"}}>{p.num_ov}</div>
                            <div style={{fontWeight:700}}>{c?c.nombre:"Sin cliente"}</div>
                            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>🚚 entrega: {diaLabel(p.fecha_entrega)}</div>
                          </div>
                          <Badge status={p.status}/>
                        </div>
                        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                          {NEXT[p.status]&&<button onClick={()=>advance(p.id)} style={{background:"#1e3a5f",color:"white",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>{NEXT_LABEL[p.status]}</button>}
                          {p.status==="entregado"&&<button onClick={()=>upd(p.id,{remision_firmada:true})} style={{background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:700}}>✓ Remisión firmada</button>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              }
            </div>

            {/* SECCIÓN 3 — EN ESPERA DE SALIDA */}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:8,borderBottom:"2px solid #fde68a"}}>
                <div style={{background:"#b45309",borderRadius:4,width:4,height:20,flexShrink:0}}/>
                <div style={{fontWeight:800,fontSize:14,color:"#92400e"}}>En espera de salida</div>
                {enEspera.length>0&&<span style={{marginLeft:"auto",background:"#fefce8",color:"#b45309",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{enEspera.length}</span>}
              </div>
              {enEspera.length===0
                ?<div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#15803d",fontWeight:600}}>✓ Todo en orden</div>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {enEspera.map(p=>{
                    const c=cliById(p.clienteId);
                    const dias=Math.max(0,Math.floor((new Date(todayISO()+"T12:00")-new Date((p.fecha_carga||todayISO())+"T12:00"))/86400000));
                    return(
                      <div key={p.id} style={{background:"white",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 4px #00000010",borderLeft:"4px solid #b45309"}}>
                        <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                          <div>
                            <div style={{fontWeight:800,fontSize:13,color:"#7c3aed"}}>{p.num_ov}</div>
                            <div style={{fontWeight:700}}>{c?c.nombre:"Sin cliente"}</div>
                            <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>🏭 cargó: {diaLabel(p.fecha_carga)}</div>
                          </div>
                          <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                            <Badge status={p.status}/>
                            <span style={{fontSize:12,fontWeight:700,color:dias>=2?"#dc2626":dias===1?"#d97706":"#64748b"}}>{dias===0?"Hoy mismo":dias===1?"1 día en espera":`${dias} días en espera`}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              }
            </div>

            {/* SECCIÓN 4 — AVISOS DEL DÍA */}
            <div style={{marginBottom:8}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,paddingBottom:8,borderBottom:"2px solid #fecaca"}}>
                <div style={{background:"#dc2626",borderRadius:4,width:4,height:20,flexShrink:0}}/>
                <div style={{fontWeight:800,fontSize:14,color:"#dc2626"}}>Avisos del día</div>
                {(notasUrgentes.length+prospSeguimientoHoy.length)>0&&<span style={{marginLeft:"auto",background:"#fef2f2",color:"#dc2626",borderRadius:20,padding:"2px 10px",fontSize:12,fontWeight:700}}>{notasUrgentes.length+prospSeguimientoHoy.length}</span>}
              </div>
              {notasUrgentes.length===0&&prospSeguimientoHoy.length===0
                ?<div style={{background:"#f0fdf4",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#15803d",fontWeight:600}}>✓ Todo en orden</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {notasUrgentes.map(n=>{
                    const vencida=(n.fecha_vencimiento||"")<todayISO();
                    const pr=PRIORIDAD[n.prioridad]||PRIORIDAD.media;
                    const c=n.clienteId?cliById(n.clienteId):null;
                    return(
                      <div key={n.id} style={{background:vencida?"#fef2f2":"#fffbeb",borderRadius:10,padding:"12px 14px",borderLeft:`4px solid ${vencida?"#ef4444":"#d97706"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:2}}>📝 Nota</div>
                            <div style={{fontWeight:700,fontSize:13}}>{n.texto}</div>
                            <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                              <span style={{background:pr.bg,color:pr.color,borderRadius:20,padding:"1px 7px",fontSize:11,fontWeight:700}}>{pr.label}</span>
                              <span style={{fontSize:11,color:vencida?"#dc2626":"#d97706",fontWeight:700}}>{vencida?"⚠ Vencida:":"🔔 Hoy:"} {diaLabel(n.fecha_vencimiento)}</span>
                              {c&&<span style={{fontSize:11,color:"#7c3aed"}}>👤 {c.nombre}</span>}
                              {n.num_ov&&<span style={{fontSize:11,color:"#64748b"}}>OV: {n.num_ov}</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:6,flexShrink:0}}>
                            <button onClick={()=>completarNota(n.id)} style={{background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:700}} title="Completar">✓</button>
                            <button onClick={()=>{setNotaForm(n);setShowNotaForm(true);}} style={{background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer"}} title="Editar">✏️</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {prospSeguimientoHoy.map(p=>{
                    const et=getEtapa(p.etapa);
                    const vencido=(p.fecha_seguimiento||"")<todayISO();
                    return(
                      <div key={p.id} style={{background:vencido?"#fef2f2":"#fffbeb",borderRadius:10,padding:"12px 14px",borderLeft:`4px solid ${vencido?"#ef4444":"#d97706"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",marginBottom:2}}>🎯 Prospecto</div>
                            <div style={{fontWeight:700,fontSize:13}}>{p.nombre}</div>

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

        {tab==="calendario"&&(()=>{

          const dowOff=(firstDay.getDay()+6)%7;
          const gridStart=new Date(firstDay); gridStart.setDate(firstDay.getDate()-dowOff);

          const wRange=getWeekRange(calView==="semana"?calOffset:0);
          const wDays=Array.from({length:7},(_,i)=>addDays(wRange.start,i));
          const wLabel=`${diaLabel(wRange.start)} — ${diaLabel(wRange.end)}`;
          const showCargas=calTipo==="cargas"||calTipo==="ambas";
          const showEntregas=calTipo==="entregas"||calTipo==="ambas";
          return(
            <>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>

                ))}
              </div>
              <div style={{display:"flex",gap:14,marginBottom:12,fontSize:11,color:"#64748b",justifyContent:"center",flexWrap:"wrap"}}>
                {showCargas&&<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:"#7c3aed",display:"inline-block",flexShrink:0}}/>Carga en planta</span>}
                {showEntregas&&<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:"#2563eb",display:"inline-block",flexShrink:0}}/>Entrega a cliente</span>}

                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>

                      const dayCargas=showCargas?ovs.filter(p=>p.fecha_carga===iso):[];

                              <div key={p._t+p.id} onClick={()=>setSelected(ovs.find(x=>x.id===p.id)||p)} style={{background:bg,borderRadius:3,padding:"1px 4px",fontSize:9,color:"white",marginBottom:1,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>

      {/* FACTURA FORM */}
      {showFacturaForm&&(()=>{
        const facCli=cliById(facturaForm.clienteId);
        const hist=facCli?.historial_anticipos||[];
        const totalConIVA=parseFloat(facturaForm.monto_total)||0;

                {totalConIVA>0&&<div style={{fontSize:11,color:"#64748b",marginTop:4,display:"flex",gap:14}}>
                  <span>Sin IVA: <b>{fmt(sinIVA)}</b></span><span>IVA 16%: <b>{fmt(ivaVal)}</b></span>

                        <input type="checkbox" checked={facturaForm.pagos_ligados.includes(idx)} onChange={e=>setFacturaForm(f=>({...f,pagos_ligados:e.target.checked?[...f.pagos_ligados,idx]:f.pagos_ligados.filter(i=>i!==idx)}))}/>
                        <span style={{flex:"0 0 86px",fontSize:12,color:"#64748b"}}>{a.fecha}</span>
                        <span style={{flex:1,fontSize:12,fontWeight:600}}>{fmt(a.monto)}</span>
                        <span style={{fontSize:10,fontWeight:700,color:(a.estatus_factura||"pendiente")==="facturado"?"#15803d":"#c2410c",background:(a.estatus_factura||"pendiente")==="facturado"?"#dcfce7":"#fff7ed",borderRadius:4,padding:"2px 5px"}}>{(a.estatus_factura||"pendiente")==="facturado"?"Facturado":"Pendiente"}</span>
                      </label>
                    ))}
                  </div>
                </div>
              )}
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Notas (opcional)</label>
                <textarea value={facturaForm.notas} onChange={e=>setFacturaForm(f=>({...f,notas:e.target.value}))} style={{...inS,minHeight:56,resize:"vertical"}} placeholder="Observaciones..."/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setShowFacturaForm(false);setFacturaForm(emptyFactura);}} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
                <button onClick={saveFactura} disabled={!formOk} style={{flex:2,background:formOk?"#1e3a5f":"#cbd5e1",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:formOk?"pointer":"default",fontSize:14}}>Guardar factura</button>
              </div>
            </div>
          </div>

      })()}

      {/* VER FACTURAS CLIENTE */}
      {verFacturasClienteId&&(()=>{
        const cli=cliById(verFacturasClienteId)||{};
        const facsCli=facturas.filter(f=>f.clienteId===verFacturasClienteId);
        const totalEmitido=facsCli.filter(f=>f.estatus==="Emitida").reduce((s,f)=>s+(parseFloat(f.total_con_iva)||0),0);
        return(
          <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontWeight:800,fontSize:14,color:f.estatus==="Cancelada"?"#94a3b8":"#1e3a5f"}}>{fmt(f.total_con_iva)}</div>

                        </div>
                      </div>
                      {f.notas&&<div style={{fontSize:11,color:"#64748b",marginTop:5,borderTop:"1px solid #e2e8f0",paddingTop:5}}>{f.notas}</div>}
                    </div>
                  ))}
                </div>
              }
              <button onClick={()=>setVerFacturasClienteId(null)} style={{width:"100%",background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cerrar</button>
            </div>
          </div>
        );
      })()}

      {/* COMPROBANTE PENDIENTE */}
      {compPendForm&&(()=>{
        const cli=clientes.find(x=>x.id===compPendForm.clienteId)||{};
        const fac=facturacionPorCliente[compPendForm.clienteId]||{};
        const pendiente=Math.max(0,fac.pendiente||0);
        const sinIVA=pendiente;
        const iva16=sinIVA*0.16;
        const total=sinIVA+iva16;
        const tons=parseFloat(compPendForm.toneladas)||0;
        const precioTon=parseFloat(compPendForm.precioTon)||0;
        return(
          <div style={{position:"fixed",inset:0,background:"#00000070",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"white",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:"22px 20px",maxHeight:"94vh",overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>🧾 Comprobante de pendiente</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>{cli.nombre}</div>
              <div style={{background:"#fff7ed",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>

                  <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Toneladas (opcional)</label>
                  <input type="number" value={compPendForm.toneladas} onChange={e=>setCompPendForm(f=>({...f,toneladas:e.target.value}))} style={inS} min="0" step="0.01" placeholder="0.00"/>

                <div>
                  <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Precio / ton (opcional)</label>
                  <input type="number" value={compPendForm.precioTon} onChange={e=>setCompPendForm(f=>({...f,precioTon:e.target.value}))} style={inS} min="0" step="1" placeholder="0"/>
                </div>
              </div>
              <div ref={compPendRef} style={{background:"white",border:"2px solid #1e3a5f",borderRadius:12,overflow:"hidden",marginBottom:16,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
                <div style={{background:"#1e3a5f",padding:"16px 20px"}}>
                  <div style={{color:"white",fontWeight:800,fontSize:15,letterSpacing:.3}}>Distribuidora Cruz Azul</div>
                  <div style={{color:"#93c5fd",fontSize:12,marginTop:2}}>Antonio Estefan</div>
                </div>
                <div style={{padding:"14px 20px 10px",borderBottom:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:2}}>Cliente</div>
                  <div style={{fontWeight:800,fontSize:19,color:"#1e3a5f"}}>{cli.nombre_fiscal||cli.nombre}</div>

                    ...(precioTon>0?[["Precio / ton",fmt(precioTon)]]:[]),

                    ["IVA 16%",fmt(iva16)],

                    <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderTop:"1px solid #f1f5f9",fontSize:12}}>

                    <span style={{fontWeight:900,color:"#1e3a5f",fontSize:17}}>{fmt(total)}</span>
                  </div>

                <div style={{background:"#f8fafc",padding:"8px 20px",borderTop:"1px solid #e2e8f0"}}>
                  <div style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>Documento informativo — Distribuidora Cruz Azul</div>

              </div>

              </div>
            </div>
          </div>
        );
      })()}

      {/* COMPROBANTE MODAL */}
      {compForm&&(()=>{
        const cli=clientes.find(x=>x.id===compForm.clienteId)||{};
        const historial=cli.historial_anticipos||[];
        const pagosVisibles=historial
          .map((a,idx)=>({...a,realIdx:idx}))
          .filter(a=>compForm.verFacturados||(a.estatus_factura||"pendiente")==="pendiente")
          .reverse();
        const selIndices=Object.entries(compForm.selected).filter(([,v])=>v).map(([k])=>parseInt(k));
        const totalSel=selIndices.reduce((s,idx)=>s+(parseFloat(historial[idx]?.monto)||0),0);
        const sinIVA=totalSel;
        const iva16=sinIVA*0.16;
        const total=sinIVA+iva16;
        const tons=parseFloat(compForm.toneladas)||0;
        const precioTon=parseFloat(compForm.precioTon)||0;
        const formOk=selIndices.length>0;
        const pagosSel=selIndices.map(idx=>historial[idx]).filter(Boolean).sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""));
        const todosSeleccionados=pagosVisibles.length>0&&pagosVisibles.every(a=>compForm.selected[a.realIdx]);
        return(
          <div style={{position:"fixed",inset:0,background:"#00000070",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"white",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:"22px 20px",maxHeight:"94vh",overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>🧾 Comprobante de facturación</div>
              <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>{cli.nombre}{cli.rfc?` · RFC: ${cli.rfc}`:""}</div>

              {/* LISTA DE PAGOS */}
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                  <div style={{fontSize:11,fontWeight:700,color:"#475569",textTransform:"uppercase",letterSpacing:.6}}>Pagos a incluir</div>
                  <label style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#64748b",cursor:"pointer"}}>
                    <input type="checkbox" checked={compForm.verFacturados} onChange={e=>setCompForm(f=>({...f,verFacturados:e.target.checked,selected:{}}))}/>

                </div>
                {pagosVisibles.length===0
                  ?<div style={{fontSize:12,color:"#94a3b8",padding:"12px 0",textAlign:"center"}}>{compForm.verFacturados?"Sin pagos registrados.":"Sin pagos pendientes de facturar."}</div>
                  :<>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <button onClick={()=>{
                        if(todosSeleccionados) setCompForm(f=>({...f,selected:{}}));
                        else {const s={}; pagosVisibles.forEach(a=>{s[a.realIdx]=true;}); setCompForm(f=>({...f,selected:s}));}
                      }} style={{background:"none",border:"none",color:"#1e40af",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
                        {todosSeleccionados?"Deseleccionar todos":"Seleccionar todos"}
                      </button>
                      {selIndices.length>0&&<span style={{fontSize:11,color:"#64748b"}}>{selIndices.length} seleccionado{selIndices.length>1?"s":""}</span>}
                    </div>
                    <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
                      {pagosVisibles.map((a,i)=>(
                        <label key={a.realIdx} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",background:compForm.selected[a.realIdx]?"#eff6ff":"white",borderTop:i>0?"1px solid #f1f5f9":"none",cursor:"pointer"}}>
                          <input type="checkbox" checked={!!compForm.selected[a.realIdx]} onChange={e=>setCompForm(f=>({...f,selected:{...f.selected,[a.realIdx]:e.target.checked}}))}/>
                          <span style={{flex:"0 0 86px",fontSize:12,color:"#64748b"}}>{a.fecha}</span>
                          <span style={{flex:1,fontWeight:700,fontSize:13,color:"#1e293b"}}>{fmt(a.monto)}</span>
                          <span style={{fontSize:10,fontWeight:700,color:(a.estatus_factura||"pendiente")==="facturado"?"#15803d":"#c2410c",background:(a.estatus_factura||"pendiente")==="facturado"?"#dcfce7":"#fff7ed",borderRadius:4,padding:"2px 6px"}}>{(a.estatus_factura||"pendiente")==="facturado"?"✔ Facturado":"⏳ Pendiente"}</span>
                        </label>
                      ))}
                    </div>
                  </>
                }
              </div>

              {/* TOTALES + TONELADAS */}
              {formOk&&(
                <div style={{background:"#f8fafc",borderRadius:8,padding:"10px 12px",marginBottom:12,fontSize:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"#64748b"}}>Subtotal sin IVA</span><span style={{fontWeight:600}}>{fmt(sinIVA)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"#64748b"}}>IVA 16%</span><span style={{fontWeight:600}}>{fmt(iva16)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid #e2e8f0",paddingTop:6,marginTop:4}}><span style={{fontWeight:700,color:"#1e3a5f"}}>Total con IVA</span><span style={{fontWeight:800,color:"#1e3a5f",fontSize:14}}>{fmt(total)}</span></div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div>
                  <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Toneladas (opcional)</label>
                  <input type="number" value={compForm.toneladas} onChange={e=>setCompForm(f=>({...f,toneladas:e.target.value}))} style={inS} min="0" step="0.01" placeholder="0.00"/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:3}}>Precio / ton (opcional)</label>
                  <input type="number" value={compForm.precioTon} onChange={e=>setCompForm(f=>({...f,precioTon:e.target.value}))} style={inS} min="0" step="1" placeholder="0"/>
                </div>
              </div>

              {/* PREVIEW COMPROBANTE */}
              {formOk&&(
                <div ref={compRef} style={{background:"white",border:"2px solid #1e3a5f",borderRadius:12,overflow:"hidden",marginBottom:16,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
                  <div style={{background:"#1e3a5f",padding:"16px 20px"}}>
                    <div style={{color:"white",fontWeight:800,fontSize:15,letterSpacing:.3}}>Distribuidora Cruz Azul</div>
                    <div style={{color:"#93c5fd",fontSize:12,marginTop:2}}>Antonio Estefan</div>
                  </div>
                  <div style={{padding:"14px 20px 10px",borderBottom:"1px solid #e2e8f0"}}>
                    <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:2}}>Cliente</div>
                    <div style={{fontWeight:800,fontSize:19,color:"#1e3a5f"}}>{cli.nombre_fiscal||cli.nombre}</div>
                    {cli.rfc&&<div style={{fontSize:11,color:"#64748b",marginTop:2}}>RFC: {cli.rfc}</div>}
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{todayISO()}</div>
                  </div>
                  <div style={{padding:"10px 20px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto",background:"#f8fafc",padding:"6px 10px",borderRadius:"6px 6px 0 0",fontSize:10,fontWeight:700,color:"#64748b",gap:16,marginBottom:2}}>
                      <div>Fecha</div><div style={{textAlign:"right",minWidth:90}}>Monto</div>
                    </div>
                    {pagosSel.map((a,i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto",padding:"6px 10px",fontSize:12,borderTop:"1px solid #f1f5f9",gap:16,background:i%2?"#fafafa":"white"}}>
                        <div style={{color:"#475569"}}>{a.fecha}</div>
                        <div style={{textAlign:"right",fontWeight:600,minWidth:90}}>{fmt(a.monto)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"4px 20px 14px"}}>
                    {[
                      ...(tons>0?[["Toneladas",`${fmtT(tons)} ton`]]:[]),
                      ...(precioTon>0?[["Precio / ton",fmt(precioTon)]]:[]),
                      ["Subtotal sin IVA",fmt(sinIVA)],
                      ["IVA 16%",fmt(iva16)],
                    ].map(([k,v],i)=>(
                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #f1f5f9",fontSize:12}}>
                        <span style={{color:"#64748b"}}>{k}</span><span style={{fontWeight:600}}>{v}</span>
                      </div>
                    ))}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 4px",borderTop:"2px solid #1e3a5f",marginTop:4,fontSize:15}}>
                      <span style={{fontWeight:700,color:"#1e3a5f"}}>Total con IVA</span>
                      <span style={{fontWeight:900,color:"#1e3a5f",fontSize:17}}>{fmt(total)}</span>
                    </div>
                  </div>
                  <div style={{background:"#f8fafc",padding:"8px 20px",borderTop:"1px solid #e2e8f0"}}>
                    <div style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>Documento informativo — Distribuidora Cruz Azul</div>
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setCompForm(null)} style={{flex:1,background:"#f1f5f9",color:"#64748b",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
                <button onClick={generarComprobante} disabled={!formOk} style={{flex:2,background:formOk?"#1e3a5f":"#cbd5e1",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:formOk?"pointer":"default",fontSize:14}}>⬇ Generar imagen</button>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
