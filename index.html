const fmt  = (n) => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",maximumFractionDigits:0}).format(n||0);
const fmtT = (n) => (parseFloat(n)||0).toFixed(2);
const todayISO   = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; };
const addDays    = (iso,n) => { const d=new Date((iso||todayISO())+"T12:00"); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); };
const tomorrowISO   = () => addDays(todayISO(),1);
const nextWorkdayISO= () => new Date().getDay()===6 ? addDays(todayISO(),2) : addDays(todayISO(),1);
const nextBusinessDayAfter = (iso) => { let d=addDays(iso||todayISO(),1); while([0,6].includes(new Date(d+"T12:00").getDay())) d=addDays(d,1); return d; };
const diaLabel   = (iso) => iso ? new Date(iso+"T12:00").toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"short"}) : "—";
const mesLabel   = (ym)  => { const [y,m]=ym.split("-"); return new Date(+y,+m-1,1).toLocaleDateString("es-MX",{month:"long",year:"numeric"}); };
const currentYM  = () => todayISO().slice(0,7);
const limpiarFolio = (f) => {
  if (!f) return "";
  return f.trim().toUpperCase().replace(/^(AG|PU|BQ)-(AG|PU|BQ)-/, "$1-");
};
const FOLIO_PREFIJO_RE = /^(AG|PU|BQ)-/i;
// Evita duplicar el prefijo de planta cuando folio ya lo trae (ej. serie "AG" + folio "AG-479646" → "AG-479646", no "AG-AG-479646")
const serieFolio = (serie, folio, folioVacio) => {
  const s = (serie || "").trim();
  const f = (folio || "").trim();
  if (f && FOLIO_PREFIJO_RE.test(f)) return f.toUpperCase();
  if (folioVacio !== undefined) return `${s || "—"}-${f || folioVacio}`;
  return [s, f].filter(Boolean).join("-");
};

/* planta por serie */

const plantaDeSerie = (serie) => {
  if(!serie) return "Sin planta";
  const prefix = serie.toUpperCase();
  for (const key of Object.keys(PLANTAS)) { if(prefix.startsWith(key)) return PLANTAS[key]; }
  return "Otra";
};

/* ---- días hábiles México ---- */
const festivosMexico = (year) => {
  const s=new Set([`${year}-01-01`,`${year}-02-05`,`${year}-03-21`,`${year}-05-01`,`${year}-09-16`,`${year}-11-20`,`${year}-12-25`]);
  const d1=new Date(year,1,1); while(d1.getDay()!==1)d1.setDate(d1.getDate()+1); s.add(d1.toISOString().slice(0,10));
  const d2=new Date(year,2,1); let cnt=0; while(cnt<3){if(d2.getDay()===1)cnt++;if(cnt<3)d2.setDate(d2.getDate()+1);} s.add(d2.toISOString().slice(0,10));
  return s;
};
const esDiaHabilBase = (iso) => { const d=new Date(iso+"T12:00"); return d.getDay()!==0&&!festivosMexico(d.getFullYear()).has(iso); };
const esDiaHabilReal = (iso, overrides) => iso in overrides ? overrides[iso] : esDiaHabilBase(iso);
const contarDiasHabiles = (startISO, endISO, overrides) => {
  let n=0; const d=new Date(startISO+"T12:00"); const end=new Date(endISO+"T12:00");
  while(d<=end){const iso=d.toISOString().slice(0,10); if(esDiaHabilReal(iso,overrides))n++; d.setDate(d.getDate()+1);}
  return n;
};

function GraficaPlantas({meses,data,plantasConfig}){
  const canvasRef=useRef(null);
  const chartRef=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current||!window.Chart) return;
    if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}
    chartRef.current=new window.Chart(canvasRef.current,{
      type:"bar",
      data:{
        labels:meses.map(ym=>{const[y,m]=ym.split("-");return new Date(+y,+m-1,1).toLocaleDateString("es-MX",{month:"short",year:"2-digit"});}),
        datasets:plantasConfig.map(({label,color})=>({label,data:data[label]||[],backgroundColor:color,borderRadius:6,borderSkipped:false})),
      },
      options:{
        responsive:true,
        plugins:{
          legend:{position:"top",labels:{font:{size:12},usePointStyle:true,color:"#94a3b8"}},
          tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${(ctx.parsed.y||0).toFixed(2)} ton`}},
        },
        scales:{
          x:{grid:{display:false},ticks:{font:{size:11},color:"#94a3b8"}},
          y:{beginAtZero:true,ticks:{callback:(v)=>`${v} ton`,font:{size:11},color:"#94a3b8"},grid:{color:"#334155"}},
        },
      },
    });
    return()=>{if(chartRef.current){chartRef.current.destroy();chartRef.current=null;}};
  },[meses,data]);
  return <canvas ref={canvasRef} style={{maxHeight:260}}/>;
}

function DashboardCliente({cliente,ovs,facturas,diasHabiles,estadoCuenta,valorOV,onClose}){
  const curYM=todayISO().slice(0,7);
  const ec=estadoCuenta.find(c=>c.id===cliente.id)||{saldo:0,ton_entregadas:0,valor_entregado:0};

  const cliOVs=ovs.filter(p=>p.clienteId===cliente.id);
  const tieneGranel=cliOVs.some(p=>(p.tipo||"granel")==="granel");
  const tieneSaco=cliOVs.some(p=>p.tipo==="saco");

  const ovsEntMes=ovs.filter(p=>p.clienteId===cliente.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(curYM)).sort((a,b)=>(a.fecha_carga||"").localeCompare(b.fecha_carga||""));
  const tonMes=ovsEntMes.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
  const valMes=ovsEntMes.reduce((s,p)=>s+valorOV(p),0);

  const historial=cliente.historial_anticipos||[];
  const anticiposMes=historial.filter(a=>(a.fecha||"").startsWith(curYM)).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const totalAnticiposMes=anticiposMes.reduce((s,a)=>s+(parseFloat(a.monto)||0),0);

  const cutoff=`${curYM}-01`;
  const antAntes=historial.filter(a=>(a.fecha||"")<cutoff).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const entAntes=ovs.filter(p=>p.clienteId===cliente.id&&p.status==="entregado"&&(p.fecha_carga||"")<cutoff).reduce((s,p)=>s+valorOV(p),0);
  const saldoAnt=antAntes-entAntes;
  const saldoMes=saldoAnt+totalAnticiposMes-valMes;

  const today=todayISO();
  const [cy,cm]=curYM.split("-").map(Number);
  const mkYM=(offset)=>{const d=new Date(cy,cm-1+offset,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
  const prevYM=mkYM(-1);
  const antYM=mkYM(-2);
  const diasActual=contarDiasHabiles(`${curYM}-01`,today,diasHabiles);
  const findCutoff=(ym)=>{
    const[y,m]=ym.split("-").map(Number);
    const lastDay=new Date(y,m,0).getDate();
    const endISO=`${ym}-${String(lastDay).padStart(2,"0")}`;
    if(diasActual===0) return endISO;
    let cnt=0; const d=new Date(`${ym}-01T12:00`); const end=new Date(endISO+"T12:00");
    while(d<=end){const iso=d.toISOString().slice(0,10);if(esDiaHabilReal(iso,diasHabiles)){cnt++;if(cnt===diasActual)return iso;}d.setDate(d.getDate()+1);}
    return endISO;
  };
  const prevCutoff=findCutoff(prevYM);
  const antCutoff=findCutoff(antYM);
  const prevDay=parseInt(prevCutoff.slice(8)||"0");
  const antDay=parseInt(antCutoff.slice(8)||"0");
  const tonActual=ovsEntMes.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
  const tonPrev=ovs.filter(p=>p.clienteId===cliente.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(prevYM)&&(p.fecha_carga||"")<=prevCutoff).reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
  const tonAnte=ovs.filter(p=>p.clienteId===cliente.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(antYM)&&(p.fecha_carga||"")<=antCutoff).reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);

  const facturasCliente=facturas.filter(f=>f.clienteId===cliente.id).sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  const saldo=ec.saldo!=null?ec.saldo:(parseFloat(cliente.anticipo)||0)-(ec.valor_entregado||0);

  const secH=(titulo)=>(
    <div style={{fontWeight:700,fontSize:13,color:"#f8fafc",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>{titulo}</div>
  );

  return(
    <div style={{position:"fixed",inset:0,background:"#0F172A",zIndex:500,overflowY:"auto"}}>
      {/* HEADER FIJO */}
      <div style={{background:"#10B981",color:"white",padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10,boxShadow:"0 2px 12px #00000070"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:8,padding:"6px 12px",color:"white",fontWeight:700,cursor:"pointer",fontSize:13,flexShrink:0}}>← Volver</button>
          <div>
            <div style={{fontWeight:800,fontSize:15,lineHeight:1.2}}>{cliente.nombre}</div>
            <div style={{fontSize:10,opacity:0.7}}>Dashboard del cliente</div>
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:10,opacity:0.7}}>Saldo total</div>
          <div style={{fontWeight:900,fontSize:19,color:saldo>=0?"#4ade80":"#f87171"}}>{saldo>=0?fmt(saldo):"-"+fmt(-saldo)}</div>
        </div>
      </div>

function CalendarioHabiles({diasHabiles, onToggle}){
  const [offset,setOffset]=useState(0);
  const today=todayISO();
  const vDate=new Date(new Date(today+"T12:00").getFullYear(),new Date(today+"T12:00").getMonth()+offset,1);
  const vY=vDate.getFullYear(), vM=vDate.getMonth();
  const ym=`${vY}-${String(vM+1).padStart(2,"0")}`;
  const firstDow=vDate.getDay();
  const startShift=firstDow===0?6:firstDow-1;
  const daysInMonth=new Date(vY,vM+1,0).getDate();
  const festivos=festivosMexico(vY);
  const cells=[];
  for(let i=0;i<startShift;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(`${ym}-${String(d).padStart(2,"0")}`);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <button onClick={()=>setOffset(o=>o-1)} style={{background:"#243447",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:17,cursor:"pointer",lineHeight:1}}>‹</button>
        <div style={{fontWeight:700,fontSize:14,color:"#f8fafc"}}>{mesLabel(ym)}</div>
        <button onClick={()=>setOffset(o=>o+1)} style={{background:"#243447",border:"none",borderRadius:8,padding:"6px 14px",fontWeight:700,fontSize:17,cursor:"pointer",lineHeight:1}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4,textAlign:"center"}}>
        {["L","M","X","J","V","S","D"].map(l=><div key={l} style={{fontSize:10,fontWeight:700,color:"#94a3b8",padding:"2px 0"}}>{l}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
        {cells.map((iso,i)=>{
          if(!iso) return <div key={`e${i}`}/>;
          const actual=esDiaHabilReal(iso,diasHabiles);
          const hasOverride=iso in diasHabiles;
          const isFestivo=festivos.has(iso);
          const isToday=iso===today;
          const day=parseInt(iso.slice(8));
          return(
            <div key={iso} onClick={()=>onToggle(iso)} style={{
              background:actual?"#dcfce7":"#fee2e2",color:actual?"#15803d":"#dc2626",
              borderRadius:6,textAlign:"center",padding:"7px 2px",fontSize:12,fontWeight:700,cursor:"pointer",
              border:isToday?"2px solid #10B981":hasOverride?"2px solid currentColor":"2px solid transparent",
              position:"relative",opacity:iso>today?0.5:1,userSelect:"none",
            }}>
              {day}
              {(isFestivo&&!hasOverride)&&<span style={{position:"absolute",top:1,right:2,fontSize:6,opacity:.7}}>★</span>}
              {hasOverride&&<span style={{position:"absolute",top:1,right:2,fontSize:7,fontWeight:900}}>✎</span>}
            </div>
          );
        })}
      </div>
      <div style={{marginTop:12,display:"flex",gap:12,flexWrap:"wrap",fontSize:11,color:"#64748b"}}>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,background:"#16a34a22",border:"1px solid #16a34a",borderRadius:2}}/> Trabajado</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:12,height:12,background:"#fee2e2",border:"1px solid #dc2626",borderRadius:2}}/> No trabajado</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>★ Festivo oficial</div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>✎ Ajustado manualmente</div>
      </div>
    </div>
  );
}

function getWeekRange(offset=0) {
  const d=new Date(); d.setDate(d.getDate()+offset*7);
  const day=d.getDay(); const mon=new Date(d); mon.setDate(d.getDate()-((day+6)%7));
  const sun=new Date(mon); sun.setDate(mon.getDate()+6);
  return {start:mon.toISOString().slice(0,10),end:sun.toISOString().slice(0,10)};
}

/* Agrupa archivos de remisión con dos páginas: "AG-487013-1.jpg" + "AG-487013-2.jpg" → un solo grupo "AG-487013" */
const gdGroupFiles = (files) => {
  const groups = {}; const order = [];
  (files||[]).forEach(f=>{
    const base=(f.name||"").replace(/\.[^/.]+$/,"");
    const m=base.match(/^(.+)-([12])$/i);
    const key=(m?m[1]:base).toLowerCase();
    if(!groups[key]){ groups[key]={folioBase:m?m[1]:base,page1:null,page2:null}; order.push(key); }
    if(m){ if(m[2]==="1") groups[key].page1=f; else groups[key].page2=f; }
    else if(!groups[key].page1) groups[key].page1=f;
  });
  return order.map(key=>({key,...groups[key]}));
};

  const filtrarPeriodo = (lista) => {

  };

  const anticipoFiltrado = (c)=>{
    const hist=c.historial_anticipos||[];
    if(reportePeriodo==="historico") return hist.reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
    if(reportePeriodo==="mensual") return hist.filter(a=>(a.fecha||"").startsWith(reporteMes)).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
    if(reportePeriodo==="rango") return hist.filter(a=>{const f=a.fecha||"";return(!reporteRangoInicio||f>=reporteRangoInicio)&&(!reporteRangoFin||f<=reporteRangoFin);}).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);

    else if(reportePeriodo==="rango") cutoff=reporteRangoInicio||"";
    if(!cutoff) return 0;
    const hist=c.historial_anticipos||[];
    const antAntes=hist.filter(a=>(a.fecha||"")<cutoff).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
    const entAntes=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado"&&(p.fecha_carga||"")<cutoff).reduce((s,p)=>s+valorOV(p),0);

  /* estatus de facturación por pago — recalculado automáticamente desde facturas */
  const estatusPagos = useMemo(()=>{
    const result={};
    clientes.forEach(c=>{
      const facActivas=facturas.filter(f=>f.clienteId===c.id&&f.estatus!=="Cancelada");
      result[c.id]=(c.historial_anticipos||[]).map((a,idx)=>{
        const ligadas=facActivas.filter(f=>(f.pagos_ligados||[]).includes(idx));
        if(ligadas.length===0) return {estatus:"pendiente",pendiente:parseFloat(a.monto)||0};
        const totalCubierto=ligadas.reduce((s,f)=>s+(parseFloat(f.total_con_iva)||0),0);
        const montoP=parseFloat(a.monto)||0;
        if(totalCubierto>=montoP*0.995) return {estatus:"facturado",pendiente:0};
        return {estatus:"parcial",pendiente:montoP-totalCubierto};
      });
    });
    return result;
  },[clientes,facturas]);

  /* reporte mensual por planta */

  /* gráfica volumen por cliente: últimos 3 meses al mismo día hábil */
  const graficaVolumenClientes = useMemo(()=>{
    const today=todayISO();
    const curYM=today.slice(0,7);
    const [cy,cm]=curYM.split("-").map(Number);
    const mkYM=(offset)=>{const d=new Date(cy,cm-1+offset,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
    const prevYM=mkYM(-1);
    const antYM=mkYM(-2);
    const diasActual=contarDiasHabiles(`${curYM}-01`,today,diasHabiles);
    const findCutoff=(ym)=>{
      const [y,m]=ym.split("-").map(Number);
      const lastDay=new Date(y,m,0).getDate();
      const endISO=`${ym}-${String(lastDay).padStart(2,"0")}`;
      if(diasActual===0) return endISO;
      let cnt=0;
      const d=new Date(`${ym}-01T12:00`);
      const end=new Date(endISO+"T12:00");
      while(d<=end){
        const iso=d.toISOString().slice(0,10);
        if(esDiaHabilReal(iso,diasHabiles)){cnt++;if(cnt===diasActual)return iso;}
        d.setDate(d.getDate()+1);
      }
      return endISO;
    };
    const prevCutoff=findCutoff(prevYM);
    const antCutoff=findCutoff(antYM);

    const mesAnterior=cls.map(c=>ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(prevYM)&&(p.fecha_carga||"")<=prevCutoff).reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0));

    const prevDay=parseInt(prevCutoff.slice(8)||"0");
    const antDay=parseInt(antCutoff.slice(8)||"0");
    const curLabel=mesLabel(curYM);
    const prevLabel=`${mesLabel(prevYM)} (día ${prevDay})`;
    const antLabel=`${mesLabel(antYM)} (día ${antDay})`;

    const [cy,cm]=curYM.split("-").map(Number);
    const mkYM=(offset)=>{const d=new Date(cy,cm-1+offset,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
    const prevYM=mkYM(-1);
    const antYM=mkYM(-2);
    const diasActual=contarDiasHabiles(`${curYM}-01`,today,diasHabiles);
    const findCutoff=(ym)=>{
      const [y,m]=ym.split("-").map(Number);
      const lastDay=new Date(y,m,0).getDate();
      const endISO=`${ym}-${String(lastDay).padStart(2,"0")}`;

    const puA=calcT("Puebla",curYM,today),  agA=calcT("Aguascalientes",curYM,today);

  const limpiarFoliosDuplicados = async ()=>{
    const campo="folio";
    const totalRevisadas=ovs.length;
    const muestra=ovs.slice(0,5).map(o=>o.folio||"(vacío)");
    const resumen=`Campo revisado: "${campo}"\nOVs totales revisadas: ${totalRevisadas}\n\nPrimeros ${muestra.length} valores de "${campo}" encontrados:\n${muestra.map((f,i)=>`${i+1}. ${f}`).join("\n")||"(sin OVs)"}`;
    console.log(`[LimpiarFolios] ${resumen}`);
    const afectadas=ovs.filter(o=>o.folio&&limpiarFolio(o.folio)!==o.folio);
    if(!afectadas.length){ alert(`${resumen}\n\n✅ No se encontraron folios con prefijo duplicado.`); return; }

                          <div style={{background:et.color,borderRadius:4,width:4,height:18,flexShrink:0}}/>
                          <div style={{fontWeight:700,fontSize:13,color:et.color}}>{et.label}</div>
                          <span style={{background:et.bg,color:et.color,borderRadius:20,padding:"1px 8px",fontSize:11,fontWeight:700}}>{grupo.length}</span>
                        </div>
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {grupo.map(p=>{
                            const venc=p.fecha_seguimiento&&p.fecha_seguimiento<todayISO();
                            const hoy=p.fecha_seguimiento===todayISO();
                            return(
                              <div key={p.id} onClick={()=>{setSelectedProsp(p);setSelected(null);}} style={{background:"#1e293b",borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 4px #00000012",cursor:"pointer",borderLeft:`4px solid ${et.color}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                                <div style={{flex:1}}>
                                  <div style={{fontWeight:700,fontSize:14}}>{p.nombre}</div>
                                  {p.contacto&&<div style={{fontSize:12,color:"#64748b"}}>👤 {p.contacto}</div>}
                                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap",alignItems:"center"}}>
                                    {p.vol_mensual>0&&<span style={{fontSize:11,color:"#64748b",fontWeight:600}}>{p.vol_mensual} ton/mes</span>}
                                    {p.fecha_seguimiento&&<span style={{fontSize:11,color:venc?"#dc2626":hoy?"#d97706":"#94a3b8",fontWeight:venc||hoy?700:400}}>{venc?"⚠ Seg.:":hoy?"🔔 Hoy:":"📅 Seg.:"} {diaLabel(p.fecha_seguimiento)}</span>}
                                  </div>
                                </div>
                                <div style={{background:et.bg,color:et.color,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>{et.label}</div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                  {cerradosPerdidos.length>0&&(
                    <div>
                      <button onClick={()=>setVerCerrados(v=>!v)} style={{background:"none",border:"1px solid #334155",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#64748b",marginBottom:8}}>{verCerrados?`▲ Ocultar cerrados/perdidos`:`▼ Cerrados/Perdidos (${cerradosPerdidos.length})`}</button>
                      {verCerrados&&(
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {cerradosPerdidos.map(p=>{
                            const et=getEtapa(p.etapa);
                            return(
                              <div key={p.id} onClick={()=>{setSelectedProsp(p);setSelected(null);}} style={{background:"#1e293b",borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 4px #00000012",cursor:"pointer",borderLeft:`4px solid ${et.color}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8,opacity:0.7}}>
                                <div style={{flex:1}}>
                                  <div style={{fontWeight:700,fontSize:14}}>{p.nombre}</div>
                                  {p.contacto&&<div style={{fontSize:12,color:"#64748b"}}>👤 {p.contacto}</div>}
                                  {p.vol_mensual>0&&<div style={{fontSize:11,color:"#64748b"}}>{p.vol_mensual} ton/mes</div>}
                                </div>
                                <span style={{background:et.bg,color:et.color,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>{et.label}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              }
            </>
          );
        })()}

        {/* ---- NOTAS ---- */}
        {tab==="notas"&&(()=>{
          const hoy=todayISO();
          const activas=notas.filter(n=>!n.completada).sort((a,b)=>{
            const aV=n=>n.fecha_vencimiento&&n.fecha_vencimiento<=hoy;
            if(aV(a)&&!aV(b)) return -1; if(!aV(a)&&aV(b)) return 1;
            return (a.fecha_vencimiento||"z").localeCompare(b.fecha_vencimiento||"z");
          });
          const completadas=notas.filter(n=>n.completada).sort((a,b)=>(b.fecha_vencimiento||"").localeCompare(a.fecha_vencimiento||""));
          return(
            <>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <button onClick={()=>{setNotaForm(emptyNota);setShowNotaForm(true);}} style={{background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Nueva nota</button>
                {completadas.length>0&&<button onClick={()=>setVerCompletadas(v=>!v)} style={{background:"none",border:"1px solid #334155",borderRadius:8,padding:"6px 12px",fontSize:12,cursor:"pointer",color:"#64748b"}}>{verCompletadas?`▲ Ocultar completadas`:`▼ Completadas (${completadas.length})`}</button>}
              </div>
              {activas.length===0
                ?<EmptyState icon="📝" msg="No tienes notas pendientes." btn="+ Nueva nota" onClick={()=>{setNotaForm(emptyNota);setShowNotaForm(true);}}/>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {activas.map(n=>{
                    const vencida=n.fecha_vencimiento&&n.fecha_vencimiento<hoy;
                    const hoyMismo=n.fecha_vencimiento===hoy;
                    const pr=PRIORIDAD[n.prioridad]||PRIORIDAD.media;
                    const c=n.clienteId?cliById(n.clienteId):null;
                    const cardBg=vencida?"#fef2f2":hoyMismo?"#fffbeb":"white";
                    const borderColor=vencida?"#ef4444":hoyMismo?"#d97706":pr.color;
                    return(
                      <div key={n.id} style={{background:cardBg,borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px #00000040",borderLeft:`4px solid ${borderColor}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:700,fontSize:14,color:"#f8fafc",marginBottom:6}}>{n.texto}</div>
                            <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                              <span style={{background:pr.bg,color:pr.color,border:`1px solid ${pr.color}30`,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:700}}>{pr.label}</span>
                              {n.fecha_vencimiento&&<span style={{fontSize:11,color:vencida?"#dc2626":hoyMismo?"#d97706":"#64748b",fontWeight:vencida||hoyMismo?700:400}}>{vencida?"⚠ Vencida":hoyMismo?"🔔 Hoy":""} {diaLabel(n.fecha_vencimiento)}</span>}
                              {c&&<span style={{fontSize:11,color:"#7c3aed",fontWeight:600}}>👤 {c.nombre}</span>}
                              {n.num_ov&&<span style={{fontSize:11,color:"#64748b"}}>OV: {n.num_ov}</span>}
                            </div>
                          </div>
                          <div style={{display:"flex",gap:6,flexShrink:0}}>
                            <button onClick={()=>completarNota(n.id)} style={{background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:700}} title="Completar">✓</button>
                            <button onClick={()=>{setNotaForm(n);setShowNotaForm(true);}} style={{background:"#243447",color:"#64748b",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer"}} title="Editar">✏️</button>
                            <button onClick={()=>deleteNota(n.id)} style={{background:"#ef444422",color:"#dc2626",border:"none",borderRadius:6,padding:"5px 10px",fontSize:12,cursor:"pointer"}} title="Eliminar">🗑</button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                  {verCompletadas&&completadas.length>0&&(
                    <>
                      <div style={{fontWeight:700,fontSize:11,color:"#94a3b8",textTransform:"uppercase",letterSpacing:.8,marginTop:6,paddingTop:8,borderTop:"1px solid #334155"}}>Completadas ({completadas.length})</div>
                      {completadas.map(n=>(
                        <div key={n.id} style={{background:"#243447",borderRadius:12,padding:"12px 16px",borderLeft:"4px solid #94a3b8",opacity:.7}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,fontSize:13,color:"#64748b",textDecoration:"line-through"}}>{n.texto}</div>
                              {n.fecha_vencimiento&&<div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{diaLabel(n.fecha_vencimiento)}</div>}
                            </div>
                            <div style={{display:"flex",gap:4}}>
                              <button onClick={()=>{setNotaForm(n);setShowNotaForm(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8"}} title="Editar">✏️</button>
                              <button onClick={()=>deleteNota(n.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8"}} title="Eliminar">🗑</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </>
                  )}
                </div>
              }
            </>
          );
        })()}

        {/* ---- CALENDARIO ---- */}
        {tab==="calendario"&&(()=>{
          const hoy=todayISO();
          const mDate=new Date(new Date().getFullYear(),new Date().getMonth()+(calView==="mes"?calOffset:0),1);
          const mLabel=mDate.toLocaleDateString("es-MX",{month:"long",year:"numeric"});
          const firstDay=new Date(mDate.getFullYear(),mDate.getMonth(),1);
          const dowOff=(firstDay.getDay()+6)%7;
          const gridStart=new Date(firstDay); gridStart.setDate(firstDay.getDate()-dowOff);
          const calGrid=Array.from({length:42},(_,i)=>{const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);return d.toISOString().slice(0,10);});
          const calMonthYM=`${mDate.getFullYear()}-${String(mDate.getMonth()+1).padStart(2,"0")}`;
          const wRange=getWeekRange(calView==="semana"?calOffset:0);
          const wDays=Array.from({length:7},(_,i)=>addDays(wRange.start,i));
          const wLabel=`${diaLabel(wRange.start)} — ${diaLabel(wRange.end)}`;
          const showCargas=calTipo==="cargas"||calTipo==="ambas";
          const showEntregas=calTipo==="entregas"||calTipo==="ambas";
          return(
            <>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <button onClick={()=>setCalOffset(o=>o-1)} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontSize:16,lineHeight:1}}>←</button>
                <div style={{flex:1,textAlign:"center",fontWeight:700,fontSize:14,textTransform:"capitalize"}}>{calView==="mes"?mLabel:wLabel}</div>
                <button onClick={()=>setCalOffset(o=>o+1)} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:8,padding:"6px 13px",cursor:"pointer",fontSize:16,lineHeight:1}}>→</button>
                <div style={{display:"flex",gap:4,marginLeft:4}}>
                  <button onClick={()=>{setCalView("mes");setCalOffset(0);}} style={{background:calView==="mes"?"#10B981":"#243447",color:calView==="mes"?"white":"#94a3b8",border:"1px solid #334155",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>Mes</button>
                  <button onClick={()=>{setCalView("semana");setCalOffset(0);}} style={{background:calView==="semana"?"#10B981":"#243447",color:calView==="semana"?"white":"#94a3b8",border:"1px solid #334155",borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:12,fontWeight:700}}>Semana</button>
                </div>
              </div>
              <div style={{display:"flex",gap:6,marginBottom:10,justifyContent:"center"}}>
                {[["cargas","🟣 Cargas"],["entregas","🔵 Entregas"],["ambas","Ambas"]].map(([k,l])=>(
                  <button key={k} onClick={()=>setCalTipo(k)} style={{background:calTipo===k?(k==="cargas"?"#7c3aed":k==="entregas"?"#2563eb":"#10B981"):"#243447",color:calTipo===k?"white":"#94a3b8",border:`1.5px solid ${calTipo===k?(k==="cargas"?"#7c3aed":k==="entregas"?"#2563eb":"#10B981"):"#334155"}`,borderRadius:20,padding:"5px 14px",cursor:"pointer",fontSize:12,fontWeight:700,transition:"all .15s"}}>{l}</button>
                ))}
              </div>
              <div style={{display:"flex",gap:14,marginBottom:12,fontSize:11,color:"#64748b",justifyContent:"center",flexWrap:"wrap"}}>
                {showCargas&&<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:"#7c3aed",display:"inline-block",flexShrink:0}}/>Carga en planta</span>}
                {showEntregas&&<span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,borderRadius:2,background:"#2563eb",display:"inline-block",flexShrink:0}}/>Entrega a cliente</span>}
              </div>

              {calView==="mes"&&(
                <div style={{background:"#1e293b",borderRadius:12,overflow:"hidden",boxShadow:"0 1px 4px #00000040"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:"#10B981"}}>
                    {["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"].map(d=>(
                      <div key={d} style={{padding:"8px 2px",textAlign:"center",fontSize:11,fontWeight:700,color:"white"}}>{d}</div>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)"}}>
                    {calGrid.map(iso=>{
                      const dayCargas=showCargas?ovs.filter(p=>p.fecha_carga===iso):[];
                      const dayEntregas=showEntregas?ovs.filter(p=>p.fecha_entrega===iso):[];
                      const allDay=[...dayCargas.map(p=>({...p,_t:"c"})),...dayEntregas.map(p=>({...p,_t:"e"}))];
                      const inMonth=iso.slice(0,7)===calMonthYM;
                      const isHoy=iso===hoy;
                      const dayNum=parseInt(iso.slice(8));
                      return(
                        <div key={iso} style={{minHeight:60,border:"1px solid #243447",padding:"3px",background:isHoy?"#10B98122":inMonth?"#1e293b":"#182032"}}>
                          <div style={{width:20,height:20,borderRadius:12,background:isHoy?"#10B981":"transparent",color:isHoy?"white":inMonth?"#f8fafc":"#475569",fontSize:11,fontWeight:isHoy?700:400,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>{dayNum}</div>
                          {allDay.slice(0,3).map(p=>{
                            const cc=cliById(p.clienteId);
                            const bg=p._t==="c"?"#7c3aed":"#2563eb";
                            return(
                              <div key={p._t+p.id} onClick={()=>setSelected(ovs.find(x=>x.id===p.id)||p)} style={{background:bg,borderRadius:3,padding:"1px 4px",fontSize:9,color:"white",marginBottom:1,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
                                {p._t==="c"?"🏭":"🚚"} {cc?cc.nombre.split(" ")[0]:p.num_ov}
                              </div>
                            );
                          })}
                          {allDay.length>3&&<div style={{fontSize:9,color:"#94a3b8",paddingLeft:2}}>+{allDay.length-3}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {calView==="semana"&&(
                <div style={{background:"#1e293b",borderRadius:12,boxShadow:"0 1px 4px #00000040",overflowX:"auto"}}>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(7,minmax(100px,1fr))",gap:8,padding:12,minWidth:560}}>
                    {wDays.map(iso=>{
                      const dayCargas=showCargas?ovs.filter(p=>p.fecha_carga===iso):[];
                      const dayEntregas=showEntregas?ovs.filter(p=>p.fecha_entrega===iso):[];
                      const isHoy=iso===hoy;
                      const d=new Date(iso+"T12:00");
                      const dShort=d.toLocaleDateString("es-MX",{weekday:"short"});
                      return(
                        <div key={iso} style={{minWidth:0}}>
                          <div style={{textAlign:"center",padding:"8px 4px",background:isHoy?"#10B981":"#243447",borderRadius:8,marginBottom:8,color:isHoy?"white":"#94a3b8"}}>
                            <div style={{fontSize:10,fontWeight:700,textTransform:"capitalize"}}>{dShort}</div>
                            <div style={{fontSize:18,fontWeight:900}}>{d.getDate()}</div>
                          </div>
                          {dayCargas.map(p=>{
                            const cc=cliById(p.clienteId);
                            return(
                              <div key={"c"+p.id} onClick={()=>setSelected(p)} style={{background:"#7c3aed22",borderLeft:"3px solid #7c3aed",borderRadius:6,padding:"6px 8px",marginBottom:6,cursor:"pointer"}}>
                                <div style={{fontWeight:700,fontSize:11,color:"#7c3aed",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>🏭 {cc?cc.nombre:"Sin cliente"}</div>
                                <div style={{fontSize:10,color:"#64748b"}}>{p.num_ov}</div>
                                {parseFloat(p.toneladas)>0&&<div style={{fontSize:10,color:"#94a3b8"}}>{fmtT(p.toneladas)} ton</div>}
                              </div>
                            );
                          })}
                          {dayEntregas.map(p=>{
                            const cc=cliById(p.clienteId);
                            return(
                              <div key={"e"+p.id} onClick={()=>setSelected(p)} style={{background:"#10B98122",borderLeft:"3px solid #2563eb",borderRadius:6,padding:"6px 8px",marginBottom:6,cursor:"pointer"}}>
                                <div style={{fontWeight:700,fontSize:11,color:"#2563eb",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>🚚 {cc?cc.nombre:"Sin cliente"}</div>
                                <div style={{fontSize:10,color:"#64748b"}}>{p.num_ov}</div>
                                {parseFloat(p.toneladas)>0&&<div style={{fontSize:10,color:"#94a3b8"}}>{fmtT(p.toneladas)} ton</div>}
                              </div>
                            );
                          })}
                          {dayCargas.length===0&&dayEntregas.length===0&&<div style={{fontSize:10,color:"#334155",textAlign:"center",padding:"14px 0"}}>—</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          );
        })()}

        {/* ---- PROGRAMACIÓN SEMANAL ---- */}
        {tab==="programacion"&&(
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div style={{fontWeight:700,fontSize:15,color:"#f8fafc"}}>Programación Semanal</div>
              <button onClick={()=>setProgEntradas(prev=>[...prev,{id:Date.now(),clienteId:"",planta:"PU",slots:[{dia:"Lunes",hora:"8AM"}]}])} style={{background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Agregar entrega</button>
            </div>
            {progEntradas.length===0
              ?<EmptyState icon="📋" msg="Agrega entregas para generar la programación semanal."/>
              :<div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
                {progEntradas.map(ent=>(
                  <div key={ent.id} style={{background:"#1e293b",borderRadius:12,padding:"14px",boxShadow:"0 1px 4px #00000040"}}>
                    <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                      <select value={ent.clienteId} onChange={e=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,clienteId:e.target.value}:x))} style={{...inS,flex:"2 1 160px"}}>
                        <option value="">— Selecciona cliente —</option>
                        {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}{c.ciudad?` (${c.ciudad})`:""}</option>)}
                      </select>
                      <select value={ent.planta} onChange={e=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,planta:e.target.value}:x))} style={{...inS,flex:"1 1 120px"}}>
                        {Object.entries(PLANTAS).map(([k,v])=><option key={k} value={k}>{k} — {v}</option>)}
                      </select>
                      <button onClick={()=>setProgEntradas(prev=>prev.filter(x=>x.id!==ent.id))} style={{background:"#ef444422",color:"#dc2626",border:"none",borderRadius:6,padding:"6px 11px",cursor:"pointer",fontSize:14,fontWeight:700,flexShrink:0}}>✕</button>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:6}}>
                      {ent.slots.map((slot,slotIdx)=>(
                        <div key={slotIdx} style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                          <select value={slot.dia} onChange={e=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,slots:x.slots.map((s,i)=>i===slotIdx?{...s,dia:e.target.value}:s)}:x))} style={{...inS,flex:"2 1 110px"}}>
                            {["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"].map(d=><option key={d} value={d}>{d}</option>)}
                          </select>
                          <select value={slot.hora} onChange={e=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,slots:x.slots.map((s,i)=>i===slotIdx?{...s,hora:e.target.value}:s)}:x))} style={{...inS,flex:"1 1 80px"}}>
                            {["6AM","7AM","8AM","9AM","10AM","11AM","12PM","1PM","2PM","3PM","4PM","5PM"].map(h=><option key={h} value={h}>{h}</option>)}
                          </select>
                          {ent.slots.length>1&&<button onClick={()=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,slots:x.slots.filter((_,i)=>i!==slotIdx)}:x))} style={{background:"#243447",color:"#94a3b8",border:"none",borderRadius:6,padding:"5px 9px",cursor:"pointer",flexShrink:0}}>−</button>}
                        </div>
                      ))}
                      <button onClick={()=>setProgEntradas(prev=>prev.map(x=>x.id===ent.id?{...x,slots:[...x.slots,{dia:"Lunes",hora:"8AM"}]}:x))} style={{background:"#16a34a22",color:"#16a34a",border:"1px solid #16a34a44",borderRadius:6,padding:"5px 12px",fontSize:12,cursor:"pointer",fontWeight:600,alignSelf:"flex-start",marginTop:2}}>+ Día / hora</button>
                    </div>
                  </div>
                ))}
              </div>
            }
            {progEntradas.length>0&&(
              <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
                <button onClick={generarMensajeProg} style={{background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>📋 Generar mensaje</button>
                {progMensaje&&<button onClick={()=>{if(navigator.clipboard) navigator.clipboard.writeText(progMensaje);}} style={{background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"10px 18px",fontWeight:700,cursor:"pointer",fontSize:13}}>📋 Copiar</button>}
                <button onClick={()=>{setProgEntradas([]);setProgMensaje("");}} style={{background:"#ef444422",color:"#dc2626",border:"1px solid #fecaca",borderRadius:8,padding:"10px 14px",fontWeight:700,cursor:"pointer",fontSize:13}}>Limpiar</button>
              </div>
            )}
            {progMensaje&&(
              <div style={{background:"#1e293b",borderRadius:12,padding:"16px",boxShadow:"0 1px 4px #00000040",borderLeft:"4px solid #10B981"}}>
                <div style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",marginBottom:8,letterSpacing:.6}}>Mensaje generado</div>
                <pre style={{fontFamily:"'Segoe UI',sans-serif",fontSize:13,whiteSpace:"pre-wrap",color:"#f8fafc",margin:0,lineHeight:1.6}}>{progMensaje}</pre>
              </div>
            )}
          </>
        )}

        {/* ---- INTELIGENCIA DE NEGOCIO ---- */}
        {tab==="inteligencia"&&(()=>{
          const META=20000;
          const HITOS=[5000,10000,15000,20000];
          const today=todayISO();
          const curYM=currentYM();
          const [cy,cm]=curYM.split("-").map(Number);
          const mkYMoff=(off)=>{const d=new Date(cy,cm-1+off,1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
          const prevYM=mkYMoff(-1);

          const lastDayCur=new Date(cy,cm,0).getDate();
          const lastDayCurISO=`${curYM}-${String(lastDayCur).padStart(2,"0")}`;
          const lastDayPrev=new Date(cy,cm-1,0).getDate();
          const lastDayPrevISO=`${prevYM}-${String(lastDayPrev).padStart(2,"0")}`;

          const diasTranscurridos=contarDiasHabiles(`${curYM}-01`,today,diasHabiles);
          const totalDiasMes=contarDiasHabiles(`${curYM}-01`,lastDayCurISO,diasHabiles);
          const diasRestantes=totalDiasMes-diasTranscurridos;

          const ovsEntCur=ovs.filter(p=>p.status==="entregado"&&(p.fecha_carga||"").startsWith(curYM));
          const tonMesActual=ovsEntCur.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);

          const findCutoffPrev=()=>{
            if(diasTranscurridos===0) return lastDayPrevISO;
            let cnt=0;
            const d=new Date(`${prevYM}-01T12:00`);
            const end=new Date(lastDayPrevISO+"T12:00");
            while(d<=end){
              const iso=d.toISOString().slice(0,10);
              if(esDiaHabilReal(iso,diasHabiles)){cnt++;if(cnt===diasTranscurridos)return iso;}
              d.setDate(d.getDate()+1);
            }
            return lastDayPrevISO;
          };
          const prevCutoff=findCutoffPrev();
          const ovsEntPrev=ovs.filter(p=>p.status==="entregado"&&(p.fecha_carga||"").startsWith(prevYM)&&(p.fecha_carga||"")<=prevCutoff);
          const tonMesPrev=ovsEntPrev.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);

          const ritmoActual=diasTranscurridos>0?tonMesActual/diasTranscurridos:0;
          const ritmoPrev=diasTranscurridos>0&&tonMesPrev>0?tonMesPrev/diasTranscurridos:0;
          const proyeccion=tonMesActual+ritmoActual*diasRestantes;
          const pct=Math.min((tonMesActual/META)*100,100);
          const ritmoNecesario=diasRestantes>0?(META-tonMesActual)/diasRestantes:0;

          const clientesSemaforo=clientes.map(c=>{
            const ovsCliCur=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(curYM));
            const ovsCliPrev=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado"&&(p.fecha_carga||"").startsWith(prevYM)&&(p.fecha_carga||"")<=prevCutoff);
            const tonCur=ovsCliCur.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
            const tonPrev=ovsCliPrev.reduce((s,p)=>s+(parseFloat(p.toneladas)||0),0);
            const ratio=tonPrev>0?tonCur/tonPrev:(tonCur>0?1:0);
            const allDels=ovs.filter(p=>p.clienteId===c.id&&p.status==="entregado"&&p.fecha_carga).sort((a,b)=>b.fecha_carga.localeCompare(a.fecha_carga));
            const lastDel=allDels[0]?.fecha_carga;
            const diasSinEntrega=lastDel?Math.max(0,contarDiasHabiles(lastDel,today,diasHabiles)-1):999;
            const ec=estadoCuenta.find(e=>e.id===c.id)||{};
            const saldo=ec.saldo!=null?ec.saldo:0;
            const precioTon=parseFloat(c.precio_ton)||0;
            const causas=[];
            if(diasSinEntrega>5) causas.push("Sin entregas recientes");
            if(tonPrev>0&&ratio<0.7) causas.push("Volumen bajo");
            if(saldo<0) causas.push("Sin anticipo");
            let semaforo="verde";
            if(diasSinEntrega>5||(tonPrev>0&&ratio<0.7)) semaforo="rojo";
            else if(tonPrev>0&&ratio<1.0) semaforo="amarillo";
            return {...c,tonCur,tonPrev,ratio,diasSinEntrega,saldo,semaforo,causas,precioTon};
          }).filter(c=>c.tonCur>0||c.tonPrev>0).sort((a,b)=>({rojo:0,amarillo:1,verde:2}[a.semaforo]-({rojo:0,amarillo:1,verde:2}[b.semaforo])));

          const alertas=[];
          if(diasTranscurridos>2&&ritmoActual<ritmoNecesario&&ritmoNecesario>0){
            alertas.push({tipo:"rojo",icon:"📉",titulo:"Ritmo insuficiente para la meta",desc:`Necesitas ${fmtT(ritmoNecesario)} ton/día hábil para alcanzar ${META.toLocaleString()} ton. Ritmo actual: ${fmtT(ritmoActual)} ton/día hábil.`});
          }
          clientesSemaforo.forEach(c=>{
            if(c.saldo>0&&c.precioTon>0&&(c.saldo/(30*c.precioTon))<2){
              alertas.push({tipo:"amarillo",icon:"💰",titulo:`${c.nombre} — Anticipo bajo`,desc:`Saldo: ${fmt(c.saldo)} (menos de 2 entregas estimadas)`});
            }
            if(c.diasSinEntrega>5&&c.tonPrev>0){
              alertas.push({tipo:"rojo",icon:"⏱",titulo:`${c.nombre} — Sin actividad`,desc:`${c.diasSinEntrega} días hábiles sin entregas`});
            }
          });

          const semColor={verde:"#10B981",amarillo:"#f59e0b",rojo:"#ef4444"};
          const semBg={verde:"#10B98122",amarillo:"#f59e0b22",rojo:"#ef444422"};
          const semLabel={verde:"✅ Al ritmo",amarillo:"⚠️ Bajo ritmo",rojo:"🔴 Crítico"};

          return(<>
            {/* ENCABEZADO */}
            <div style={{background:"linear-gradient(135deg,#10B981,#059669)",borderRadius:14,padding:"18px 20px",color:"white",marginBottom:14}}>
              <div style={{fontSize:10,opacity:.7,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>📈 Inteligencia de Negocio</div>
              <div style={{fontSize:22,fontWeight:900}}>{mesLabel(curYM)}</div>
              <div style={{fontSize:11,opacity:.6,marginTop:4}}>{diasTranscurridos} días hábiles transcurridos · {diasRestantes} restantes de {totalDiasMes}</div>
            </div>

            {/* TERMÓMETRO 20K */}
            <div style={{background:"#1e293b",borderRadius:12,padding:"18px 16px",marginBottom:12,boxShadow:"0 1px 4px #00000040"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#f8fafc",marginBottom:2}}>🎯 Termómetro Plan 20,000 ton/mes</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:14}}>Progreso hacia la meta mensual de volumen</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
                <div style={{background:"#243447",borderRadius:10,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Actual</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#10B981"}}>{fmtT(tonMesActual)}</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>toneladas</div>
                </div>
                <div style={{background:"#243447",borderRadius:10,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Proyección</div>
                  <div style={{fontSize:22,fontWeight:900,color:proyeccion>=META?"#10B981":"#f59e0b"}}>{fmtT(proyeccion)}</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>ton estimadas</div>
                </div>
                <div style={{background:"#243447",borderRadius:10,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Ritmo</div>
                  <div style={{fontSize:22,fontWeight:900,color:"#f8fafc"}}>{fmtT(ritmoActual)}</div>
                  <div style={{fontSize:9,color:"#94a3b8"}}>ton/día hábil</div>
                </div>
              </div>
              <div style={{position:"relative",height:28,background:"#243447",borderRadius:14,overflow:"hidden",marginBottom:6}}>
                <div style={{position:"absolute",left:0,top:0,height:"100%",width:`${pct}%`,background:"linear-gradient(90deg,#059669,#10B981)",borderRadius:14}}/>
                {HITOS.slice(0,-1).map(h=>(
                  <div key={h} style={{position:"absolute",left:`${(h/META)*100}%`,top:0,bottom:0,width:2,background:"#0F172A",opacity:.6}}/>
                ))}
                <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",textShadow:"0 1px 3px #00000080"}}>{pct.toFixed(1)}%</div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,paddingLeft:"0%"}}>
                {HITOS.map(h=>(
                  <div key={h} style={{textAlign:"center",flex:1}}>
                    <div style={{fontSize:9,color:tonMesActual>=h?"#10B981":"#475569",fontWeight:700}}>{(h/1000).toFixed(0)}K {tonMesActual>=h?"✓":""}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* PROYECCIÓN CIERRE */}
            <div style={{background:"#1e293b",borderRadius:12,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px #00000040"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#f8fafc",marginBottom:12}}>📊 Proyección de cierre de mes</div>
              <div style={{background:proyeccion>=META?"#10B98122":"#f59e0b22",borderRadius:10,padding:"14px 16px",marginBottom:12,borderLeft:`4px solid ${proyeccion>=META?"#10B981":"#f59e0b"}`}}>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:4}}>A este ritmo cerrarás el mes con:</div>
                <div style={{fontSize:28,fontWeight:900,color:proyeccion>=META?"#10B981":"#f59e0b"}}>{fmtT(proyeccion)} ton</div>
                {proyeccion<META
                  ?<div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Faltan {fmtT(META-proyeccion)} ton · Necesitas {fmtT(ritmoNecesario)} ton/día hábil</div>
                  :<div style={{fontSize:12,color:"#10B981",marginTop:4}}>✅ En camino a superar la meta de {META.toLocaleString()} ton</div>
                }
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div style={{background:"#243447",borderRadius:10,padding:"12px"}}>
                  <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{mesLabel(curYM).split(" ")[0]} (actual)</div>
                  <div style={{fontSize:18,fontWeight:800,color:"#10B981"}}>{fmtT(tonMesActual)} ton</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>{fmtT(ritmoActual)} ton/día hábil</div>
                </div>
                <div style={{background:"#243447",borderRadius:10,padding:"12px"}}>
                  <div style={{fontSize:9,color:"#64748b",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>{mesLabel(prevYM).split(" ")[0]} (mismo día)</div>
                  <div style={{fontSize:18,fontWeight:800,color:"#94a3b8"}}>{fmtT(tonMesPrev)} ton</div>
                  <div style={{fontSize:10,color:"#64748b"}}>{fmtT(ritmoPrev)} ton/día hábil</div>
                </div>
              </div>
              {ritmoPrev>0&&(
                <div style={{marginTop:10,fontSize:12,fontWeight:700,textAlign:"center",color:ritmoActual>=ritmoPrev?"#10B981":"#f59e0b"}}>
                  {ritmoActual>=ritmoPrev?"▲":"▼"} {Math.abs(((ritmoActual-ritmoPrev)/ritmoPrev)*100).toFixed(1)}% vs mismo período {mesLabel(prevYM).split(" ")[0]}
                </div>
              )}
            </div>

            {/* SEMÁFORO DE CLIENTES */}
            <div style={{background:"#1e293b",borderRadius:12,padding:"16px",marginBottom:12,boxShadow:"0 1px 4px #00000040"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#f8fafc",marginBottom:4}}>🚦 Semáforo de clientes</div>
              <div style={{fontSize:11,color:"#64748b",marginBottom:12}}>Ritmo de entrega comparado con el mismo período del mes anterior</div>
              {clientesSemaforo.length===0
                ?<div style={{fontSize:13,color:"#94a3b8",textAlign:"center",padding:"20px 0"}}>Sin entregas registradas este mes o el anterior</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {clientesSemaforo.map(c=>(
                    <div key={c.id} style={{background:"#243447",borderRadius:10,padding:"12px 14px",borderLeft:`4px solid ${semColor[c.semaforo]}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:700,fontSize:13,color:"#f1f5f9"}}>{c.nombre}</div>
                          <div style={{display:"flex",gap:10,marginTop:4,flexWrap:"wrap"}}>
                            <span style={{fontSize:11,color:"#94a3b8"}}>Actual: <b style={{color:"#f1f5f9"}}>{fmtT(c.tonCur)} ton</b></span>
                            {c.tonPrev>0&&<span style={{fontSize:11,color:"#94a3b8"}}>Anterior: <b style={{color:"#64748b"}}>{fmtT(c.tonPrev)} ton</b></span>}
                            {c.diasSinEntrega<999&&<span style={{fontSize:11,color:"#94a3b8"}}>{c.diasSinEntrega} día{c.diasSinEntrega!==1?"s":""} sin entrega</span>}
                          </div>
                          {c.causas.length>0&&(
                            <div style={{display:"flex",gap:4,marginTop:6,flexWrap:"wrap"}}>
                              {c.causas.map(ca=>(
                                <span key={ca} style={{fontSize:10,background:semBg[c.semaforo],color:semColor[c.semaforo],borderRadius:20,padding:"2px 8px",fontWeight:700}}>{ca}</span>
                              ))}
                            </div>
                          )}
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:10,fontWeight:700,color:semColor[c.semaforo]}}>{semLabel[c.semaforo]}</div>
                          {c.tonPrev>0&&<div style={{fontSize:14,fontWeight:800,color:c.ratio>=1?"#10B981":c.ratio>=.7?"#f59e0b":"#ef4444"}}>{(c.ratio*100).toFixed(0)}%</div>}
                          {c.tonPrev===0&&c.tonCur>0&&<div style={{fontSize:10,color:"#64748b"}}>Nuevo</div>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              }
            </div>

            {/* ALERTAS INTELIGENTES */}
            <div style={{background:"#1e293b",borderRadius:12,padding:"16px",marginBottom:20,boxShadow:"0 1px 4px #00000040"}}>
              <div style={{fontWeight:800,fontSize:14,color:"#f8fafc",marginBottom:12}}>⚡ Alertas inteligentes</div>
              {alertas.length===0
                ?<div style={{background:"#10B98122",borderRadius:8,padding:"12px 14px",fontSize:13,color:"#10B981",fontWeight:600}}>✅ Sin alertas activas — todo en orden</div>
                :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {alertas.map((a,i)=>(
                    <div key={i} style={{background:semBg[a.tipo],borderRadius:10,padding:"12px 14px",borderLeft:`4px solid ${semColor[a.tipo]}`}}>
                      <div style={{fontWeight:700,fontSize:13,color:semColor[a.tipo]}}>{a.icon} {a.titulo}</div>
                      <div style={{fontSize:12,color:"#94a3b8",marginTop:3}}>{a.desc}</div>
                    </div>
                  ))}
                </div>
              }
            </div>
          </>);
        })()}

        {/* ---- FACTURAS ---- */}
        {tab==="facturas"&&(()=>{
          const mesActual=currentYM();
          const factMes=facturas.filter(f=>(f.fecha||"").startsWith(mesActual)&&f.estatus==="Emitida");
          const totalMes=factMes.reduce((s,f)=>s+(parseFloat(f.total_con_iva)||0),0);
          const factFiltradas=(filtroFacturaCliente?facturas.filter(f=>f.clienteId===filtroFacturaCliente):facturas);
          return(
            <>
              <div style={{background:"linear-gradient(135deg,#10B981,#059669)",borderRadius:14,padding:"18px 20px",color:"white",marginBottom:14}}>
                <div style={{fontSize:10,opacity:.7,fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>🧾 Facturado {mesLabel(mesActual)}</div>
                <div style={{fontSize:36,fontWeight:900,letterSpacing:-1}}>{fmt(totalMes)}</div>
                <div style={{fontSize:11,opacity:.6,marginTop:4}}>{factMes.length} factura{factMes.length!==1?"s":""} emitida{factMes.length!==1?"s":""}</div>
              </div>
              <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={()=>{setFacturaForm(emptyFactura);setMontoEditadoManualmente(false);setShowFacturaForm(true);}} style={{background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"8px 16px",fontWeight:700,cursor:"pointer",fontSize:13}}>+ Nueva factura</button>
              </div>
              <div style={{marginBottom:14}}>
                <select value={filtroFacturaCliente} onChange={e=>setFiltroFacturaCliente(e.target.value)} style={{...inS,background:"#1e293b"}}>
                  <option value="">— Todos los clientes —</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                </select>
              </div>
              {factFiltradas.length===0
                ?<EmptyState icon="🧾" msg="Sin facturas registradas."/>
                :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {factFiltradas.map(f=>{
                    const cli=cliById(f.clienteId);
                    return(
                      <div key={f.id} style={{background:"#1e293b",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px #00000040",borderLeft:`4px solid ${f.estatus==="Cancelada"?"#ef4444":"#10B981"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:800,fontSize:16,color:"#f8fafc",lineHeight:1.2}}>{cli?.nombre||"—"}</div>
                            <div style={{fontWeight:600,fontSize:13,color:"#94a3b8",marginTop:3}}>{f.folio_fiscal||"(sin folio)"}</div>
                            <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap",alignItems:"center"}}>
                              <span style={{fontSize:11,color:"#94a3b8"}}>{f.fecha}</span>
                              <span style={{fontSize:11,background:f.tipo==="Complemento"?"#f5f3ff":"#eff6ff",color:f.tipo==="Complemento"?"#7c3aed":"#1e40af",borderRadius:20,padding:"2px 8px",fontWeight:600}}>{f.tipo}</span>
                              <span style={{fontSize:11,background:f.estatus==="Cancelada"?"#fef2f2":"#f0fdf4",color:f.estatus==="Cancelada"?"#dc2626":"#16a34a",borderRadius:20,padding:"2px 8px",fontWeight:600}}>{f.estatus}</span>
                              <span style={{fontSize:14,fontWeight:800,color:f.estatus==="Cancelada"?"#94a3b8":"#10B981",marginLeft:"auto"}}>{fmt(f.total_con_iva)}</span>
                            </div>
                          </div>
                          <div style={{display:"flex",gap:4,flexShrink:0}}>
                            <button onClick={()=>{setFacturaForm({...f,monto_total:String(f.total_con_iva||f.monto_total||"")});setMontoEditadoManualmente(true);setShowFacturaForm(true);}} title="Editar" style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#94a3b8",padding:"2px"}}>✏️</button>
                            <button onClick={()=>cancelarFactura(f.id)} title={f.estatus==="Cancelada"?"Reactivar":"Cancelar"} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:"#94a3b8",padding:"2px"}}>{f.estatus==="Cancelada"?"↩️":"🚫"}</button>
                          </div>
                        </div>
                        {f.notas&&<div style={{fontSize:11,color:"#64748b",marginTop:6,borderTop:"1px solid #243447",paddingTop:6}}>{f.notas}</div>}
                      </div>
                    );
                  })}
                </div>
              }
            </>
          );
        })()}
      </div>

      {/* PROSP DETAIL PANEL */}
      {selectedProsp&&!showProspForm&&(()=>{
        const p=selectedProsp;
        const et=getEtapa(p.etapa);
        const nextKey=ETAPA_NEXT[p.etapa];
        const nextLabel=ETAPA_NEXT_LABEL[p.etapa];
        return(
          <div style={{position:"fixed",bottom:0,left:0,right:0,background:"#1e293b",borderTop:"2px solid #334155",padding:"18px 20px",boxShadow:"0 -4px 20px #00000060",maxHeight:"62vh",overflowY:"auto",zIndex:100}}>
            <div style={{maxWidth:700,margin:"0 auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16}}>{p.nombre}</div>
                  {p.contacto&&<div style={{fontSize:12,color:"#64748b"}}>👤 {p.contacto}</div>}
                  {p.telefono&&<div style={{fontSize:12,color:"#64748b"}}>📱 {p.telefono}</div>}
                </div>
                <button onClick={()=>setSelectedProsp(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>×</button>

      {/* LECTOR DE REMISIONES */}
      {showLector&&lectorOV&&(()=>{
        const PROMPT_LECTOR = "Extrae los siguientes datos de esta remisión de cemento Cruz Azul: Número de remisión (formato: AG-XXXXXX, PU-XXXXXX o BQ-XXXXXX), Número de OV (Orden de Venta) — el número de OV en la remisión puede aparecer en formato como 'SG-2292690-1.000'; extrae ÚNICAMENTE el número central (los dígitos entre el primer y segundo guión, ej. '2292690'), Fecha de remisión, Peso neto en toneladas (usar el del ticket de báscula/reverso si hay dos valores). Responde SOLO en JSON con los campos: numeroRemision, numeroOV, fecha, pesoNeto";

        const toBase64 = (file) => new Promise((resolve,reject)=>{
          const r=new FileReader();
          r.onload=e=>resolve(e.target.result.split(',')[1]);
          r.onerror=reject;
          r.readAsDataURL(file);
        });

        const fileToBlock = async (file) => {
          const b64=await toBase64(file);
          if(file.type==='application/pdf') return {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}};
          return {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}};
        };

        const leerRemision = async () => {
          setLectorStep("loading"); setLectorError("");
          try {
            let blocks=[];
            if(lectorMode==="single"){
              if(!lectorFiles.a){setLectorError("Selecciona un archivo");setLectorStep("idle");return;}
              blocks.push(await fileToBlock(lectorFiles.a));
            } else if(lectorMode==="dual"){
              if(!lectorFiles.a||!lectorFiles.b){setLectorError("Selecciona ambos archivos");setLectorStep("idle");return;}
              blocks.push(await fileToBlock(lectorFiles.a));
              blocks.push(await fileToBlock(lectorFiles.b));
            } else if(lectorMode==="clipboard"){
              const items=await navigator.clipboard.read();
              let found=false;
              for(const item of items){
                for(const type of item.types){
                  if(type.startsWith('image/')){
                    const blob=await item.getType(type);
                    const arr=await blob.arrayBuffer();
                    const b64=btoa(String.fromCharCode(...new Uint8Array(arr)));
                    blocks.push({type:"image",source:{type:"base64",media_type:type,data:b64}});
                    found=true; break;
                  }
                }
                if(found) break;
              }
              if(!found){setLectorError("No hay imagen en el portapapeles");setLectorStep("idle");return;}
            }
            const resp=await fetch('/.netlify/functions/claude-proxy',{
              method:'POST',
              headers:{'content-type':'application/json'},
              body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:[...blocks,{type:'text',text:PROMPT_LECTOR}]}]})
            });
            if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||err.error||`Error ${resp.status}`);}
            const data=await resp.json();
            const raw=data.content[0].text;
            const cleaned=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
            setLectorData(JSON.parse(cleaned));
            setLectorStep("confirm");
          } catch(e){
            setLectorError(e.message||"Error al procesar");
            setLectorStep("error");
          }
        };

        const lectorConfirmar = () => {
          upd(lectorOV.id,{folio:lectorData.numeroRemision,fecha_carga:lectorData.fecha,toneladas:parseFloat(lectorData.pesoNeto)});
          setLectorStep("success");
        };

                      {lectorMode==="dual"&&(

                      <button onClick={leerRemision} style={{width:"100%",background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:"pointer",fontSize:14}}>

      {/* LECTOR NUEVA OV — sin OV previa */}
      {showLectorNuevo&&(()=>{
        const PROMPT_LECTOR = "Extrae los siguientes datos de esta remisión de cemento Cruz Azul: Número de remisión (formato: AG-XXXXXX, PU-XXXXXX o BQ-XXXXXX), Número de OV (Orden de Venta) — el número de OV en la remisión puede aparecer en formato como 'SG-2292690-1.000'; extrae ÚNICAMENTE el número central (los dígitos entre el primer y segundo guión, ej. '2292690'), Fecha de remisión, Peso neto en toneladas (usar el del ticket de báscula/reverso si hay dos valores). Responde SOLO en JSON con los campos: numeroRemision, numeroOV, fecha, pesoNeto";

        const toBase64 = (file) => new Promise((resolve,reject)=>{
          const r=new FileReader();
          r.onload=e=>resolve(e.target.result.split(',')[1]);
          r.onerror=reject;
          r.readAsDataURL(file);
        });

        const fileToBlock = async (file) => {
          const b64=await toBase64(file);
          if(file.type==='application/pdf') return {type:"document",source:{type:"base64",media_type:"application/pdf",data:b64}};
          return {type:"image",source:{type:"base64",media_type:file.type||"image/jpeg",data:b64}};
        };

        const leerRemision = async () => {
          setLectorStep("loading"); setLectorError("");
          try {
            let blocks=[];
            if(lectorMode==="single"){
              if(!lectorFiles.a){setLectorError("Selecciona un archivo");setLectorStep("idle");return;}
              blocks.push(await fileToBlock(lectorFiles.a));
            } else if(lectorMode==="dual"){
              if(!lectorFiles.a||!lectorFiles.b){setLectorError("Selecciona ambos archivos");setLectorStep("idle");return;}
              blocks.push(await fileToBlock(lectorFiles.a));
              blocks.push(await fileToBlock(lectorFiles.b));
            } else if(lectorMode==="clipboard"){
              const items=await navigator.clipboard.read();
              let found=false;
              for(const item of items){
                for(const type of item.types){
                  if(type.startsWith('image/')){
                    const blob=await item.getType(type);
                    const arr=await blob.arrayBuffer();
                    const b64=btoa(String.fromCharCode(...new Uint8Array(arr)));
                    blocks.push({type:"image",source:{type:"base64",media_type:type,data:b64}});
                    found=true; break;
                  }
                }
                if(found) break;
              }
              if(!found){setLectorError("No hay imagen en el portapapeles");setLectorStep("idle");return;}
            }
            const resp=await fetch('/.netlify/functions/claude-proxy',{
              method:'POST',
              headers:{'content-type':'application/json'},
              body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1024,messages:[{role:'user',content:[...blocks,{type:'text',text:PROMPT_LECTOR}]}]})
            });
            if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||err.error||`Error ${resp.status}`);}
            const data=await resp.json();
            const raw=data.content[0].text;
            const cleaned=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
            setLectorData(JSON.parse(cleaned));
            setLectorStep("confirm");
          } catch(e){
            setLectorError(e.message||"Error al procesar");
            setLectorStep("error");
          }
        };

        const cerrarLectorNuevo = () => {
          setShowLectorNuevo(false);
          setLectorStep("idle"); setLectorData(null); setLectorFiles({a:null,b:null}); setLectorError("");
        };

        const lectorNuevoConfirmar = async () => {
          const {numeroRemision,numeroOV,fecha,pesoNeto}=lectorData;
          const serie=(numeroRemision||"").split("-")[0].toUpperCase();
          const id=`OV-${Date.now()}`;
          const nuevaOV={...emptyOV,id,num_ov:numeroOV||"",folio:numeroRemision||"",fecha_carga:fecha||todayISO(),toneladas:parseFloat(pesoNeto)||0,serie};
          setOVs(prev=>[nuevaOV,...prev]);
          await saveToDb("ovs",id,nuevaOV);
          cerrarLectorNuevo();
          setForm({...nuevaOV,precio_ton:""});
          setShowForm(true);
        };

        const tabBtn = (mode,label) => (
          <button key={mode} onClick={()=>{setLectorMode(mode);setLectorStep("idle");setLectorError("");}} style={{padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",border:"none",borderRadius:6,background:lectorMode===mode?"#10B981":"#243447",color:lectorMode===mode?"white":"#94a3b8"}}>{label}</button>
        );

        return (
          <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"#1e293b",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,padding:"22px 20px",maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:17}}>📄 Nueva OV desde Remisión</div>
                <button onClick={cerrarLectorNuevo} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8"}}>✕</button>
              </div>
              <div style={{background:"#243447",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#94a3b8",marginBottom:14}}>
                La IA extraerá los datos. Podrás asignar el cliente y precio en el formulario siguiente.
              </div>

              <div style={{display:"flex",gap:6,marginBottom:14}}>
                {tabBtn("single","📎 Archivo único")}
                {tabBtn("clipboard","📋 Portapapeles")}
                {tabBtn("dual","🔁 Frente + reverso")}
              </div>

              {(lectorStep==="idle"||lectorStep==="error")&&(
                <>
                  {lectorMode==="single"&&(
                    <div style={{marginBottom:14}}>
                      <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Imagen JPG o PDF de la remisión</label>
                      <input type="file" accept="image/*,.pdf" onChange={e=>setLectorFiles(f=>({...f,a:e.target.files[0]||null}))} style={{...inS,padding:"6px 8px"}}/>
                      {lectorFiles.a&&<div style={{fontSize:11,color:"#0891b2",marginTop:4}}>✓ {lectorFiles.a.name}</div>}
                    </div>
                  )}
                  {lectorMode==="dual"&&(
                    <div style={{marginBottom:14}}>
                      <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4}}>Frente (portada de la remisión AG)</label>
                      <input type="file" accept="image/*,.pdf" onChange={e=>setLectorFiles(f=>({...f,a:e.target.files[0]||null}))} style={{...inS,padding:"6px 8px"}}/>
                      {lectorFiles.a&&<div style={{fontSize:11,color:"#0891b2",marginTop:4,marginBottom:8}}>✓ {lectorFiles.a.name}</div>}
                      <label style={{fontSize:11,color:"#64748b",display:"block",marginBottom:4,marginTop:6}}>Reverso (ticket de báscula — peso neto)</label>
                      <input type="file" accept="image/*,.pdf" onChange={e=>setLectorFiles(f=>({...f,b:e.target.files[0]||null}))} style={{...inS,padding:"6px 8px"}}/>
                      {lectorFiles.b&&<div style={{fontSize:11,color:"#0891b2",marginTop:4}}>✓ {lectorFiles.b.name}</div>}
                    </div>
                  )}
                  {lectorMode==="clipboard"&&(
                    <div style={{marginBottom:14,background:"#243447",borderRadius:8,padding:"18px",textAlign:"center"}}>
                      <div style={{fontSize:32,marginBottom:8}}>📋</div>
                      <div style={{fontSize:13,color:"#94a3b8",marginBottom:4}}>Copia una imagen al portapapeles</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>Ctrl+C sobre la imagen, o "Copiar imagen" en el menú contextual</div>
                    </div>
                  )}
                  {lectorError&&<div style={{background:"#ef444422",color:"#dc2626",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:12,border:"1px solid #fecaca"}}>{lectorError}</div>}
                  <button onClick={leerRemision} style={{width:"100%",background:"#10B981",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:"pointer",fontSize:14}}>
                    {lectorMode==="clipboard"?"📋 Leer imagen del portapapeles":"🔍 Analizar con IA"}
                  </button>
                </>
              )}

              {lectorStep==="loading"&&(
                <div style={{textAlign:"center",padding:"32px 20px",color:"#64748b"}}>
                  <div style={{fontSize:36,marginBottom:10}}>⏳</div>
                  <div style={{fontSize:14,fontWeight:700,color:"#10B981"}}>Analizando remisión...</div>
                  <div style={{fontSize:12,color:"#94a3b8",marginTop:4}}>Claude está leyendo los datos</div>
                </div>
              )}

              {lectorStep==="confirm"&&lectorData&&(
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:"#10B981",marginBottom:10}}>Datos extraídos — confirma para crear la OV:</div>
                  <div style={{background:"#243447",borderRadius:8,padding:"14px",marginBottom:14,border:"1px solid #334155"}}>
                    <div style={{display:"grid",gridTemplateColumns:"120px 1fr",gap:"8px 12px",alignItems:"center",fontSize:13}}>
                      <span style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>No. Remisión</span>

                      <span style={{fontWeight:700,color:"#16a34a",fontSize:14}}>{lectorData.pesoNeto||"—"} ton</span>
                      <span style={{fontSize:11,color:"#94a3b8",fontWeight:700,textTransform:"uppercase"}}>Planta</span>
                      <span style={{fontWeight:600}}>{plantaDeSerie((lectorData.numeroRemision||"").split("-")[0])||"—"}</span>

                  </div>
                  <div style={{fontSize:11,color:"#94a3b8",marginBottom:12}}>Se creará la OV. A continuación asignarás el cliente y precio.</div>
                  <div style={{display:"flex",gap:10}}>

      {showCalHabiles&&(

              <div>
                <div style={{fontWeight:800,fontSize:17}}>📂 Importar desde Google Drive</div>
                {gdSelectedFolder&&<div style={{fontSize:12,color:"#64748b",marginTop:2}}>📁 {gdSelectedFolder.name}{gdSelectedFolder.clienteNombre&&<span style={{color:"#10B981"}}> → {gdSelectedFolder.clienteNombre}</span>}</div>}
