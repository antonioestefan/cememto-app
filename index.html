              <textarea value={notaForm.texto} onChange={e=>setNotaForm(f=>({...f,texto:e.target.value}))} style={{...inS,minHeight:80,resize:"vertical"}} placeholder="Escribe el recordatorio..."/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Fecha de vencimiento</label>
                <input type="date" value={notaForm.fecha_vencimiento} onChange={e=>setNotaForm(f=>({...f,fecha_vencimiento:e.target.value}))} style={inS}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Prioridad</label>
                <select value={notaForm.prioridad} onChange={e=>setNotaForm(f=>({...f,prioridad:e.target.value}))} style={inS}>
                  <option value="alta">Alta</option>
                  <option value="media">Media</option>
                  <option value="baja">Baja</option>
                </select>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Cliente (opcional)</label>
              <select value={notaForm.clienteId} onChange={e=>setNotaForm(f=>({...f,clienteId:e.target.value}))} style={inS}>
                <option value="">— Sin cliente —</option>
                {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>No. OV (opcional)</label>
              <input value={notaForm.num_ov} onChange={e=>setNotaForm(f=>({...f,num_ov:e.target.value}))} style={inS} placeholder="OV-XXXXX"/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={saveNota} disabled={!notaForm.texto} style={{flex:1,background:notaForm.texto?"var(--accent)":"var(--border)",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:notaForm.texto?"pointer":"default",fontSize:14}}>Guardar</button>
              <button onClick={()=>setShowNotaForm(false)} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      {/* PROSP FORM */}
      {showProspForm&&(
        <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,padding:"22px 20px",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>{prospForm.id?"Editar prospecto":"Nuevo prospecto"}</div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Empresa / nombre *</label>
              <input value={prospForm.nombre} onChange={e=>setProspForm(f=>({...f,nombre:e.target.value}))} style={inS} placeholder="Nombre del prospecto"/>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Contacto</label>
                <input value={prospForm.contacto} onChange={e=>setProspForm(f=>({...f,contacto:e.target.value}))} style={inS} placeholder="Nombre de contacto"/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Teléfono</label>
                <input value={prospForm.telefono} onChange={e=>setProspForm(f=>({...f,telefono:e.target.value}))} style={inS} placeholder="Teléfono"/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Vol. estimado (ton/mes)</label>
                <input type="number" value={prospForm.vol_mensual} onChange={e=>setProspForm(f=>({...f,vol_mensual:parseFloat(e.target.value)||0}))} style={inS} min="0" step="0.5"/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Etapa</label>
                <select value={prospForm.etapa} onChange={e=>setProspForm(f=>({...f,etapa:e.target.value}))} style={inS}>
                  {ETAPAS.map(e=><option key={e.key} value={e.key}>{e.label}</option>)}
                </select>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Fecha próximo seguimiento</label>
              <input type="date" value={prospForm.fecha_seguimiento} onChange={e=>setProspForm(f=>({...f,fecha_seguimiento:e.target.value}))} style={inS}/>
            </div>
            <div style={{marginBottom:18}}>
              <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Notas</label>
              <textarea value={prospForm.notas} onChange={e=>setProspForm(f=>({...f,notas:e.target.value}))} style={{...inS,minHeight:60,resize:"vertical"}} placeholder="Notas sobre el prospecto..."/>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setShowProspForm(false);setProspForm(emptyProsp);}} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-sec)",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14}}>Cancelar</button>
              <button onClick={saveProsp} disabled={!prospForm.nombre.trim()} style={{flex:2,background:prospForm.nombre.trim()?"var(--accent)":"var(--text-sec)",color:"white",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:prospForm.nombre.trim()?"pointer":"default",fontSize:14}}>Guardar</button>
            </div>
          </div>
        </div>
      )}
      {/* FACTURA FORM */}
      {showFacturaForm&&(()=>{
        const facCli=cliById(facturaForm.clienteId);
        const hist=facCli?.historial_anticipos||[];
        const facEstatuses=estatusPagos[facturaForm.clienteId]||[];
        const totalConIVA=parseFloat(facturaForm.monto_total)||0;
        const sinIVA=totalConIVA/1.16;
        const ivaVal=totalConIVA-sinIVA;
        const formOk=facturaForm.clienteId&&facturaForm.folio_fiscal.trim()&&facturaForm.fecha&&totalConIVA>0;
        return(
          <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:"22px 20px",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:16}}>{facturaForm.id?"Editar factura":"Nueva factura"}</div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Cliente *</label>
                <select value={facturaForm.clienteId} onChange={e=>setFacturaForm(f=>({...f,clienteId:e.target.value,pagos_ligados:[]}))} style={{...inS,background:"var(--bg-card)"}}>
                  <option value="">— Selecciona un cliente —</option>
                  {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                </select>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Folio fiscal *</label>
                <input value={facturaForm.folio_fiscal} onChange={e=>setFacturaForm(f=>({...f,folio_fiscal:e.target.value}))} style={inS} placeholder="UUID o folio de la factura"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div>
                  <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Fecha *</label>
                  <input type="date" value={facturaForm.fecha} onChange={e=>setFacturaForm(f=>({...f,fecha:e.target.value}))} style={inS}/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Tipo</label>
                  <select value={facturaForm.tipo} onChange={e=>setFacturaForm(f=>({...f,tipo:e.target.value}))} style={{...inS,background:"var(--bg-card)"}}>
                    <option value="Normal">Normal</option>
                    <option value="Complemento">Complemento</option>
                  </select>
                </div>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Estatus</label>
                <select value={facturaForm.estatus} onChange={e=>setFacturaForm(f=>({...f,estatus:e.target.value}))} style={{...inS,background:"var(--bg-card)"}}>
                  <option value="Emitida">Emitida</option>
                  <option value="Pagada">Pagada</option>
                  <option value="Cancelada">Cancelada</option>
                </select>
              </div>
              <div style={{marginBottom:12}}>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Monto total con IVA ($) *</label>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={facturaForm.monto_total} onChange={e=>{setMontoEditadoManualmente(true);setFacturaForm(f=>({...f,monto_total:e.target.value}));}} style={{...inS,flex:1}} min="0" step="0.01" placeholder="0.00"/>
                  {facturaForm.pagos_ligados.length>0&&(
                    <button onClick={()=>{setMontoEditadoManualmente(false);const suma=sumaLigados(hist,facturaForm.pagos_ligados);setFacturaForm(f=>({...f,monto_total:String(suma)}));}} title="Recalcular desde anticipos" style={{background:"none",border:"1px solid var(--border)",borderRadius:6,padding:"5px 9px",cursor:"pointer",fontSize:15,color:"var(--text-tertiary)",flexShrink:0,lineHeight:1}}>↺</button>
                  )}
                </div>
                {totalConIVA>0&&<div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:4,display:"flex",gap:14}}>
                  <span>Sin IVA: <b>{fmt(sinIVA)}</b></span><span>IVA 16%: <b>{fmt(ivaVal)}</b></span>
                </div>}
              </div>
              {facturaForm.clienteId&&hist.length>0&&(
                <div style={{marginBottom:12}}>
                  <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:6}}>Pagos ligados (opcional)</label>
                  <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                    {hist.map((a,idx)=>{
                      const key=anticipoKey(a,idx);
                      const ligado=facturaForm.pagos_ligados.includes(key);
                      return (
                      <label key={key} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:ligado?"var(--accent-soft)":"var(--bg-card)",borderTop:idx>0?"1px solid var(--border-soft)":"none",cursor:"pointer"}}>
                        <input type="checkbox" checked={ligado} onChange={e=>{const newLigados=e.target.checked?[...facturaForm.pagos_ligados,key]:facturaForm.pagos_ligados.filter(l=>l!==key);const suma=sumaLigados(hist,newLigados);setFacturaForm(f=>({...f,pagos_ligados:newLigados,...(!montoEditadoManualmente&&{monto_total:String(suma)})}));}}/>
                        <span style={{flex:"0 0 86px",fontSize:12,color:"var(--text-tertiary)"}}>{a.fecha}</span>
                        <span style={{flex:1,fontSize:12,fontWeight:600}}>{fmt(a.monto)}</span>
                        {(()=>{const ep=facEstatuses[idx]||{estatus:"pendiente"};return<span style={{fontSize:10,fontWeight:700,color:ep.estatus==="facturado"?"#15803d":ep.estatus==="parcial"?"#b45309":"#c2410c",background:ep.estatus==="facturado"?"#dcfce7":ep.estatus==="parcial"?"#fefce8":"#fff7ed",borderRadius:4,padding:"2px 5px",whiteSpace:"nowrap"}}>{ep.estatus==="facturado"?"✅ Facturado":ep.estatus==="parcial"?"🟡 Parcial":"🟠 Pendiente"}</span>;})()}
                      </label>
                      );
                    })}
                  </div>
                </div>
              )}
              <div style={{marginBottom:16}}>
                <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Notas (opcional)</label>
                <textarea value={facturaForm.notas} onChange={e=>setFacturaForm(f=>({...f,notas:e.target.value}))} style={{...inS,minHeight:56,resize:"vertical"}} placeholder="Observaciones..."/>
              </div>
              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>{setShowFacturaForm(false);setFacturaForm(emptyFactura);setMontoEditadoManualmente(false);}} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
                <button onClick={saveFactura} disabled={!formOk} style={{flex:2,background:formOk?"var(--accent)":"var(--border)",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:formOk?"pointer":"default",fontSize:14}}>Guardar factura</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* VER FACTURAS CLIENTE */}
      {verFacturasClienteId&&(()=>{
        const cli=cliById(verFacturasClienteId)||{};
        const facsCli=facturas.filter(f=>f.clienteId===verFacturasClienteId);
        const totalEmitido=facsCli.filter(f=>f.estatus!=="Cancelada").reduce((s,f)=>s+(parseFloat(f.total_con_iva)||0),0);
        return(
          <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:"22px 20px",maxHeight:"88vh",overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>📋 Facturas</div>
              <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:4}}>{cli.nombre}{cli.rfc?` · RFC: ${cli.rfc}`:""}</div>
              {totalEmitido>0&&<div style={{fontSize:12,color:"var(--accent)",fontWeight:700,marginBottom:14}}>Total emitido: {fmt(totalEmitido)}</div>}
              {facsCli.length===0
                ?<EmptyState icon="🧾" msg="Sin facturas para este cliente."/>
                :<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
                  {facsCli.map(f=>(
                    <div key={f.id} style={{background:"var(--bg-card-alt)",borderRadius:8,padding:"12px 14px",borderLeft:`3px solid ${f.estatus==="Cancelada"?"#ef4444":"var(--accent)"}`}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:13}}>{f.folio_fiscal||"(sin folio)"}</div>
                          <div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:2}}>{f.fecha} · <span style={{color:f.tipo==="Complemento"?"#7c3aed":"#1e40af"}}>{f.tipo}</span></div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontWeight:800,fontSize:14,color:f.estatus==="Cancelada"?"var(--text-sec)":"var(--accent)"}}>{fmt(f.total_con_iva)}</div>
                          <div style={{fontSize:10,fontWeight:700,color:f.estatus==="Cancelada"?"#dc2626":"#16a34a"}}>{f.estatus}</div>
                        </div>
                      </div>
                      {f.notas&&<div style={{fontSize:11,color:"var(--text-tertiary)",marginTop:5,borderTop:"1px solid var(--border)",paddingTop:5}}>{f.notas}</div>}
                    </div>
                  ))}
                </div>
              }
              <button onClick={()=>setVerFacturasClienteId(null)} style={{width:"100%",background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cerrar</button>
            </div>
          </div>
        );
      })()}


      {/* COMPROBANTE MODAL */}
      {compForm&&(()=>{
        const cli=clientes.find(x=>x.id===compForm.clienteId)||{};
        const historial=cli.historial_anticipos||[];
        const cliEstatuses=estatusPagos[cli.id]||[];
        const todosAnticipos=historial
          .map((a,idx)=>({...a,realIdx:idx,_epago:cliEstatuses[idx]||{estatus:"pendiente"}}))
          .reverse();
        const seleccionables=todosAnticipos.filter(a=>a._epago.estatus!=="facturado");
        const selIndices=Object.entries(compForm.selected).filter(([,v])=>v).map(([k])=>parseInt(k));
        const total=selIndices.reduce((s,idx)=>s+(parseFloat(historial[idx]?.monto)||0),0);
        const subtotal=total/1.16;
        const iva=total-subtotal;
        const tons=parseFloat(compForm.toneladas)||0;
        const precioTon=parseFloat(compForm.precioTon)||0;
        const formOk=selIndices.length>0;
        const pagosSel=selIndices.map(idx=>historial[idx]).filter(Boolean).sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""));
        const todosSeleccionados=seleccionables.length>0&&seleccionables.every(a=>compForm.selected[a.realIdx]);
        const recalcTons=(ns)=>{
          const idxs=Object.entries(ns).filter(([,v])=>v).map(([k])=>parseInt(k));
          const tot=idxs.reduce((acc,i)=>acc+(parseFloat(historial[i]?.monto)||0),0);
          const sub=tot/1.16;
          const prec=parseFloat(compForm.precioTon)||0;
          return prec>0&&tot>0?(tot/prec).toFixed(5):"";
        };
        return(
          <div style={{position:"fixed",inset:0,background:"#00000070",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:520,padding:"22px 20px",maxHeight:"94vh",overflowY:"auto"}}>
              <div style={{fontWeight:800,fontSize:17,marginBottom:2}}>🧾 Generar comprobante</div>
              <div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:14}}>{cli.nombre}{cli.rfc?` · RFC: ${cli.rfc}`:""}</div>

              {/* LISTA DE ANTICIPOS */}
              <div style={{marginBottom:12}}>
                <div style={{fontSize:11,fontWeight:700,color:"var(--text-sec)",textTransform:"uppercase",letterSpacing:.6,marginBottom:8}}>Anticipos a incluir</div>
                {todosAnticipos.length===0
                  ?<div style={{fontSize:12,color:"var(--text-sec)",padding:"12px 0",textAlign:"center"}}>Sin anticipos registrados.</div>
                  :<>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <button onClick={()=>{
                        if(todosSeleccionados){setCompForm(f=>({...f,selected:{},toneladas:""}));}
                        else{const s={};seleccionables.forEach(a=>{s[a.realIdx]=true;});setCompForm(f=>({...f,selected:s,toneladas:recalcTons(s)}));}
                      }} style={{background:"none",border:"none",color:"var(--accent)",fontSize:11,cursor:"pointer",padding:0,fontWeight:600}}>
                        {todosSeleccionados?"Deseleccionar todos":"Seleccionar todos"}
                      </button>
                      {selIndices.length>0&&<span style={{fontSize:11,color:"var(--text-tertiary)"}}>{selIndices.length} seleccionado{selIndices.length>1?"s":""}</span>}
                    </div>
                    <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden"}}>
                      {todosAnticipos.map((a,i)=>{
                        const yaFacturado=a._epago.estatus==="facturado";
                        const sub=parseFloat(a.monto)/1.16;
                        const iv=parseFloat(a.monto)-sub;
                        return(
                          <div key={a.realIdx} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"10px 12px",background:yaFacturado?"#162a20":compForm.selected[a.realIdx]?"#162032":"var(--bg-card)",borderTop:i>0?"1px solid var(--border)":"none",opacity:yaFacturado?0.6:1}}>
                            {yaFacturado
                              ?<span style={{marginTop:3,flexShrink:0,fontSize:15}}>✅</span>
                              :<input type="checkbox" checked={!!compForm.selected[a.realIdx]} onChange={e=>{const ns={...compForm.selected,[a.realIdx]:e.target.checked};setCompForm(f=>({...f,selected:ns,toneladas:recalcTons(ns)}));}} style={{marginTop:3,flexShrink:0}}/>
                            }
                            <div style={{flex:1}}>
                              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                                <span style={{fontSize:12,color:"var(--text-sec)"}}>{a.fecha}</span>
                                <span style={{fontWeight:700,fontSize:13,color:yaFacturado?"#16a34a":"var(--text-main)"}}>{fmt(parseFloat(a.monto)||0)}</span>
                              </div>
                              <div style={{display:"flex",gap:12,marginTop:3,fontSize:10,color:"var(--text-tertiary)"}}>
                                <span>Subtotal: {fmt(sub)}</span>
                                <span>IVA: {fmt(iv)}</span>
                              </div>
                            </div>
                            <span style={{fontSize:10,fontWeight:700,color:yaFacturado?"#15803d":a._epago.estatus==="parcial"?"#b45309":"#c2410c",background:yaFacturado?"#dcfce7":a._epago.estatus==="parcial"?"#fefce8":"#fff7ed",borderRadius:4,padding:"2px 6px",whiteSpace:"nowrap",marginTop:2}}>{yaFacturado?"Ya facturado":a._epago.estatus==="parcial"?"🟡 Parcial":"🟠 Pendiente"}</span>
                          </div>
                        );
                      })}
                    </div>
                  </>
                }
              </div>

              {/* RESUMEN EN TIEMPO REAL */}
              {formOk&&(
                <div style={{background:"var(--bg-card-alt)",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12}}>
                  <div style={{fontWeight:700,color:"var(--text-sec)",fontSize:10,textTransform:"uppercase",letterSpacing:.6,marginBottom:6}}>{selIndices.length} anticipo{selIndices.length>1?"s":""} seleccionado{selIndices.length>1?"s":""}</div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"var(--text-tertiary)"}}>Subtotal</span><span style={{fontWeight:600}}>{fmt(subtotal)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{color:"var(--text-tertiary)"}}>IVA 16%</span><span style={{fontWeight:600}}>{fmt(iva)}</span></div>
                  <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid var(--border)",paddingTop:6,marginTop:4}}><span style={{fontWeight:700,color:"var(--accent)"}}>Total</span><span style={{fontWeight:800,color:"var(--accent)",fontSize:14}}>{fmt(total)}</span></div>
                </div>
              )}

              {/* TONELADAS Y PRECIO */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div>
                  <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Toneladas <span style={{color:"var(--text-sec)"}}>(auto)</span></label>
                  <input type="number" value={compForm.toneladas} onChange={e=>setCompForm(f=>({...f,toneladas:e.target.value}))} style={inS} min="0" step="0.00001" placeholder="0.00000"/>
                </div>
                <div>
                  <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Precio / ton</label>
                  <input type="number" value={compForm.precioTon} onChange={e=>{const prec=parseFloat(e.target.value)||0;const autoTons=prec>0&&total>0?(total/prec).toFixed(5):"";setCompForm(f=>({...f,precioTon:e.target.value,toneladas:autoTons}));}} style={inS} min="0" step="1" placeholder="0"/>
                </div>
              </div>

              {/* PREVIEW COMPROBANTE */}
              {formOk&&(
                <div ref={compRef} style={{background:"white",border:"2px solid #10B981",borderRadius:12,overflow:"hidden",marginBottom:16,fontFamily:"'Segoe UI',Arial,sans-serif"}}>
                  <div style={{background:"#10B981",padding:"16px 20px"}}>
                    <div style={{color:"white",fontWeight:800,fontSize:15,letterSpacing:.3}}>Distribuidora Cruz Azul</div>
                    <div style={{color:"rgba(255,255,255,0.8)",fontSize:12,marginTop:2}}>Antonio Estefan</div>
                  </div>
                  <div style={{padding:"14px 20px 10px",borderBottom:"1px solid #e2e8f0"}}>
                    <div style={{fontSize:10,color:"#94a3b8",fontWeight:700,textTransform:"uppercase",letterSpacing:.8,marginBottom:2}}>Cliente</div>
                    <div style={{fontWeight:800,fontSize:19,color:"#10B981"}}>{cli.nombre_fiscal||cli.nombre}</div>
                    {cli.rfc&&<div style={{fontSize:11,color:"#64748b",marginTop:2}}>RFC: {cli.rfc}</div>}
                    <div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>{todayISO()}</div>
                  </div>
                  <div style={{padding:"10px 20px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"1fr auto",background:"#f1f5f9",padding:"6px 10px",borderRadius:"6px 6px 0 0",fontSize:10,fontWeight:700,color:"#64748b",gap:16,marginBottom:2}}>
                      <div>Fecha</div><div style={{textAlign:"right",minWidth:110}}>Monto</div>
                    </div>
                    {pagosSel.map((a,i)=>(
                      <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto",padding:"6px 10px",fontSize:12,borderTop:"1px solid #e2e8f0",gap:16,background:i%2?"#f8fafc":"white"}}>
                        <div style={{color:"#475569"}}>{a.fecha}</div>
                        <div style={{textAlign:"right",fontWeight:600,minWidth:110,color:"#1e293b"}}>{fmt(parseFloat(a.monto)||0)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:"4px 20px 14px"}}>
                    {tons>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e2e8f0",fontSize:12}}><span style={{color:"#64748b"}}>Toneladas</span><span style={{fontWeight:600,color:"#1e293b"}}>{tons.toFixed(5)} ton</span></div>}
                    {precioTon>0&&<div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e2e8f0",fontSize:12}}><span style={{color:"#64748b"}}>Precio / ton</span><span style={{fontWeight:600,color:"#1e293b"}}>{fmt(precioTon)}</span></div>}
                    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e2e8f0",fontSize:12}}><span style={{color:"#64748b"}}>Subtotal</span><span style={{fontWeight:600,color:"#1e293b"}}>{fmt(subtotal)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e2e8f0",fontSize:12}}><span style={{color:"#64748b"}}>IVA 16%</span><span style={{fontWeight:600,color:"#1e293b"}}>{fmt(iva)}</span></div>
                    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0 4px",borderTop:"2px solid #10B981",marginTop:4,fontSize:15}}>
                      <span style={{fontWeight:700,color:"#10B981"}}>Total</span>
                      <span style={{fontWeight:900,color:"#10B981",fontSize:17}}>{fmt(total)}</span>
                    </div>
                  </div>
                  <div style={{background:"#f1f5f9",padding:"8px 20px",borderTop:"1px solid #e2e8f0"}}>
                    <div style={{fontSize:10,color:"#94a3b8",textAlign:"center"}}>Documento informativo — Distribuidora Cruz Azul</div>
                  </div>
                </div>
              )}

              <div style={{display:"flex",gap:10}}>
                <button onClick={()=>setCompForm(null)} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:"pointer",fontSize:14}}>Cancelar</button>
                <button onClick={generarComprobante} disabled={!formOk} style={{flex:2,background:formOk?"var(--accent)":"var(--border)",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:formOk?"pointer":"default",fontSize:14}}>⬇ Generar imagen</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* LECTOR DE REMISIONES */}
      {showLector&&lectorOV&&(
        <LectorRemision
          inS={inS}
          titulo="📄 Lector de Remisiones"
          subtitulo={<>OV: <strong>{lectorOV.num_ov}</strong>{lectorOV.serie?` · Serie: ${lectorOV.serie}`:""}</>}
          encabezadoConfirm="Datos extraídos — confirma antes de guardar:"
          mostrarPlanta={false}
          notaConfirm="Se actualizará en la OV: folio de remisión, fecha de carga y toneladas pesadas"
          confirmLabel="✓ Confirmar y guardar"
          successView={true}
          onConfirm={async(d)=>await upd(lectorOV.id,{folio:d.numeroRemision,fecha_carga:d.fecha,toneladas:parseFloat(d.pesoNeto)})}
          onEdit={(d)=>{
            const folio=limpiarFolio(d.numeroRemision);
            const serie=(folio||"").split("-")[0].toUpperCase();
            setForm({...lectorOV,num_ov:d.numeroOV||lectorOV.num_ov,folio,toneladas:parseFloat(d.pesoNeto)||0,fecha_carga:d.fecha||lectorOV.fecha_carga,serie:serie||lectorOV.serie,status:"entregado"});
            setShowLector(false);setLectorOV(null);setShowForm(true);
          }}
          onClose={()=>{setShowLector(false);setLectorOV(null);}}
        />
      )}

      {/* LECTOR NUEVA OV — sin OV previa */}
      {showLectorNuevo&&(
        <LectorRemision
          inS={inS}
          titulo="📄 Nueva OV desde Remisión"
          subtitulo="La IA extraerá los datos. Podrás asignar el cliente y precio en el formulario siguiente."
          encabezadoConfirm="Datos extraídos — confirma para crear la OV:"
          mostrarPlanta={true}
          notaConfirm="Se creará la OV. A continuación asignarás el cliente y precio."
          confirmLabel="✓ Crear OV y completar datos"
          successView={false}
          onConfirm={async(d)=>{
            const {numeroRemision,numeroOV,fecha,pesoNeto}=d;
            const serie=(numeroRemision||"").split("-")[0].toUpperCase();
            const numOvTrim=(numeroOV||"").trim();
            // Si ya existe una OV con ese número, actualizarla con los datos de la remisión en lugar de duplicar.
            const existe=numOvTrim&&ovs.find(o=>(o.num_ov||"").trim()===numOvTrim);
            if(existe){
              const patch={folio:numeroRemision||existe.folio,fecha_carga:fecha||existe.fecha_carga,toneladas:parseFloat(pesoNeto)||existe.toneladas,serie:serie||existe.serie};
              const ok=await upd(existe.id,patch);
              if(!ok) return false;
              setShowLectorNuevo(false);
              const precioActual=parseFloat(existe.precio_ton)||parseFloat(cliById(existe.clienteId)?.precio_ton)||0;
              setForm({...existe,...patch,precio_ton:precioActual});
              setShowForm(true);
              return true;
            }
            const id=`OV-${Date.now()}`;
            const nuevaOV={...emptyOV,id,num_ov:numeroOV||"",folio:numeroRemision||"",fecha_carga:fecha||todayISO(),toneladas:parseFloat(pesoNeto)||0,serie};
            const prevOVs=ovs;
            setOVs(prev=>[nuevaOV,...prev]);
            const ok=await runSave(()=>saveToDb("ovs",id,nuevaOV), ()=>setOVs(prevOVs));
            if(!ok) return false;
            setShowLectorNuevo(false);
            setForm({...nuevaOV,precio_ton:""});
            setShowForm(true);
            return true;
          }}
          onEdit={(d)=>{
            const folio=limpiarFolio(d.numeroRemision);
            const serie=(folio||"").split("-")[0].toUpperCase();
            const clienteId="";
            setForm({...emptyOV,num_ov:d.numeroOV||"",folio,toneladas:parseFloat(d.pesoNeto)||0,fecha_carga:d.fecha||todayISO(),serie,clienteId,precio_ton:"",status:"entregado"});
            setShowLectorNuevo(false);setShowForm(true);
          }}
          onClose={()=>{setShowLectorNuevo(false);}}
        />
      )}

      {/* LECTOR CHART CORPORATIVO */}
      {showChartLector&&(()=>{
        const PROMPT_CHART = "Lee esta tabla de órdenes de venta de Cruz Azul y extrae TODAS las filas en formato JSON. Cada fila tiene: num_ov, fecha_retiro (YYYY-MM-DD), fecha_entrega (YYYY-MM-DD), hora_entrega (HH:MM). Responde SOLO con el array JSON, sin texto adicional.";

        const toBase64 = (file) => new Promise((resolve,reject)=>{
          const r=new FileReader();
          r.onload=e=>resolve(e.target.result.split(',')[1]);
          r.onerror=reject;
          r.readAsDataURL(file);
        });

        const cerrarChartLector = () => {
          setShowChartLector(false); setChartStep("idle"); setChartPlanta(""); setChartFile(null); setChartPreviewUrl(null); setChartRows([]); setChartError(""); setChartResumen(null);
        };

        const leerChart = async () => {
          if(!chartPlanta){setChartError("Selecciona la planta de retiro");return;}
          if(!chartFile){setChartError("Selecciona una imagen del chart");return;}
          setChartStep("loading"); setChartError("");
          try{
            const b64=await toBase64(chartFile);
            const block={type:"image",source:{type:"base64",media_type:chartFile.type||"image/jpeg",data:b64}};
            const resp=await fetch('/.netlify/functions/claude-proxy',{
              method:'POST',
              headers:{'content-type':'application/json'},
              body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4096,messages:[{role:'user',content:[block,{type:'text',text:PROMPT_CHART}]}]})
            });
            if(!resp.ok){const err=await resp.json();throw new Error(err.error?.message||err.error||`Error ${resp.status}`);}
            const data=await resp.json();
            const raw=data.content[0].text;
            const cleaned=raw.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
            let parsed=JSON.parse(cleaned);
            if(!Array.isArray(parsed)) parsed=parsed.ovs||parsed.data||parsed.rows||[];
            if(!parsed.length){setChartError("No se detectaron filas en la imagen");setChartStep("idle");return;}
            setChartRows(parsed.map(r=>({
              num_ov:r.num_ov||"",
              fecha_retiro:r.fecha_retiro||"",
              fecha_entrega:r.fecha_entrega||"",
              hora_entrega:r.hora_entrega||"",
              clienteId:""
            })));
            setChartStep("confirm");
          }catch(e){
            setChartError(e.message||"Error al procesar la imagen");
            setChartStep("error");
          }
        };

        const setChartRowCliente = (idx,clienteId) => {
          setChartRows(rows=>rows.map((r,i)=>i===idx?{...r,clienteId}:r));
        };

        const chartCanCreate = chartRows.length>0;
        const chartSinClienteCount = chartRows.filter(r=>!r.clienteId).length;

        const crearTodasOVs = async () => {
          setChartStep("creating");
          let creadas=0;
          let actualizadas=0;
          let sinCliente=0;
          const nuevas=[];
          for(let i=0;i<chartRows.length;i++){
            const r=chartRows[i];
            const numOv=(r.num_ov||"").trim();
            const existente=numOv&&ovs.find(o=>(o.num_ov||"").trim()===numOv);

            if(existente){
              const patch={fecha_carga:r.fecha_retiro,fecha_entrega:r.fecha_entrega,serie:chartPlanta};
              if(!existente.clienteId&&r.clienteId) patch.clienteId=r.clienteId;
              if(!(parseFloat(existente.precio_ton)>0)){
                const cliExistente=cliById(existente.clienteId||r.clienteId);
                if(cliExistente?.precio_ton) patch.precio_ton=cliExistente.precio_ton;
              }
              try{
                if(await upd(existente.id,patch)) actualizadas++;
              }catch(e){ /* continúa con las demás */ }
              continue;
            }

            const cli=cliById(r.clienteId);
            const id=`OV-${Date.now()}-${i}`;
            const nuevaOV={
              ...emptyOV,
              id,
              num_ov:r.num_ov,
              fecha_carga:r.fecha_retiro,
              fecha_entrega:r.fecha_entrega,
              hora_entrega:r.hora_entrega,
              clienteId:r.clienteId||"",
              serie:chartPlanta,
              status:"ov_asignada",
              confirm:"por_confirmar",
              tipo:"granel",
              precio_ton:cli?.precio_ton||0,
            };
            if(!r.clienteId) sinCliente++;
            try{
              await saveToDb("ovs",id,nuevaOV);
              nuevas.push(nuevaOV);
              creadas++;
            }catch(e){ /* continúa con las demás */ }
          }
          if(nuevas.length) setOVs(prev=>[...nuevas,...prev]);
          setChartResumen({creadas,actualizadas,total:chartRows.length,sinCliente});
          setChartStep("success");
        };

        return (
          <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
            <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:700,padding:"22px 20px",maxHeight:"90vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontWeight:800,fontSize:17}}>📊 Leer chart corporativo</div>
                <button onClick={cerrarChartLector} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-sec)"}}>✕</button>
              </div>

              {chartStep==="success"&&chartResumen?(
                <div style={{textAlign:"center",padding:"30px 20px"}}>
                  <div style={{fontSize:42,marginBottom:10}}>✅</div>
                  <div style={{fontWeight:700,fontSize:15,color:"#16a34a",marginBottom:6}}>{chartResumen.creadas} OV{chartResumen.creadas!==1?"s":""} creada{chartResumen.creadas!==1?"s":""}, {chartResumen.actualizadas} actualizada{chartResumen.actualizadas!==1?"s":""}</div>
                  {chartResumen.sinCliente>0&&<div style={{fontSize:12,color:"var(--text-tertiary)",marginBottom:6}}>{chartResumen.sinCliente} de las creadas sin cliente asignado</div>}
                  {(chartResumen.creadas+chartResumen.actualizadas)<chartResumen.total&&<div style={{fontSize:12,color:"#d97706",marginBottom:6}}>{chartResumen.total-chartResumen.creadas-chartResumen.actualizadas} fila{(chartResumen.total-chartResumen.creadas-chartResumen.actualizadas)!==1?"s":""} no se pudieron procesar</div>}
                  <div style={{fontSize:13,color:"var(--text-tertiary)",marginBottom:20}}>Serie {chartPlanta} ({PLANTAS[chartPlanta]}) · Estatus: OV asignada</div>
                  <button onClick={cerrarChartLector} style={{background:"var(--accent)",color:"white",border:"none",borderRadius:8,padding:"10px 28px",fontWeight:700,cursor:"pointer",fontSize:14}}>Cerrar</button>
                </div>
              ):(
                <>
                  {(chartStep==="idle"||chartStep==="error")&&(
                    <>
                      <div style={{background:"var(--bg-card-alt)",borderRadius:8,padding:"8px 12px",fontSize:12,color:"var(--text-sec)",marginBottom:14}}>
                        Sube una foto o captura del chart de corporativo. La IA extraerá num_ov, fecha de retiro, fecha de entrega y hora de entrega de todas las filas.
                      </div>
                      <div style={{marginBottom:14}}>
                        <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:4}}>Planta de retiro</label>
                        <select value={chartPlanta} onChange={e=>setChartPlanta(e.target.value)} style={inS}>
                          <option value="">— Selecciona una planta —</option>
                          <option value="PU">PU — Puebla</option>
                          <option value="AG">AG — Aguascalientes</option>
                        </select>
                      </div>
                      <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
                        <div style={{flex:"1 1 200px"}}>
                          <label style={{fontSize:11,color:"var(--text-tertiary)",display:"block",marginBottom:4}}>Imagen JPG o PNG del chart</label>
                          <input type="file" accept="image/*" onChange={e=>procesarArchivoChart(e.target.files[0]||null)} style={{...inS,padding:"6px 8px"}}/>
                          {chartFile&&!chartPreviewUrl&&<div style={{fontSize:11,color:"#0891b2",marginTop:4}}>✓ {chartFile.name}</div>}
                        </div>
                        <div
                          key={chartPreviewUrl?"has-preview":"no-preview"}
                          contentEditable
                          suppressContentEditableWarning
                          onKeyDown={e=>e.preventDefault()}
                          tabIndex={0}
                          title="Toca y mantén presionado para pegar en móvil, o usa Ctrl+V / Cmd+V en escritorio"
                          style={{flex:"1 1 200px",border:`2px dashed ${chartPreviewUrl?"#16a34a":"var(--border)"}`,borderRadius:8,padding:10,textAlign:"center",cursor:"text",background:chartPreviewUrl?"#16a34a11":"var(--bg-card-alt)",outline:"none",minHeight:56,display:"flex",alignItems:"center",justifyContent:"center"}}
                        >
                          {chartPreviewUrl?(
                            <div>
                              <img src={chartPreviewUrl} alt="Vista previa del chart pegado" style={{maxWidth:"100%",maxHeight:90,borderRadius:6,display:"block",margin:"0 auto 4px",pointerEvents:"none"}}/>
                              <div style={{fontSize:10,color:"#16a34a",fontWeight:700}}>✓ Imagen pegada{chartFile&&chartFile.name?`: ${chartFile.name}`:""}</div>
                            </div>
                          ):(
                            <div style={{fontSize:12,color:"var(--text-sec)",pointerEvents:"none"}}>📋 Pega la imagen aquí (Ctrl+V / Cmd+V)</div>
                          )}
                        </div>
                      </div>
                      {chartError&&<div style={{background:"#ef444422",color:"#dc2626",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:12,border:"1px solid #fecaca"}}>{chartError}</div>}
                      <button onClick={leerChart} disabled={!chartFile||!chartPlanta} style={{width:"100%",background:(chartFile&&chartPlanta)?"var(--accent)":"var(--border)",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:(chartFile&&chartPlanta)?"pointer":"default",fontSize:14}}>🔍 Analizar con IA</button>
                    </>
                  )}

                  {chartStep==="loading"&&(
                    <div style={{textAlign:"center",padding:"32px 20px",color:"var(--text-tertiary)"}}>
                      <div style={{fontSize:36,marginBottom:10}}>⏳</div>
                      <div style={{fontSize:14,fontWeight:700,color:"var(--accent)"}}>Leyendo chart...</div>
                      <div style={{fontSize:12,color:"var(--text-sec)",marginTop:4}}>Claude está extrayendo las OVs de la tabla</div>
                    </div>
                  )}

                  {(chartStep==="confirm"||chartStep==="creating")&&chartRows.length>0&&(
                    <div>
                      <div style={{fontWeight:700,fontSize:13,color:"var(--accent)",marginBottom:6}}>{chartRows.length} OV{chartRows.length>1?"s":""} detectada{chartRows.length>1?"s":""} — asigna cliente a cada una (opcional):</div>
                      <div style={{fontSize:11,color:"var(--text-sec)",marginBottom:10}}>Planta: <strong>{chartPlanta} ({PLANTAS[chartPlanta]})</strong> · Tipo: <strong>Granel</strong> · Estatus: <strong>OV asignada</strong> (automático para todas)</div>
                      <div style={{border:"1px solid var(--border)",borderRadius:8,overflow:"hidden",marginBottom:14}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 0.8fr 1.6fr",background:"var(--bg-card-alt)",padding:"7px 10px",fontSize:10,fontWeight:700,color:"var(--text-sec)",textTransform:"uppercase",gap:6}}>
                          <div>No. OV</div><div>Retiro</div><div>Entrega</div><div>Hora</div><div>Cliente</div>
                        </div>
                        {chartRows.map((r,i)=>(
                          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 0.8fr 1.6fr",padding:"7px 10px",fontSize:12,borderTop:"1px solid var(--border)",gap:6,alignItems:"center",background:i%2?"var(--bg-card-alt)":"transparent"}}>
                            <div style={{fontWeight:700}}>{r.num_ov||"—"}</div>
                            <div>{r.fecha_retiro||"—"}</div>
                            <div>{r.fecha_entrega||"—"}</div>
                            <div>{r.hora_entrega||"—"}</div>
                            <select value={r.clienteId} onChange={e=>setChartRowCliente(i,e.target.value)} disabled={chartStep==="creating"} style={{...inS,padding:"4px 6px",fontSize:11}}>
                              <option value="">— Sin asignar (opcional) —</option>
                              {clientes.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
                            </select>
                          </div>
                        ))}
                      </div>
                      {chartSinClienteCount>0&&<div style={{fontSize:11,color:"#d97706",marginBottom:12}}>{chartSinClienteCount} fila{chartSinClienteCount!==1?"s":""} sin cliente asignado — se creará{chartSinClienteCount!==1?"n":""} sin cliente ni precio.</div>}
                      <div style={{display:"flex",gap:10}}>
                        <button onClick={cerrarChartLector} disabled={chartStep==="creating"} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"11px",fontWeight:600,cursor:chartStep==="creating"?"default":"pointer",fontSize:14}}>Cancelar</button>
                        <button onClick={crearTodasOVs} disabled={!chartCanCreate||chartStep==="creating"} style={{flex:2,background:chartCanCreate?"#16a34a":"var(--border)",color:"white",border:"none",borderRadius:8,padding:"11px",fontWeight:700,cursor:chartCanCreate&&chartStep!=="creating"?"pointer":"default",fontSize:14}}>{chartStep==="creating"?"Creando...":"✓ Crear todas las OVs"}</button>
                      </div>
                    </div>
                  )}
                </>
              )}
            </div>
          </div>
        );
      })()}

      {/* DASHBOARD CLIENTE */}
      {clienteDashboard&&(()=>{
        const cli=clientes.find(c=>c.id===clienteDashboard);
        if(!cli) return null;
        return(
          <DashboardCliente
            cliente={cli}
            ovs={ovs}
            facturas={facturas}
            diasHabiles={diasHabiles}
            estadoCuenta={estadoCuenta}
            valorOV={valorOV}
            onClose={()=>setClienteDashboard(null)}
            tema={tema}
          />
        );
      })()}

      {/* MODAL CALENDARIO DÍAS HÁBILES */}
      {showCalHabiles&&(
        <div style={{position:"fixed",inset:0,background:"#00000060",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowCalHabiles(false);}}>
          <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:500,padding:"22px 20px 30px",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontWeight:800,fontSize:16,color:"var(--text-main)"}}>📅 Días hábiles</div>
                <div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:2}}>Toca cualquier día para marcar/desmarcar. Se guarda automáticamente.</div>
              </div>
              <button onClick={()=>setShowCalHabiles(false)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-sec)",padding:4}}>✕</button>
            </div>
            <div style={{background:"#7c3aed22",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#a78bfa",marginBottom:14}}>
              Base: lunes a sábado · Festivos MX excluidos automáticamente (1 ene, 5 feb, 21 mar, 1 may, 16 sep, 20 nov, 25 dic + primer lunes de feb y tercer lunes de mar)
            </div>
            <CalendarioHabiles diasHabiles={diasHabiles} onToggle={toggleDiaHabil}/>
          </div>
        </div>
      )}

      {/* ONEDRIVE IMPORT */}
      {showGDrive&&(
        <div style={{position:"fixed",inset:0,background:"#00000090",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:600,padding:"22px 20px",maxHeight:"92vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontWeight:800,fontSize:17}}>📂 Importar desde Google Drive</div>
                {gdSelectedFolder&&<div style={{fontSize:12,color:"var(--text-tertiary)",marginTop:2}}>📁 {gdSelectedFolder.name}{gdSelectedFolder.clienteNombre&&<span style={{color:"var(--accent)"}}> → {gdSelectedFolder.clienteNombre}</span>}</div>}
              </div>
              <button onClick={gdCerrar} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"var(--text-sec)"}}>✕</button>
            </div>

            {gdError&&<div style={{background:"#ef444422",color:"#dc2626",borderRadius:8,padding:"8px 12px",fontSize:12,marginBottom:12,border:"1px solid #fecaca"}}>{gdError}</div>}

            {gdStep==="auth"&&(!window.__GOOGLE_CLIENT_ID?(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:36,marginBottom:10}}>⚙️</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:12}}>Configuración requerida</div>
                <div style={{fontSize:12,color:"var(--text-sec)",lineHeight:1.8,textAlign:"left",background:"var(--bg-card-alt)",borderRadius:10,padding:"14px 16px"}}>
                  <b>Pasos para conectar Google Drive:</b><br/>
                  1. Ve a <b>console.cloud.google.com</b> → crea/selecciona un proyecto → habilita la <b>Google Drive API</b><br/>
                  2. Ve a Credenciales → Crear credenciales → <b>ID de cliente de OAuth</b> → Tipo: <i>Aplicación web</i><br/>
                  3. En "Orígenes autorizados de JavaScript" agrega <code style={{background:"var(--bg-main)",padding:"1px 6px",borderRadius:4}}>{window.location.origin}</code><br/>
                  4. Copia el <b>Client ID</b> (y opcionalmente crea una API Key restringida a la Drive API)<br/>
                  5. En <code style={{background:"var(--bg-main)",padding:"1px 6px",borderRadius:4}}>index.html</code> busca <code style={{background:"var(--bg-main)",padding:"1px 6px",borderRadius:4}}>window.__GOOGLE_CLIENT_ID = ""</code> y pega el Client ID (y la API Key en <code style={{background:"var(--bg-main)",padding:"1px 6px",borderRadius:4}}>window.__GOOGLE_API_KEY</code>)
                </div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"28px 0"}}>
                <div style={{fontSize:40,marginBottom:12}}>🗂️</div>
                <div style={{fontWeight:700,fontSize:15,marginBottom:6}}>Conectar con Google Drive</div>
                <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:20}}>Inicia sesión con tu cuenta Google</div>
                <button onClick={gdLogin} disabled={gdLoading} style={{background:"#4285F4",color:"white",border:"none",borderRadius:8,padding:"12px 28px",fontWeight:700,cursor:gdLoading?"default":"pointer",fontSize:14}}>
                  {gdLoading?"⏳ Conectando...":"🔑 Iniciar sesión con Google"}
                </button>
              </div>
            ))}

            {gdStep==="folders"&&(
              <div>
                <div style={{fontSize:12,color:"var(--text-sec)",marginBottom:12}}>Selecciona la carpeta del cliente:</div>
                {gdFolders.length===0&&<div style={{color:"var(--text-tertiary)",fontSize:13,textAlign:"center",padding:"24px 0"}}>No se encontraron subcarpetas en "{GD_ROOT_FOLDER_NAME}"</div>}
                {gdFolders.map(f=>{
                  const match=clientes.find(c=>(c.nombre||"").trim().toLowerCase()===f.name.trim().toLowerCase());
                  const pend=gdPendingCounts[f.id];
                  return(
                    <button key={f.id} onClick={()=>gdSelectFolder(f)} disabled={gdLoading} style={{display:"flex",alignItems:"center",gap:10,width:"100%",background:"var(--bg-card-alt)",border:"1px solid var(--border)",borderRadius:8,padding:"12px 14px",cursor:"pointer",marginBottom:8,color:"var(--text-main)",textAlign:"left",opacity:gdLoading?0.6:1}}>
                      <span style={{fontSize:20}}>📁</span>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:14}}>{f.name}</div>
                        <div style={{fontSize:11,marginTop:2,color:match?"var(--accent)":"#d97706"}}>{match?`✓ Cliente: ${match.nombre}`:"⚠ Sin coincidencia en catálogo"}</div>
                      </div>
                      {pend?.loading&&<span style={{fontSize:11,color:"var(--text-tertiary)",flexShrink:0}}>⏳</span>}
                      {!pend?.loading&&pend?.count>0&&<span style={{fontSize:11,fontWeight:700,color:"white",background:"var(--accent)",borderRadius:12,padding:"3px 9px",flexShrink:0}}>{pend.count} nueva{pend.count!==1?"s":""}</span>}
                      {!pend?.loading&&pend?.count===0&&<span style={{fontSize:14,flexShrink:0}}>✅</span>}
                      <span style={{color:"var(--text-tertiary)",fontSize:18}}>›</span>
                    </button>
                  );
                })}
                {gdLoading&&<div style={{textAlign:"center",color:"var(--text-tertiary)",padding:"12px 0",fontSize:13}}>Cargando...</div>}
              </div>
            )}

            {gdStep==="files"&&(()=>{
              const groupsConEstado=gdGroups.map(g=>({g,info:gdProcesadoInfo(g)}));
              const pendientesCount=groupsConEstado.filter(x=>!x.info).length;
              const visibles=gdFiltro==="todas"?groupsConEstado:groupsConEstado.filter(x=>!x.info);
              return (
              <div>
                <button onClick={()=>setGdStep("folders")} style={{background:"none",border:"none",color:"var(--text-tertiary)",fontSize:12,cursor:"pointer",marginBottom:12,padding:0}}>← Carpetas</button>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:12,color:"var(--text-sec)"}}>
                    {gdGroups.length} remisión{gdGroups.length!==1?"es":""} · <span style={{color:"#f59e0b"}}>{pendientesCount} pendiente{pendientesCount!==1?"s":""}</span>
                  </div>
                  {pendientesCount>0&&<button onClick={gdSelectAll} style={{background:"none",border:"1px solid var(--border)",color:"var(--text-sec)",fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer"}}>Sel. todos pendientes</button>}
                </div>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  <button onClick={()=>setGdFiltro("pendientes")} style={{flex:1,background:gdFiltro==="pendientes"?"var(--accent)":"var(--bg-card-alt)",color:gdFiltro==="pendientes"?"white":"var(--text-sec)",border:`1px solid ${gdFiltro==="pendientes"?"var(--accent)":"var(--border)"}`,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>🆕 Solo nuevas</button>
                  <button onClick={()=>setGdFiltro("todas")} style={{flex:1,background:gdFiltro==="todas"?"var(--accent)":"var(--bg-card-alt)",color:gdFiltro==="todas"?"white":"var(--text-sec)",border:`1px solid ${gdFiltro==="todas"?"var(--accent)":"var(--border)"}`,borderRadius:6,padding:"6px 10px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Todas</button>
                </div>
                {gdDupFiles.length>0&&(
                  <div style={{background:"#ef444415",border:"1px solid #fecaca",borderRadius:8,padding:"10px 12px",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:700,color:"#dc2626"}}>⚠ {gdDupFiles.length} archivo{gdDupFiles.length!==1?"s":""} duplicado{gdDupFiles.length!==1?"s":""} detectado{gdDupFiles.length!==1?"s":""}</div>
                        <div style={{fontSize:10,color:"var(--text-sec)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{gdDupFiles.map(f=>f.name).join(", ")}</div>
                      </div>
                      <button onClick={gdLimpiarDuplicados} disabled={gdCleaningDups}
                        style={{background:"#dc2626",color:"white",border:"none",borderRadius:6,padding:"6px 11px",fontWeight:700,cursor:gdCleaningDups?"default":"pointer",fontSize:12,flexShrink:0,opacity:gdCleaningDups?0.7:1}}>
                        {gdCleaningDups?"⏳ Limpiando...":"🗑 Limpiar duplicados"}
                      </button>
                    </div>
                  </div>
                )}
                {gdGroups.length===0&&<div style={{color:"var(--text-tertiary)",fontSize:13,textAlign:"center",padding:"24px 0"}}>No hay archivos JPG/PNG/PDF en la carpeta Remisiones</div>}
                {gdGroups.length>0&&visibles.length===0&&(
                  <div style={{color:"var(--accent)",fontSize:13,textAlign:"center",padding:"24px 0"}}>✅ Todo al día — no hay remisiones nuevas para este cliente</div>
                )}
                {visibles.map(({g,info})=>{
                  const done=!!info;
                  const sel=gdSelected.has(g.key);
                  const paginas=g.page2?2:1;
                  const size=(parseInt(g.page1?.size)||0)+(parseInt(g.page2?.size)||0);
                  return(
                    <div key={g.key} onClick={()=>!done&&gdToggle(g.key)} style={{display:"flex",alignItems:"center",gap:10,background:sel?"#10B98118":"var(--bg-card-alt)",border:`1px solid ${sel?"var(--accent)":"var(--border)"}`,borderRadius:8,padding:"10px 12px",marginBottom:6,cursor:done?"default":"pointer"}}>
                      <div style={{fontSize:16,flexShrink:0}}>{done?"✅":"🆕"}</div>
                      {!done&&<div style={{width:18,height:18,borderRadius:4,border:`2px solid ${sel?"var(--accent)":"var(--text-muted)"}`,background:sel?"var(--accent)":"transparent",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:11}}>{sel?"✓":""}</div>}
                      <div style={{flex:1,overflow:"hidden"}}>
                        <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{g.folioBase} <span style={{color:"var(--text-tertiary)",fontWeight:400}}>({paginas} página{paginas!==1?"s":""})</span></div>
                        {done?<div style={{fontSize:10,color:"var(--accent)",marginTop:1}}>OV: {info.ovId||"—"} · {info.fecha||""}</div>
                             :<div style={{fontSize:10,color:"var(--text-muted)",marginTop:1}}>{size?Math.round(size/1024)+"KB":"—"}</div>}
                      </div>
                    </div>
                  );
                })}
                {gdSelected.size>0&&(
                  <button onClick={gdProcess} style={{width:"100%",background:"var(--accent)",color:"white",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14,marginTop:8}}>
                    🤖 Procesar {gdSelected.size} remisión{gdSelected.size!==1?"es":""} con IA
                  </button>
                )}
              </div>
              );
            })()}

            {gdStep==="processing"&&(
              <div style={{textAlign:"center",padding:"40px 20px"}}>
                <div style={{fontSize:40,marginBottom:12}}>⏳</div>
                <div style={{fontWeight:700,fontSize:16,color:"var(--accent)",marginBottom:6}}>Procesando con IA...</div>
                <div style={{fontSize:14,color:"var(--text-sec)",marginBottom:20}}>Remisión {gdProgress.cur} de {gdProgress.tot}</div>
                <div style={{background:"var(--bg-card-alt)",borderRadius:8,height:10,overflow:"hidden",margin:"0 20px"}}>
                  <div style={{background:"var(--accent)",height:"100%",width:`${gdProgress.tot?Math.round(gdProgress.cur/gdProgress.tot*100):0}%`,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:12,color:"var(--text-muted)",marginTop:10}}>{gdProgress.tot?Math.round(gdProgress.cur/gdProgress.tot*100):0}%</div>
              </div>
            )}

            {gdStep==="confirm"&&(()=>{
              const pendientesConfirmar=gdResults.filter(res=>res.ok&&res.data&&!gdProcesadoInfo(res.group));
              return (
              <div>
                <div style={{fontSize:13,color:"var(--text-sec)",marginBottom:14}}>Revisa y confirma para crear las OVs:</div>
                {gdResults.map((res)=>{
                  const info=gdProcesadoInfo(res.group);
                  return(
                  <div key={res.group.key} style={{background:"var(--bg-card-alt)",borderRadius:10,padding:"14px",marginBottom:10,border:`1px solid ${info?"#10B98166":"var(--border)"}`}}>
                    <div style={{fontWeight:600,fontSize:11,color:"var(--text-tertiary)",marginBottom:8,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>📄 {res.group.folioBase} {res.group.page2?"(2 páginas)":""}</div>
                    {res.ok&&res.data?(
                      <>
                        {res.previewUrls?.length>0&&(
                          <div style={{display:"flex",gap:8,marginBottom:10}}>
                            {res.previewUrls.map((p,i)=>(
                              <div key={i} style={{flex:1,minWidth:0,textAlign:"center"}}>
                                {p.isPdf
                                  ?<embed src={p.url} type="application/pdf" style={{width:"100%",height:190,borderRadius:8,border:"1px solid var(--border)"}}/>
                                  :<img src={p.url} alt={`Remisión${res.previewUrls.length>1?` ${i===0?"frente":"reverso"}`:""}`} style={{width:"100%",maxHeight:190,objectFit:"contain",borderRadius:8,border:"1px solid var(--border)",background:"#fff"}}/>
                                }
                                {res.previewUrls.length>1&&<div style={{fontSize:10,color:"var(--text-sec)",marginTop:3,fontWeight:700}}>{i===0?"Frente":"Reverso"}</div>}
                              </div>
                            ))}
                          </div>
                        )}
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                          <div><div style={{fontSize:10,color:"var(--text-tertiary)"}}>No. OV</div><div style={{fontWeight:700,color:"#7c3aed",fontSize:13}}>{res.data.numeroOV||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"var(--text-tertiary)"}}>Remisión</div><div style={{fontWeight:700,color:"#0891b2",fontSize:13}}>{res.group.folioBase||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"var(--text-tertiary)"}}>Fecha</div><div style={{fontWeight:600,fontSize:13}}>{res.data.fecha||"—"}</div></div>
                          <div><div style={{fontSize:10,color:"var(--text-tertiary)"}}>Toneladas</div><div style={{fontWeight:700,color:"#16a34a",fontSize:13}}>{res.data.pesoNeto||"—"} ton</div></div>
                          <div style={{gridColumn:"1/-1"}}><div style={{fontSize:10,color:"var(--text-tertiary)"}}>Cliente</div><div style={{fontWeight:600,fontSize:13,color:gdSelectedFolder?.clienteNombre?"var(--accent)":"#d97706"}}>{gdSelectedFolder?.clienteNombre||"⚠ Sin cliente — asigna en la OV después"}</div></div>
                        </div>
                        {res.renameInfo?.ok&&<div style={{fontSize:11,color:"#0891b2",marginBottom:8}}>📝 Archivo renombrado: {res.renameInfo.names.join(", ")}</div>}
                        {res.renameInfo&&!res.renameInfo.ok&&<div style={{fontSize:11,color:"#d97706",marginBottom:8}}>⚠ No se pudo renombrar el archivo en Drive: {res.renameInfo.error}</div>}
                        {!info&&(
                          <div style={{marginBottom:10}}>
                            <label style={{fontSize:10,color:"var(--text-tertiary)",display:"block",marginBottom:3}}>Fecha de entrega *</label>
                            <input type="date" value={gdFechaEntrega[res.group.key]||""} onChange={e=>setGdFechaEntrega(prev=>({...prev,[res.group.key]:e.target.value}))} style={inS}/>
                          </div>
                        )}
                        {info
                          ?<div style={{fontSize:12,color:"var(--accent)",textAlign:"center",padding:"6px 0",fontWeight:700}}>{info.actualizada?`✅ OV existente actualizada: ${info.ovId}`:`✅ OV creada: ${info.ovId}`}</div>
                          :<div style={{display:"flex",gap:8}}>
                            <button onClick={()=>gdAbrirEdicion(res)} style={{flex:1,background:"var(--bg-card)",color:"var(--text-main)",border:"1px solid var(--border)",borderRadius:6,padding:"9px",fontWeight:700,cursor:"pointer",fontSize:13}}>✏️ Editar OV</button>
                            <button onClick={()=>gdConfirmar(res)} disabled={!gdFechaEntrega[res.group.key]} style={{flex:2,background:"#16a34a",color:"white",border:"none",borderRadius:6,padding:"9px",fontWeight:700,cursor:gdFechaEntrega[res.group.key]?"pointer":"not-allowed",fontSize:13,opacity:gdFechaEntrega[res.group.key]?1:0.5}}>✓ Confirmar y crear OV</button>
                          </div>
                        }
                      </>
                    ):(
                      <div style={{color:"#dc2626",fontSize:12}}>⚠ {res.error||"No se pudo extraer"}</div>
                    )}
                  </div>
                  );
                })}
                <button onClick={()=>setGdStep("files")} style={{width:"100%",background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"10px",fontWeight:600,cursor:"pointer",fontSize:13,marginTop:4}}>← Volver a archivos</button>
                {pendientesConfirmar.length>0&&(
                  <div style={{position:"sticky",bottom:0,margin:"14px -20px -22px -20px",padding:"12px 20px 22px",background:"var(--bg-card)",borderTop:"1px solid var(--border)"}}>
                    <button onClick={gdConfirmarTodos} disabled={gdConfirmandoTodos} style={{width:"100%",background:"#16a34a",color:"white",border:"none",borderRadius:8,padding:"13px",fontWeight:800,cursor:gdConfirmandoTodos?"default":"pointer",fontSize:14,opacity:gdConfirmandoTodos?0.7:1}}>
                      {gdConfirmandoTodos?"⏳ Confirmando...":pendientesConfirmar.length===1?"✅ Confirmar y crear OV":`✅ Confirmar todos (${pendientesConfirmar.length})`}
                    </button>
                  </div>
                )}
              </div>
              );
            })()}

          </div>
        </div>
      )}

      {/* DIÁLOGO (confirm / prompt / alert) — bottom-sheet, reemplaza los nativos del navegador */}
      {dialog&&(
        <div onClick={e=>{if(e.target===e.currentTarget)resolveDialog(dialog.kind==="prompt"?null:dialog.kind==="alert"?undefined:false);}} style={{position:"fixed",inset:0,background:"#00000070",zIndex:9000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div style={{background:"var(--bg-card)",borderRadius:"16px 16px 0 0",width:"100%",maxWidth:480,padding:"22px 20px calc(22px + env(safe-area-inset-bottom, 0px))",maxHeight:"80vh",overflowY:"auto",boxShadow:"0 -4px 24px #00000060"}}>
            <div style={{fontSize:14,color:"var(--text-main)",lineHeight:1.5,whiteSpace:"pre-wrap",marginBottom:16}}>{dialog.message}</div>
            {dialog.kind==="prompt"&&(
              <input
                type={dialog.inputType}
                value={dialog.value}
                placeholder={dialog.placeholder}
                autoFocus
                onChange={e=>{const v=e.target.value;setDialog(d=>d?{...d,value:v}:d);}}
                onKeyDown={e=>{if(e.key==="Enter")resolveDialog(dialog.value);if(e.key==="Escape")resolveDialog(null);}}
                style={{...inS,marginBottom:16,fontSize:15}}
              />
            )}
            <div style={{display:"flex",gap:10}}>
              {dialog.kind!=="alert"&&(
                <button onClick={()=>resolveDialog(dialog.kind==="prompt"?null:false)} style={{flex:1,background:"var(--bg-card-alt)",color:"var(--text-tertiary)",border:"none",borderRadius:8,padding:"12px",fontWeight:600,cursor:"pointer",fontSize:14}}>{dialog.cancelLabel||"Cancelar"}</button>
              )}
              <button
                onClick={()=>resolveDialog(dialog.kind==="prompt"?dialog.value:dialog.kind==="alert"?undefined:true)}
                style={{flex:dialog.kind==="alert"?1:2,background:dialog.danger?"#dc2626":"var(--accent)",color:"white",border:"none",borderRadius:8,padding:"12px",fontWeight:700,cursor:"pointer",fontSize:14}}
              >{dialog.kind==="alert"?"Entendido":dialog.kind==="prompt"?"Aceptar":(dialog.confirmLabel||"Confirmar")}</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST DE ESTADO DE GUARDADO */}
      {saveStatus&&(
        <div style={{
          position:"fixed",left:"50%",bottom:"calc(24px + env(safe-area-inset-bottom, 0px))",transform:"translateX(-50%)",
          zIndex:9999,pointerEvents:"none",width:"max-content",maxWidth:"92vw",
          display:"flex",alignItems:"center",justifyContent:"center",textAlign:"center",
          background:saveStatus==="error"?"#dc2626":saveStatus==="saved"?"#16a34a":"#1e293b",
          color:"white",borderRadius:12,padding:"12px 20px",fontSize:14,fontWeight:700,lineHeight:1.35,
          boxShadow:"0 8px 28px #00000080",border:"1px solid rgba(255,255,255,0.12)"
        }}>
          {saveStatus==="saving"?"💾 Guardando..."
            :saveStatus==="saved"?"✅ Guardado"
            :"❌ Error al guardar. Verifica tu conexión e intenta de nuevo."}
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
